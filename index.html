/* landing */
#landing{background:var(--cream)}
.lnav{position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:14px 6vw;background:rgba(252,249,241,0.9);backdrop-filter:blur(14px);border-bottom:1px solid rgba(191,154,69,0.18)}
.lnav .brand{display:flex;align-items:center;gap:12px}
.lnav .brand .mark{width:44px;height:44px;border-radius:13px;background:linear-gradient(140deg,var(--emerald),var(--emerald-deep));display:grid;place-items:center;color:var(--gold-light);font-family:'Amiri';font-size:23px}
.lnav .brand .name{font-family:'Amiri';font-size:22px;color:var(--emerald-deep);line-height:1.1}
.lnav .brand .name small{display:block;font-size:10px;color:#9a8753;font-family:'Tajawal'}
.lnav-links{display:flex;gap:26px;align-items:center}
.lnav-links a{color:var(--navy);font-weight:600;font-size:15px;cursor:pointer;text-decoration:none;transition:.2s}
.lnav-links a:hover{color:var(--emerald)}
.lnav-links .lbtn{background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;padding:10px 22px;border-radius:30px}
.lhero{position:relative;padding:90px 6vw 70px;overflow:hidden;background:radial-gradient(ellipse at 85% 5%,rgba(19,152,122,0.09),transparent 50%),radial-gradient(ellipse at 5% 95%,rgba(191,154,69,0.11),transparent 48%),var(--cream)}
.lhero-orn{position:absolute;top:-120px;left:-100px;width:440px;opacity:.5;color:rgba(13,107,79,0.06);pointer-events:none}
.lhero-in{position:relative;z-index:2;max-width:780px;margin-inline-start:auto}
.leyebrow{display:inline-flex;align-items:center;gap:9px;background:#fff;color:var(--emerald-deep);padding:8px 18px;border-radius:30px;font-weight:600;font-size:13.5px;border:1px solid rgba(13,107,79,0.14);margin-bottom:24px}
.leyebrow .dot{width:8px;height:8px;border-radius:50%;background:var(--gold)}
.lhero h1{font-size:clamp(36px,6vw,64px);line-height:1.25;color:var(--navy-deep);margin-bottom:8px}
.lhero h1 .grad{background:linear-gradient(115deg,var(--emerald),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.layah{font-family:'Amiri';font-size:clamp(18px,2.4vw,25px);color:var(--emerald);margin:18px 0 0;font-weight:700}
.llead{font-size:clamp(16px,1.8vw,19px);color:#465650;max-width:600px;margin:22px 0 32px}
.lcta{display:flex;gap:14px;flex-wrap:wrap}
.lbtn-primary{background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;padding:16px 34px;border-radius:40px;font-weight:700;font-size:16px;border:none;cursor:pointer;box-shadow:0 12px 30px rgba(13,107,79,0.3);transition:.25s}
.lbtn-primary:hover{transform:translateY(-3px)}
.lbtn-primary.gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy-deep)}
.lbtn-ghost{background:#fff;color:var(--emerald-deep);padding:16px 30px;border-radius:40px;font-weight:700;font-size:16px;border:1.5px solid rgba(13,107,79,0.16);cursor:pointer}
.ltrust{display:flex;align-items:center;gap:24px;margin-top:42px;flex-wrap:wrap}
.ltrust b{font-family:'Amiri';font-size:18px;color:var(--emerald-deep);display:block}
.ltrust span{font-size:13px;color:#6a786f}
.ltrust .sep{width:1px;height:34px;background:rgba(0,0,0,0.1)}
.lsec{padding:80px 6vw}
.lsec.dark{background:var(--navy-deep);color:#fff}
.lhead{text-align:center;max-width:640px;margin:0 auto 50px}
.lhead .ltag{color:var(--gold);font-weight:700;letter-spacing:1.5px;font-size:13px}
.lhead .ltag.gold{color:var(--gold-light)}
.lhead h2{font-size:clamp(28px,4vw,42px);color:var(--navy-deep);margin:12px 0 12px}
.lsec.dark .lhead h2{color:#fff}
.lhead p{color:var(--muted);font-size:17px}
.lsec.dark .lhead p{color:rgba(255,255,255,0.7)}
.ltracks{display:grid;grid-template-columns:1fr 1fr;gap:26px;max-width:1000px;margin:0 auto}
.ltrack{border-radius:24px;padding:36px 32px;color:#fff;position:relative;overflow:hidden;transition:.3s}
.ltrack:hover{transform:translateY(-6px)}
.ltrack.t{background:linear-gradient(150deg,#0d6b4f,#093c2e)}
.ltrack.q{background:linear-gradient(150deg,#14385a,#0a1f30)}
.ltrack .ic{font-size:36px;margin-bottom:16px}
.ltrack h3{font-size:23px;margin-bottom:12px;color:#fff}
.ltrack p{color:rgba(255,255,255,0.85);font-size:15px}
.lhusoon{display:flex;gap:16px;max-width:1050px;margin:0 auto;flex-wrap:wrap;justify-content:center}
.lhisn{flex:1;min-width:160px;background:linear-gradient(160deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));border:1px solid rgba(224,192,115,0.22);border-radius:18px;padding:26px 18px;text-align:center;transition:.3s}
.lhisn:hover{border-color:var(--gold);transform:translateY(-5px)}
.lhisn .hn{width:44px;height:44px;margin:0 auto 14px;border-radius:13px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy-deep);display:grid;place-items:center;font-family:'Amiri';font-size:20px}
.lhisn b{color:var(--gold-light);font-size:16px;font-family:'Amiri'}
.lprograms{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;max-width:1100px;margin:0 auto}
.lprog{background:#fff;border:1px solid var(--line);border-radius:18px;padding:24px;transition:.3s}
.lprog:hover{transform:translateY(-5px);box-shadow:0 18px 40px var(--shadow);border-color:var(--gold)}
.lprog h4{font-size:18px;color:var(--navy-deep);margin-bottom:8px}
.lprog-meta{font-size:13px;color:var(--muted);margin-bottom:10px}
.lprog-fee{font-family:'Amiri';color:var(--emerald);font-size:18px;font-weight:700}
.lcta-band{margin:0 6vw 70px;background:linear-gradient(135deg,var(--emerald-deep),var(--emerald) 60%,var(--emerald-light));border-radius:30px;padding:60px 40px;text-align:center;color:#fff}
.lcta-band h2{font-size:clamp(26px,4vw,40px);color:#fff;margin-bottom:12px}
.lcta-band p{color:rgba(255,255,255,0.85);font-size:17px;margin-bottom:26px}
.lfoot{background:var(--navy-deep);color:rgba(255,255,255,0.65);padding:46px 6vw 30px;text-align:center}
.lfoot .brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:14px}
.lfoot .brand .mark{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:grid;place-items:center;color:var(--navy-deep);font-family:'Amiri';font-size:20px}
.lfoot .brand .name{font-family:'Amiri';font-size:22px;color:#fff}
.lfoot>p{max-width:420px;margin:0 auto 20px;font-size:14px;color:rgba(255,255,255,0.55)}
.lcopy{margin-top:24px;font-size:12.5px;color:rgba(255,255,255,0.4);border-top:1px solid rgba(255,255,255,0.08);padding-top:18px}

/* auth */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px 20px;position:relative;background:radial-gradient(ellipse at 80% 10%,rgba(19,152,122,0.1),transparent 50%),radial-gradient(ellipse at 10% 90%,rgba(191,154,69,0.12),transparent 48%),linear-gradient(160deg,#0a3326,#072a20)}
.auth-back{position:absolute;top:24px;right:24px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:10px 20px;border-radius:30px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:'Tajawal'}
.auth-card{max-width:520px;width:100%;background:#fff;border-radius:26px;padding:36px 34px;box-shadow:0 30px 70px rgba(0,0,0,0.3);max-height:92vh;overflow-y:auto}
.auth-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:grid;place-items:center;color:var(--navy-deep);font-family:'Amiri';font-size:32px;margin:0 auto 16px}
.auth-card h2{text-align:center;font-size:24px;color:var(--navy-deep);margin-bottom:20px}
.auth-tabs{display:flex;gap:6px;background:var(--cream);border-radius:30px;padding:5px;margin-bottom:24px}
.auth-tabs button{flex:1;border:none;background:none;padding:11px;border-radius:24px;font-family:'Tajawal';font-weight:700;font-size:14px;color:var(--muted);cursor:pointer;transition:.2s}
.auth-tabs button.on{background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff}
.afield{margin-bottom:14px}
.afield label{display:block;font-size:13px;font-weight:600;color:#3f4f48;margin-bottom:6px}
.afield input,.afield select{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-size:14px;background:var(--cream);font-family:'Tajawal'}
.afield input:focus,.afield select:focus{outline:none;border-color:var(--emerald)}
.arow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.role-choice{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.rc{border:2px solid var(--line);border-radius:16px;padding:18px;text-align:center;cursor:pointer;transition:.2s}
.rc:hover{border-color:var(--gold)}
.rc.on{border-color:var(--emerald);background:rgba(13,107,79,0.05)}
.rc .ic{font-size:30px;margin-bottom:8px}
.rc b{display:block;color:var(--navy-deep);font-size:16px;font-family:'Amiri'}
.rc span{font-size:12px;color:var(--muted)}
.auth-btn{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;font-family:'Tajawal';font-weight:700;font-size:15px;cursor:pointer;margin-top:8px}
.auth-alt{text-align:center;font-size:13.5px;color:var(--muted);margin-top:16px}
.auth-alt a{color:var(--emerald);font-weight:700;cursor:pointer}
.side .foot .home-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border-radius:12px;padding:9px;font-family:'Tajawal';font-weight:600;font-size:13px;cursor:pointer;margin-bottom:8px}
.side .foot .home-btn:hover{background:rgba(255,255,255,0.12)}
/* الجولة التعريفية */
.tour-bg{position:fixed;inset:0;z-index:400;background:rgba(8,30,22,0.82);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.tour-card{max-width:480px;width:100%;background:#fff;border-radius:24px;padding:34px 30px;box-shadow:0 30px 70px rgba(0,0,0,0.4);text-align:center;position:relative}
.tour-icon{width:80px;height:80px;margin:0 auto 18px;border-radius:22px;display:grid;place-items:center;font-size:40px;background:linear-gradient(140deg,var(--emerald),var(--emerald-deep))}
.tour-card h2{font-size:23px;color:var(--navy-deep);margin-bottom:12px}
.tour-card p{font-size:15px;color:#46544d;line-height:1.9;margin-bottom:20px}
.tour-dots{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.tour-dots span{width:9px;height:9px;border-radius:50%;background:var(--line);transition:.2s}
.tour-dots span.on{background:var(--emerald);width:24px;border-radius:5px}
.tour-actions{display:flex;gap:10px;justify-content:center}
.tour-skip{position:absolute;top:16px;left:18px;background:none;border:none;color:var(--muted);font-family:'Tajawal';font-size:13px;cursor:pointer}
.tour-feat{text-align:right;background:var(--cream);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.tour-feat .ti{font-size:22px}
.tour-feat b{display:block;color:var(--navy-deep);font-size:14.5px;margin-bottom:2px}
.tour-feat span{font-size:12.5px;color:var(--muted)}

@media(max-width:860px){.lnav-links a:not(.lbtn){display:none}.ltracks{grid-template-columns:1fr}.arow,.role-choice{grid-template-columns:1fr}}
/* ═══════════ أنيميشن احترافية (تحسين بصري فقط) ═══════════ */
@keyframes fadeUp{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:translateY(0); } }
@keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }
@keyframes scaleIn{ from{ opacity:0; transform:scale(0.97); } to{ opacity:1; transform:scale(1); } }
@keyframes shimmer{ 0%{ background-position:-400px 0; } 100%{ background-position:400px 0; } }
@keyframes floatY{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }
@keyframes pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.04); } }

/* دخول الصفحات والبطاقات */
#pageHost > *{ animation:fadeUp .5s cubic-bezier(.22,.61,.36,1) both; }
.card{ animation:fadeUp .55s cubic-bezier(.22,.61,.36,1) both; transition:transform .25s ease, box-shadow .25s ease; }
.card:hover{ transform:translateY(-3px); box-shadow:0 12px 30px rgba(13,107,79,0.10); }
.stats .statcard,.stat-card{ animation:scaleIn .5s ease both; }
.stats > *:nth-child(1){ animation-delay:.04s; }
.stats > *:nth-child(2){ animation-delay:.10s; }
.stats > *:nth-child(3){ animation-delay:.16s; }
.stats > *:nth-child(4){ animation-delay:.22s; }

/* الأزرار */
.btn,.btn-sm,.lbtn-primary,.join-btn{ transition:transform .18s ease, box-shadow .25s ease, filter .2s ease; }
.btn:hover,.lbtn-primary:hover{ transform:translateY(-2px); box-shadow:0 8px 20px rgba(13,107,79,0.18); }
.btn:active{ transform:translateY(0) scale(.98); }

/* بطاقات المعلمين والحلقات والحصون */
.teacher-card,.hisn-card,.hw-card,.priv-session,.confirm-card,.children-grid > *{ transition:transform .25s cubic-bezier(.22,.61,.36,1), box-shadow .25s ease; }
.teacher-card:hover,.priv-session:hover{ transform:translateY(-4px) scale(1.01); box-shadow:0 14px 32px rgba(13,107,79,0.12); }
.hisn-card:hover{ transform:translateY(-3px); }
.hisn-card.done{ animation:pulse .4s ease; }

/* أيقونات الحصون تطفو بنعومة */
.hisn-icon{ animation:floatY 3.5s ease-in-out infinite; }

/* القوائم الجانبية */
#sidebar a{ transition:background .2s ease, transform .15s ease, padding .2s ease; }
#sidebar a:hover{ transform:translateX(-4px); }

/* الشارات والرقائق */
.chip{ transition:transform .15s ease; }

/* المودالات */
.modal{ animation:scaleIn .35s cubic-bezier(.22,.61,.36,1) both; }
.modal-bg{ animation:fadeIn .25s ease both; }

/* تأثير اللمعان على الترويسات المهمة */
.renew-box.warn,.renew-box.expired{ position:relative; overflow:hidden; }
.renew-box.warn::after,.renew-box.expired::after{ content:''; position:absolute; inset:0; background:linear-gradient(100deg,transparent 30%,rgba(255,255,255,0.25) 50%,transparent 70%); background-size:400px 100%; animation:shimmer 2.6s infinite; pointer-events:none; }

/* احترام تفضيل تقليل الحركة */
@media (prefers-reduced-motion: reduce){
  *{ animation:none !important; transition:none !important; }
}
/* ═══════════ تطوير احترافي لواجهة الأكاديمية ═══════════ */
/* أنيميشن الكشف عند التمرير */
.reveal{ opacity:0; transform:translateY(30px); transition:opacity .7s cubic-bezier(.22,.61,.36,1), transform .7s cubic-bezier(.22,.61,.36,1); }
.reveal.in{ opacity:1; transform:translateY(0); }
.reveal.d1{ transition-delay:.08s; } .reveal.d2{ transition-delay:.16s; } .reveal.d3{ transition-delay:.24s; } .reveal.d4{ transition-delay:.32s; }

/* البطل: خلفية متدرّجة حيّة + زخرفة متحركة */
.lhero{ position:relative; overflow:hidden; background:linear-gradient(135deg,#0D6B4F 0%,#13987A 55%,#0a5840 100%); }
.lhero::before{ content:''; position:absolute; inset:0; background-image:radial-gradient(circle at 20% 30%, rgba(191,154,69,0.18) 0%, transparent 45%), radial-gradient(circle at 80% 70%, rgba(255,255,255,0.10) 0%, transparent 40%); animation:heroGlow 9s ease-in-out infinite alternate; pointer-events:none; }
@keyframes heroGlow{ 0%{ opacity:.6; transform:scale(1); } 100%{ opacity:1; transform:scale(1.12); } }
.lhero::after{ content:''; position:absolute; inset:0; background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l8 22 22 8-22 8-8 22-8-22L0 30l22-8z' fill='%23ffffff' fill-opacity='0.025'/%3E%3C/svg%3E"); pointer-events:none; }
.lhero-in{ position:relative; z-index:2; }
.lhero h1{ animation:fadeUp .8s cubic-bezier(.22,.61,.36,1) both; }
.layah{ animation:fadeUp .8s cubic-bezier(.22,.61,.36,1) .15s both; }
.llead{ animation:fadeUp .8s cubic-bezier(.22,.61,.36,1) .25s both; }
.lcta{ animation:fadeUp .8s cubic-bezier(.22,.61,.36,1) .35s both; }
.ltrust{ animation:fadeIn 1s ease .6s both; }
.leyebrow{ animation:fadeIn .8s ease both; }
.leyebrow .dot{ animation:pulse 2s ease-in-out infinite; }

/* العنوان المتدرّج اللامع */
.lhero h1 .grad{ background:linear-gradient(90deg,#F3D98B,#BF9A45,#F3D98B); background-size:200% auto; -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; animation:shimmerText 3s linear infinite; }
@keyframes shimmerText{ to{ background-position:200% center; } }

/* الزخرفة الدوّارة */
.lhero-orn{ animation:floatY 6s ease-in-out infinite; opacity:.5; }
.lhero-orn svg{ animation:spin 40s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }

/* بطاقات المسارات: رفع وإضاءة */
.lpath-card,.ltrack,.lprogram-card{ transition:transform .3s cubic-bezier(.22,.61,.36,1), box-shadow .3s ease, border-color .3s ease; }
.lpath-card:hover{ transform:translateY(-8px) scale(1.02); box-shadow:0 20px 44px rgba(0,0,0,0.18); border-color:var(--gold); }
.lpath-card .lp-icon{ transition:transform .3s ease; }
.lpath-card:hover .lp-icon{ transform:scale(1.15) rotate(-5deg); }
.ltrack.q:hover{ transform:translateY(-6px); box-shadow:0 18px 40px rgba(13,107,79,0.16); }

/* الحصون الخمسة: ظهور متتابع + طفو */
.lhisn{ transition:transform .3s ease, box-shadow .3s ease; }
.lhisn:hover{ transform:translateY(-6px) scale(1.05); box-shadow:0 14px 30px rgba(191,154,69,0.25); }
.lhisn .hn{ transition:transform .3s ease; }
.lhisn:hover .hn{ transform:scale(1.2); }

/* أزرار البطل بلمعان */
.lbtn-primary{ position:relative; overflow:hidden; }
.lbtn-primary::after{ content:''; position:absolute; top:0; left:-120%; width:80%; height:100%; background:linear-gradient(110deg,transparent,rgba(255,255,255,0.35),transparent); transform:skewX(-20deg); transition:left .6s ease; }
.lbtn-primary:hover::after{ left:140%; }

/* شريط التنقّل: زجاجي عند التمرير */
.lnav{ transition:background .3s ease, box-shadow .3s ease, padding .3s ease; }
.lnav.scrolled{ background:rgba(255,255,255,0.92); backdrop-filter:blur(12px); box-shadow:0 4px 20px rgba(0,0,0,0.08); }

/* عناوين الأقسام */
.lhead h2{ position:relative; display:inline-block; }
.lhead .ltag{ animation:fadeIn .6s ease both; }

/* بطاقات الإحصاء في الثقة */
.ltrust > div b{ background:linear-gradient(135deg,#F3D98B,#BF9A45); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }

/* ============ قسم القرآن — Phase 1: أنظمة الإدارة ============ */
.qhero{background:linear-gradient(135deg,var(--emerald-deep) 0%,var(--emerald) 60%,var(--gold) 140%);color:#fff;border-radius:24px;padding:30px 28px;margin-bottom:22px;position:relative;overflow:hidden}
.qhero::before{content:"﷽";position:absolute;left:-20px;bottom:-50px;font-family:'Amiri';font-size:180px;opacity:0.08;color:#fff;line-height:1}
.qhero h1{font-family:'Amiri';font-size:28px;margin-bottom:8px}
.qhero p{opacity:0.9;font-size:14.5px;max-width:560px;line-height:1.9}
.qhero .qhcta{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}
.qhero .qhcta button{border:none;cursor:pointer;font-family:'Tajawal';font-weight:700;font-size:13.5px;padding:11px 22px;border-radius:30px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy-deep);box-shadow:0 6px 18px rgba(191,154,69,0.35);transition:.2s}
.qhero .qhcta button:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(191,154,69,0.45)}
.qhero .qhcta button.ghost{background:rgba(255,255,255,0.14);color:#fff;border:1.5px solid rgba(255,255,255,0.3);box-shadow:none}

.qgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px}
.qcard{background:#fff;border:1px solid var(--line);border-radius:20px;padding:22px;transition:.25s;cursor:pointer;position:relative;overflow:hidden}
.qcard:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 18px 40px rgba(13,107,79,0.12)}
.qcard .qcicon{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;display:grid;place-items:center;font-size:26px;margin-bottom:14px}
.qcard.archived .qcicon{background:linear-gradient(135deg,#9aa6a0,#6e7a73)}
.qcard.draft .qcicon{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy-deep)}
.qcard h3{font-family:'Amiri';color:var(--navy-deep);font-size:19px;margin-bottom:6px}
.qcard .qcdesc{color:var(--muted);font-size:13.5px;line-height:1.8;margin-bottom:14px;min-height:38px}
.qcard .qcmeta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.qcmeta span{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:14px;background:var(--cream-2);color:var(--emerald-deep)}
.qcmeta span.t{background:rgba(13,107,79,0.12);color:var(--emerald)}
.qcmeta span.s{background:rgba(191,154,69,0.18);color:#7a5d1d}
.qcmeta span.a{background:rgba(168,77,77,0.12);color:var(--rose)}
.qcard .qcstats{display:flex;justify-content:space-between;padding-top:12px;border-top:1px dashed var(--line);font-size:12.5px;color:var(--muted)}
.qcard .qcstats b{font-family:'Amiri';color:var(--navy-deep);font-size:16px;display:block}

.qempty{background:#fff;border:2px dashed var(--line);border-radius:20px;padding:50px 22px;text-align:center}
.qempty .qei{font-size:60px;margin-bottom:14px;opacity:0.7}
.qempty h3{font-family:'Amiri';color:var(--navy-deep);font-size:22px;margin-bottom:8px}
.qempty p{color:var(--muted);font-size:14px;max-width:420px;margin:0 auto 18px;line-height:1.9}

.qtabs{display:flex;gap:6px;background:var(--cream-2);padding:6px;border-radius:14px;margin-bottom:18px;overflow-x:auto;flex-wrap:nowrap}
.qtabs button{border:none;background:transparent;color:var(--muted);font-family:'Tajawal';font-weight:700;font-size:13.5px;padding:10px 18px;border-radius:10px;cursor:pointer;white-space:nowrap;transition:.2s;display:flex;align-items:center;gap:7px}
.qtabs button:hover{color:var(--emerald-deep)}
.qtabs button.on{background:#fff;color:var(--emerald-deep);box-shadow:0 4px 10px rgba(9,40,30,0.06)}

.qform{display:grid;gap:14px}
.qform .qrow{display:grid;gap:14px;grid-template-columns:1fr 1fr}
@media(max-width:680px){.qform .qrow{grid-template-columns:1fr}}
.qform label{display:block;font-size:13px;font-weight:700;color:var(--navy-deep);margin-bottom:6px}
.qform label .hint{font-weight:400;color:var(--muted);font-size:11.5px;margin-inline-start:6px}
.qform input,.qform select,.qform textarea{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:11px;background:var(--cream);font-family:'Tajawal';font-size:14px;color:var(--ink);transition:.2s}
.qform input:focus,.qform select:focus,.qform textarea:focus{outline:none;border-color:var(--emerald);background:#fff}
.qform textarea{resize:vertical;min-height:80px}

.qdays{display:flex;gap:6px;flex-wrap:wrap}
.qdays label{cursor:pointer;background:var(--cream);border:1.5px solid var(--line);border-radius:11px;padding:10px 14px;font-size:13px;font-weight:700;color:var(--muted);transition:.2s;display:flex;align-items:center;gap:6px;margin-bottom:0}
.qdays label.on{background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;border-color:var(--emerald-deep)}
.qdays label.rest.on{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy-deep);border-color:var(--gold)}
.qdays input{display:none}

.qstation{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:18px;margin-bottom:12px;transition:.2s}
.qstation:hover{border-color:var(--gold)}
.qstation .qsthead{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.qstation .qsno{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--navy),var(--navy-deep));color:#fff;display:grid;place-items:center;font-family:'Amiri';font-size:18px;flex:none}
.qstation .qsttitle{flex:1}
.qstation .qsttitle b{display:block;font-family:'Amiri';color:var(--navy-deep);font-size:16px}
.qstation .qsttitle small{color:var(--muted);font-size:12.5px}
.qstation .qstacts{display:flex;gap:6px}
.qstation .qstacts button{background:var(--cream);border:1px solid var(--line);border-radius:9px;padding:6px 10px;font-size:12.5px;cursor:pointer;color:var(--emerald-deep);font-weight:700}
.qstation .qstacts button.danger{color:var(--rose)}
.qstation .qstmeta{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.qstation .qstmeta span{font-size:11.5px;padding:3px 9px;border-radius:12px;background:var(--cream-2);color:var(--emerald-deep)}

.qfort{border:1.5px solid var(--line);border-radius:14px;padding:14px;background:#fff;display:flex;align-items:center;gap:14px;margin-bottom:10px;transition:.2s}
.qfort.off{opacity:0.5;background:var(--cream)}
.qfort .qfic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;color:#fff;font-size:22px;flex:none}
.qfort .qfbody{flex:1;min-width:0}
.qfort .qfbody b{display:block;font-family:'Amiri';color:var(--navy-deep);font-size:15.5px;margin-bottom:2px}
.qfort .qfbody small{color:var(--muted);font-size:12px}
.qfort .qfctl{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.qfort .qfctl input[type="number"]{width:70px;padding:7px 9px;border:1.5px solid var(--line);border-radius:9px;background:var(--cream);font-family:'Amiri';font-size:14px;text-align:center}
.qfort .qfctl select{padding:7px 9px;border:1.5px solid var(--line);border-radius:9px;background:var(--cream);font-size:12.5px}
.qfort .qftoggle{position:relative;width:42px;height:24px;background:var(--line);border-radius:14px;cursor:pointer;transition:.2s;flex:none}
.qfort .qftoggle::after{content:"";position:absolute;top:3px;right:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 2px 5px rgba(0,0,0,0.15)}
.qfort.on .qftoggle{background:var(--emerald)}
.qfort.on .qftoggle::after{right:21px}

.qsticky{position:sticky;bottom:0;background:linear-gradient(180deg,transparent,#fff 30%);padding:18px 0 4px;margin-top:18px;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}

.qback{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--emerald-deep);font-family:'Tajawal';font-weight:700;font-size:14px;cursor:pointer;margin-bottom:12px;padding:0}
.qback:hover{color:var(--gold)}

.qpv{background:linear-gradient(135deg,var(--cream-2),var(--cream));border-radius:16px;padding:18px;margin-bottom:14px}
.qpv h4{font-family:'Amiri';color:var(--navy-deep);font-size:17px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.qpv .qpvrow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed rgba(9,40,30,0.08);font-size:13.5px}
.qpv .qpvrow:last-child{border:none}
.qpv .qpvrow span{color:var(--muted)}
.qpv .qpvrow b{color:var(--navy-deep);font-family:'Amiri';font-size:15px}

.qmodal{position:fixed;inset:0;background:rgba(7,21,31,0.65);z-index:1000;display:grid;place-items:center;padding:20px;backdrop-filter:blur(4px)}
.qmodal .qmbox{background:#fff;border-radius:22px;padding:26px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,0.3)}
.qmodal h2{font-family:'Amiri';color:var(--navy-deep);font-size:22px;margin-bottom:6px}
.qmodal .qmdesc{color:var(--muted);font-size:13.5px;margin-bottom:18px;line-height:1.8}


/* ============ قسم القرآن — Phase 2: خطط الطلاب ============ */
.qwizard{display:grid;gap:16px}
.qwsteps{display:flex;gap:10px;margin-bottom:18px;overflow-x:auto;padding-bottom:6px}
.qwstep{flex:1;min-width:120px;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:12px 14px;text-align:center;font-size:12.5px;color:var(--muted);position:relative}
.qwstep.on{background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;border-color:var(--emerald-deep)}
.qwstep.done{background:var(--cream-2);color:var(--emerald-deep);border-color:var(--gold)}
.qwstep b{display:block;font-family:'Amiri';font-size:15px;margin-bottom:2px}
.qwstep.on b{color:#fff}

.qsurahgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;max-height:420px;overflow-y:auto;padding:8px;background:var(--cream);border-radius:14px;border:1px solid var(--line)}
.qsuracell{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;cursor:pointer;transition:.15s;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:6px}
.qsuracell:hover{border-color:var(--gold)}
.qsuracell.on{background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;border-color:var(--emerald-deep)}
.qsuracell.on small{color:rgba(255,255,255,0.85)}
.qsuracell .qsn{font-family:'Amiri';font-weight:700;font-size:13.5px;flex:1;text-align:start}
.qsuracell small{color:var(--muted);font-size:10.5px;flex:none}
.qsuracell .qstars{font-size:10px;flex:none}

.qstars-inp{display:inline-flex;gap:2px;font-size:14px}
.qstars-inp span{cursor:pointer;color:var(--line);transition:.15s}
.qstars-inp span.on{color:var(--gold)}

/* بطاقات ورد اليوم */
.qcardward{background:#fff;border:1.5px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden;transition:.2s}
.qcardward::before{content:"";position:absolute;top:0;right:0;left:0;height:5px;background:var(--accent,#0d6b4f)}
.qcardward.done{background:linear-gradient(180deg,#fff,#f2faf6)}
.qcardward.done::before{background:linear-gradient(90deg,var(--emerald),var(--emerald-light))}
.qcardward.late::before{background:var(--rose)}
.qcardward.early::before{background:var(--gold)}
.qcardward .qcwh{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.qcardward .qcwic{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;color:#fff;font-size:22px;flex:none;background:var(--accent,#0d6b4f)}
.qcardward .qcwt{flex:1;min-width:0}
.qcardward .qcwt b{display:block;font-family:'Amiri';color:var(--navy-deep);font-size:16px;margin-bottom:2px}
.qcardward .qcwt small{color:var(--muted);font-size:12.5px}
.qcardward .qcwstat{font-size:12px;padding:5px 10px;border-radius:14px;background:var(--cream-2);color:var(--emerald-deep);font-weight:700;white-space:nowrap}
.qcardward.done .qcwstat{background:rgba(13,107,79,0.15);color:var(--emerald)}
.qcardward.late .qcwstat{background:rgba(168,77,77,0.15);color:var(--rose)}
.qcardward.early .qcwstat{background:rgba(191,154,69,0.18);color:#7a5d1d}
.qcardward .qcwbody{background:linear-gradient(135deg,var(--cream-2),var(--cream));border-radius:12px;padding:14px;text-align:center;margin-bottom:12px}
.qcardward .qcwbody .qcwrange{font-family:'Amiri';color:var(--navy-deep);font-size:20px;line-height:1.5}
.qcardward .qcwbody .qcwsurah{font-family:'Amiri';color:var(--emerald-deep);font-size:24px;margin-bottom:4px}
.qcardward .qcwnote{background:rgba(191,154,69,0.1);border-inline-start:3px solid var(--gold);border-radius:8px;padding:9px 12px;font-size:13px;color:#7a5d1d;margin-bottom:12px}
.qcardward .qcwacts{display:flex;gap:8px;flex-wrap:wrap}
.qcardward .qcwacts button{flex:1;min-width:90px;border:none;cursor:pointer;font-family:'Tajawal';font-weight:700;font-size:13px;padding:10px 14px;border-radius:10px;transition:.2s}
.qcwacts .qa-done{background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff}
.qcwacts .qa-help{background:rgba(191,154,69,0.18);color:#7a5d1d}
.qcwacts .qa-skip{background:rgba(168,77,77,0.12);color:var(--rose)}
.qcwacts button:hover{transform:translateY(-2px)}
.qcardward .qcwself{margin-top:10px;display:flex;align-items:center;gap:10px;padding:10px;background:var(--cream);border-radius:10px;flex-wrap:wrap}
.qcardward .qcwself label{font-size:12.5px;color:var(--muted);font-weight:700}

/* شريط تقدم اليوم */
.qtoday-hero{background:linear-gradient(135deg,var(--emerald-deep) 0%,var(--emerald) 70%);color:#fff;border-radius:22px;padding:24px;margin-bottom:18px;position:relative;overflow:hidden}
.qtoday-hero::after{content:"";position:absolute;left:-30px;bottom:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,255,255,0.06) 0%,transparent 70%)}
.qtoday-hero h2{font-family:'Amiri';font-size:24px;margin-bottom:4px;position:relative}
.qtoday-hero p{opacity:0.9;font-size:13.5px;margin-bottom:14px;position:relative}
.qtoday-hero .qtprog{height:10px;background:rgba(0,0,0,0.2);border-radius:6px;overflow:hidden;margin-bottom:8px;position:relative}
.qtoday-hero .qtprog i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));transition:.5s}
.qtoday-hero .qtstats{display:flex;justify-content:space-between;font-size:12.5px;opacity:0.95;position:relative}

/* عرض الخطة الكاملة */
.qplan-day{background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
.qplan-day-h{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;background:var(--cream);transition:.2s}
.qplan-day-h:hover{background:var(--cream-2)}
.qplan-day-h.today{background:linear-gradient(135deg,var(--gold-soft),var(--cream));border-inline-start:4px solid var(--gold)}
.qplan-day-h.past{opacity:0.85}
.qplan-day-h b{font-family:'Amiri';color:var(--navy-deep);font-size:15px}
.qplan-day-h small{color:var(--muted);font-size:12px}
.qplan-day-h .qpchk{display:flex;gap:4px}
.qpchk .qpd{width:14px;height:14px;border-radius:50%;background:var(--line)}
.qpchk .qpd.done{background:var(--emerald)}
.qpchk .qpd.early{background:var(--gold)}
.qpchk .qpd.late{background:var(--rose)}
.qplan-day-body{padding:14px 16px;display:none;border-top:1px dashed var(--line)}
.qplan-day.open .qplan-day-body{display:block}
.qplan-mini{display:flex;align-items:center;gap:10px;padding:8px;background:var(--cream);border-radius:10px;margin-bottom:6px;font-size:13px}
.qplan-mini .qpmic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff;font-size:15px;flex:none}
.qplan-mini b{font-family:'Amiri';color:var(--navy-deep);font-size:13.5px}
.qplan-mini small{color:var(--muted);font-size:11.5px;display:block}

/* فلاتر الخطة */
.qpfilter{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.qpfilter button{border:1.5px solid var(--line);background:#fff;color:var(--muted);font-family:'Tajawal';font-weight:700;font-size:12.5px;padding:8px 14px;border-radius:20px;cursor:pointer;transition:.15s}
.qpfilter button.on{background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;border-color:var(--emerald-deep)}

/* صفحة لا خطة */
.qnoplan{background:#fff;border:2px dashed var(--line);border-radius:20px;padding:50px 22px;text-align:center}
.qnoplan .nei{font-size:60px;margin-bottom:14px}
.qnoplan h3{font-family:'Amiri';color:var(--navy-deep);font-size:22px;margin-bottom:8px}
.qnoplan p{color:var(--muted);font-size:14px;max-width:480px;margin:0 auto;line-height:1.9}

/* قائمة طلاب المعلم */
.qstu-row{display:flex;align-items:center;gap:12px;padding:14px;background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;transition:.2s;cursor:pointer}
.qstu-row:hover{border-color:var(--gold);transform:translateY(-2px)}
.qstu-ava{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--emerald),var(--emerald-light));color:#fff;display:grid;place-items:center;font-family:'Amiri';font-size:18px;flex:none}
.qstu-info{flex:1;min-width:0}
.qstu-info b{display:block;font-family:'Amiri';color:var(--navy-deep);font-size:15.5px;margin-bottom:2px}
.qstu-info small{color:var(--muted);font-size:12.5px}
.qstu-stat{text-align:center;font-size:12px;color:var(--muted);min-width:65px}
.qstu-stat b{display:block;font-family:'Amiri';color:var(--navy-deep);font-size:18px}
.qstu-noplan{background:var(--cream);border:1px dashed var(--line)}
.qstu-noplan .qstu-ava{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy-deep)}

/* ══════ Phase 3: تقييم، تقارير، تعديل، تنبيهات ══════ */
.qrate-bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.qrate-bar span{width:34px;height:34px;border-radius:10px;background:var(--cream-2);border:1.5px solid var(--line);display:grid;place-items:center;cursor:pointer;font-size:16px;transition:.15s;flex:none}

function esc(s){
  if(s==null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

}

function escJs(s){
  if(s==null) return '';
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,' ');
}

window.addEventListener('DOMContentLoaded', async ()=>{
  if(SUPABASE_URL.includes('YOUR-PROJECT')){ $('#setupWarn').classList.remove('hidden'); return; }
  // كشف رابط استعادة كلمة المرور (من الإيميل)
  const hash=window.location.hash||'';
  if(hash.includes('type=recovery')){
    hideAll(); $('#authScreen').classList.remove('hidden');
    AUTH_MODE='reset'; renderAuthBody();
    return;
  }
  // قادم من صفحة الهبوط (landing) بطلب تسجيل/دخول
  const fromLanding = (hash==='#signup'||hash==='#login');
  // جلسة قائمة؟
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ await afterAuth(); return; }
  // هل يوجد مدير؟
  let hasAdmin=true;
  try{ const { data } = await sb.rpc('admin_exists'); hasAdmin = !!data; }catch(e){ hasAdmin=true; }
  if(!hasAdmin){ showSetup(); }
  else if(fromLanding){ showAuth(hash==='#signup'?'signup':'login'); }
  else { window.location.replace('landing.html'); }
});

async function createAdmin(){
  const name=$('#suName').value.trim(), email=$('#suEmail').value.trim(), p1=$('#suPass').value, p2=$('#suPass2').value;
  if(!name||!email||!p1){ toast('أكمل البيانات'); return; }
  if(p1!==p2){ toast('كلمتا المرور غير متطابقتين'); return; }
  if(p1.length<6){ toast('كلمة المرور ٦ أحرف على الأقل'); return; }
  $('#suBtn').disabled=true; $('#suBtn').textContent='جارٍ الإنشاء...';
  const { data:suData, error } = await sb.auth.signUp({ email, password:p1, options:{ data:{ role:'admin', full_name:name, initials:name.slice(0,2) } } });
  $('#suBtn').disabled=false; $('#suBtn').textContent='إنشاء حساب المدير';
  if(error){
    let msg=error.message;
    if(msg.includes('already')) msg='هذا البريد مُسجّل بالفعل. جرّب تسجيل الدخول.';
    else if(msg.includes('valid')||msg.includes('email')) msg='البريد الإلكتروني غير صحيح.';
    else if(msg.includes('Password')) msg='كلمة المرور ضعيفة (٦ أحرف على الأقل).';
    alert('تعذّر الإنشاء:\n'+msg);
    return;
  }
  const { error:e2 } = await sb.auth.signInWithPassword({ email, password:p1 });
  if(e2){
    if(e2.message.includes('confirm')||e2.message.includes('Email not')){
      alert('تم إنشاء حساب المدير بنجاح!\n\nتأكيد البريد مفعّل: افتح بريدك ('+email+') واضغط رابط التأكيد من Supabase ثم عُد وسجّل الدخول.\n\nأو من Supabase: Authentication ثم Users ثم اضغط حسابك ثم Confirm user');
    } else {
      alert('أُنشئ الحساب. سجّل الدخول الآن.\n('+e2.message+')');
    }
    showAuth('login'); return;
  }
  alert('مرحباً بك! تم إنشاء حساب المدير والدخول بنجاح.');
  await afterAuth();
}

// تفعيل أنيميشن الكشف عند التمرير + شريط تنقّل زجاجي
function initLandingFX(){
  // إضافة كلاس reveal للعناصر المناسبة
  const targets=document.querySelectorAll('.lsec .lhead, .ltrack, .lpath-card, .lhisn, .lprogram-card, .lstep, .lfeature');
  targets.forEach((el,i)=>{ el.classList.add('reveal'); if(i%4===1)el.classList.add('d1'); else if(i%4===2)el.classList.add('d2'); else if(i%4===3)el.classList.add('d3'); });
  // مراقب التقاطع
  if('IntersectionObserver' in window){
    const obs=new IntersectionObserver((entries)=>{
      entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); obs.unobserve(e.target); } });
    },{ threshold:0.12, rootMargin:'0px 0px -40px 0px' });
    targets.forEach(el=>obs.observe(el));
  } else { targets.forEach(el=>el.classList.add('in')); }
  // شريط التنقّل عند التمرير
  const nav=document.querySelector('.lnav');
  if(nav){ const onScroll=()=>{ nav.classList.toggle('scrolled', window.scrollY>60); }; window.addEventListener('scroll',onScroll,{passive:true}); onScroll(); }
}

async function submitEnrollment(pathId, type, childId){
  const name=$('#enName')?.value.trim();
  const exp=$('#enExp')?.value.trim();
  if(!name){ toast('أدخل الاسم'); return; }
  if(!exp){ toast('أجب عن سؤال الخبرة السابقة'); return; }
  if(type==='subsidy' && (!$('#enFamily')?.value.trim()||!$('#enFather')?.value.trim())){ toast('أكمل بيانات طلب التخفيض'); return; }
  if(type==='subsidy' && (!$('#enPledgeData')?.checked||!$('#enPledgeDeserve')?.checked)){ toast('لازم توافق على التعهّدين قبل إرسال الطلب'); return; }
  $('#enBtn').disabled=true; $('#enBtn').textContent='جارٍ الإرسال...';
  const age=+($('#enAge')?.value)||null;
  let studentId=null, parentId=null;
  try{
    if(ME.role==='parent'){
      parentId=ME.id;
      if(childId==='new'||!childId||childId==='null'){
        const email=$('#enEmail')?.value.trim()||null;
        const { data:ns, error:e1 }=await sb.from('students').insert({
          full_name:name, initials:name.slice(0,2), age,
          parent_id:ME.id, quran_path:pathId,
          enrollment_status:(type==='subsidy'?'awaiting_subsidy':'awaiting_payment'), is_subsidized:type==='subsidy'

let RECEIPT_DATA=null;
function previewReceipt(input){
  const f=input.files[0]; if(!f)return;
  // تأكيد إن الملف صورة فقط
  if(!f.type.startsWith('image/')){
    toast('يُسمح برفع الصور فقط (jpg, png...)');
    input.value=''; return;
  }
  if(f.size>3*1024*1024){ toast('الصورة كبيرة — الحد الأقصى ٣ ميجا'); input.value=''; return; }
  const reader=new FileReader();
  reader.onload=e=>{ RECEIPT_DATA=e.target.result; $('#rcContent').innerHTML=`<img src="${e.target.result}" style="max-width:100%;max-height:160px;border-radius:10px"><span style="display:block;margin-top:8px;color:var(--emerald)">✓ تم اختيار الإيصال — اضغط للتغيير</span>`; };
  reader.readAsDataURL(f);
}
async function submitReceipt(studentId, jrId, pathId, subsidized){

    const blob=await (await fetch(RECEIPT_DATA)).blob();

    const { error:upErr }=await sb.storage.from('receipts').upload(fileName, blob, { contentType:'image/jpeg', upsert:true });

    else { receiptUrl=RECEIPT_DATA; }

async function doForgot(){
  const email=$('#fgEmail').value.trim();
  if(!email){ toast('أدخل بريدك الإلكتروني'); $('#fgEmail').focus(); return; }
  $('#fgBtn').disabled=true; $('#fgBtn').textContent='جارٍ الإرسال...';
  // إرسال كود OTP للبريد (Supabase يضع الكود تلقائياً في رسالة OTP)
  let result;
  try{
    result=await sb.auth.signInWithOtp({ email, options:{ shouldCreateUser:false } });
  }catch(ex){
    $('#fgBtn').disabled=false; $('#fgBtn').textContent='إرسال الكود';
    alert('خطأ في الاتصال: '+(ex.message||ex.toString())); return;
  }
  $('#fgBtn').disabled=false; $('#fgBtn').textContent='إرسال الكود';
  if(result.error){
    const e=result.error;
    const msg=e.message||e.error_description||e.msg||JSON.stringify(e);
    const code=e.status||e.code||'';
    // أسباب شائعة
    if(msg.toLowerCase().includes('not found')||msg.toLowerCase().includes('signups not allowed')||msg.toLowerCase().includes('user not found')){
      alert('هذا البريد غير مسجّل في المنصة. تأكّد من كتابته صحيحاً، أو أنشئ حساباً جديداً.'); return;
    }
    if(msg.toLowerCase().includes('rate')||code===429){
      alert('انتظر دقيقة قبل إعادة المحاولة (حد الإرسال).'); return;
    }
    if(msg.toLowerCase().includes('smtp')||msg.toLowerCase().includes('email')){
      alert('مشكلة في إرسال البريد. تأكّد من إعداد SMTP في Supabase.\n\nالتفاصيل: '+msg); return;
    }
    alert('تعذّر الإرسال'+(code?' ('+code+')':'')+': '+msg); return;
  }
  RESET_EMAIL=email;
  AUTH_MODE='reset'; renderAuthBody();
  toast('📧 أُرسل كود التحقق إلى بريدك');
}

async function doReset(){
  const code=$('#rsCode').value.trim();
  const p1=$('#rsPass').value, p2=$('#rsPass2').value;
  if(!code){ toast('أدخل كود التحقق'); $('#rsCode').focus(); return; }
  if(p1.length<6){ toast('كلمة المرور ٦ أحرف على الأقل'); return; }
  if(p1!==p2){ toast('كلمتا المرور غير متطابقتين'); return; }
  $('#rsBtn').disabled=true; $('#rsBtn').textContent='جارٍ التحقق...';
  // التحقق من الكود (يسجّل الدخول)
  const { error:vErr }=await sb.auth.verifyOtp({ email:RESET_EMAIL, token:code, type:'email' });
  if(vErr){ $('#rsBtn').disabled=false; $('#rsBtn').textContent='تأكيد وحفظ كلمة المرور'; alert('الكود غير صحيح أو منتهٍ. تأكّد منه أو أعد الإرسال.'); return; }
  // تحديث كلمة المرور
  const { error }=await sb.auth.updateUser({ password:p1 });
  $('#rsBtn').disabled=false; $('#rsBtn').textContent='تأكيد وحفظ كلمة المرور';

  RESET_EMAIL=null;

  await afterAuth();
}

async function doLogin(){
  const email=$('#lgEmail').value.trim(), pass=$('#lgPass').value;
  if(!email||!pass){ toast('أدخل البريد وكلمة المرور'); return; }
  $('#lgBtn').disabled=true; $('#lgBtn').textContent='جارٍ الدخول...';
  const { error } = await sb.auth.signInWithPassword({ email, password:pass });
  $('#lgBtn').disabled=false; $('#lgBtn').textContent='دخول';
  if(error){
    let m=error.message;
    if(m.includes('Invalid')) m='البريد أو كلمة المرور غير صحيحة. تأكّد منهما، أو اضغط «نسيت كلمة المرور».';
    else if(m.includes('confirm')||m.includes('not confirmed')) m='هذا الحساب يحتاج تأكيداً. اضغط «نسيت كلمة المرور» لاستلام كود وتفعيل دخولك.';
    toast(m); return;
  }
  await afterAuth();
}
async function doSignup(){
  const name=$('#suFull').value.trim(), e1=$('#suEmail2').value.trim(), e2=$('#suEmail3').value.trim();
  const p1=$('#suPass3').value, p2=$('#suPass4').value;
  const age=$('#suAge').value.trim(), phone=$('#suPhone').value.trim();
  const gov=$('#suGov').value.trim();
  // التحقق من كل الحقول المطلوبة
  if(!name){ toast('أدخل الاسم الكامل'); $('#suFull').focus(); return; }
  if(!e1){ toast('أدخل البريد الإلكتروني'); $('#suEmail2').focus(); return; }
  if(e1!==e2){ toast('البريدان غير متطابقين'); $('#suEmail3').focus(); return; }
  if(!age){ toast('أدخل السن'); $('#suAge').focus(); return; }
  if(!phone){ toast('أدخل رقم الهاتف'); $('#suPhone').focus(); return; }
  if(!gov){ toast('أدخل المحافظة/المدينة'); $('#suGov').focus(); return; }
  if(!p1){ toast('أدخل كلمة المرور'); $('#suPass3').focus(); return; }
  if(p1.length<6){ toast('كلمة المرور ٦ أحرف على الأقل'); return; }
  if(p1!==p2){ toast('كلمتا المرور غير متطابقتين'); $('#suPass4').focus(); return; }
  if(SIGNUP_ROLE==='student' && !$('#suTrack').value){ toast('اختر المسار'); return; }
  const fullPhone=($('#suDial')?$('#suDial').value:'')+' '+phone;
  const meta={ role:SIGNUP_ROLE, full_name:name, initials:name.slice(0,2),
    age:age, phone:fullPhone.trim(), gender:$('#suGender').value,
    country:$('#suCountry').value, governorate:gov, residence:$('#suResidence').value };
  if(SIGNUP_ROLE==='student'){ meta.chosen_track=$('#suTrack').value; meta.parent_email=$('#suParentEmail').value.trim(); }
  $('#suBtn2').disabled=true; $('#suBtn2').textContent='جارٍ الإنشاء...';
  const { data:suData, error } = await sb.auth.signUp({ email:e1, password:p1, options:{ data:meta } });
  $('#suBtn2').disabled=false; $('#suBtn2').textContent='إنشاء الحساب';
  if(error){
    if(error.message.includes('already')){ alert('هذا البريد مسجّل بالفعل، سجّل الدخول مباشرة'); switchAuth('login'); }
    else alert('تعذّر الإنشاء: '+error.message);
    return;
  }
  // الحساب أُنشئ — نوجّه لصفحة الدخول ليكتب بياناته ويدخل
  LOGIN_PREFILL=e1;
  switchAuth('login');
  setTimeout(()=>{ const el=$('#lgEmail'); if(el) el.value=e1; }, 100);
  toast('✅ تم إنشاء حسابك! اكتب بريدك وكلمة مرورك وادخل');
}

//
// بعد المصادقة
//
// معالجة دعوات الربط عند تسجيل المدعوّ بنفس البريد
async function processLinkInvites(){
  if(!ME||!ME.email) return;
  const { data:invites }=await sb.from('link_invites').select('*').eq('invite_email',ME.email).eq('status','pending');
  if(!invites||!invites.length) return;
  for(const inv of invites){
    if(inv.inviter_role==='parent'){
      // وليّ الأمر أنشأ حساباً لابنه: هذا المستخدم هو الطالب
      // نضبط دوره طالباً ونربطه بصف الطالب
      if(ME.role!=='student'){ await sb.from('profiles').update({ role:'student' }).eq('id',ME.id); ME.role='student'; }
      if(inv.student_id){ await sb.from('students').update({ login_id:ME.id }).eq('id',inv.student_id); }
    } else if(inv.inviter_role==='student'){
      // الطالب دعا وليّ أمره: هذا المستخدم هو وليّ الأمر
      if(ME.role!=='parent'){ await sb.from('profiles').update({ role:'parent' }).eq('id',ME.id); ME.role='parent'; }
      if(inv.student_id){ await sb.from('students').update({ parent_id:ME.id }).eq('id',inv.student_id); }
    }
    await sb.from('link_invites').update({ status:'linked' }).eq('id',inv.id);
  }
}
async function afterAuth(){
  const { data:{ user } } = await sb.auth.getUser();
  if(!user) return;
  let { data:prof } = await sb.from('profiles').select('*').eq('id',user.id).single();
  if(!prof){ await sb.from('profiles').insert({ id:user.id, role:'parent', full_name:user.email.split('@')[0], email:user.email }); ({ data:prof }=await sb.from('profiles').select('*').eq('id',user.id).single()); }
  ME=prof;
  // معالجة دعوات الربط: هل دُعي هذا المستخدم؟
  try{ await processLinkInvites(); }catch(e){ console.error('link invites:',e); }
  // استعادة النيّة المحفوظة (مسار ضغطه قبل الدخول الإلزامي)
  let intent = PENDING_INTENT;
  if(!intent){ try{ const s=sessionStorage.getItem('pending_intent'); if(s) intent=JSON.parse(s); }catch(e){} }
  if(intent && (ME.role==='parent'||ME.role==='student')){
    PENDING_INTENT=null; try{ sessionStorage.removeItem('pending_intent'); }catch(e){}
    enterDashboard();
    setTimeout(()=>openEnrollFlow(intent.pathId, intent.type), 350);
    return;
  }
  // الوضع العادي: الدخول مباشرة إلى لوحته
  enterDashboard();
}
function enterDashboard(){
  hideAll(); $('#shell').classList.remove('hidden');
  buildShell(); qInjectStudentMenuExtras(); navigate(ME.role==='student'?'roadmap':'dash');
  setTimeout(()=>{ maybeStartTour(); loadNotifications(); maybeShowWelcomeBook(); }, 400);
}
async function logout(){ await sb.auth.signOut(); location.reload(); }

function hideAll(){ ['setupScreen','landing','authScreen','shell','setupWarn'].forEach(id=>$('#'+id)?.classList.add('hidden')); }

// زر الرجوع من اللوحة إلى الرئيسية
function backToLanding(){ hideAll(); const lp=$('#landing'); lp.classList.remove('hidden'); lp.innerHTML=landingHTML(true); loadLandingPrograms(); }

let TOUR_STEP=0;
function maybeStartTour(){

  try{ const key='tour_done_'+ME.id; if(localStorage.getItem(key)) return; }catch(e){}
  TOUR_STEP=0; renderTour();
}
function renderTour(){
  const t=TOURS[ME.role]; if(!t) return;
  const total=t.steps.length+1; // +1 للترحيب
  let body;
  if(TOUR_STEP===0){
    body=`<div class="tour-icon">${t.icon}</div><h2>${t.title}</h2><p>${t.intro}</p>`;
  } else {
    const featsShown=t.steps.slice(0,TOUR_STEP);
    body=`<div class="tour-icon">${t.steps[TOUR_STEP-1][0]}</div><h2>${t.steps[TOUR_STEP-1][1]}</h2><p>${t.steps[TOUR_STEP-1][2]}</p>`;
  }
  const dots=Array.from({length:total},(_,i)=>`<span class="${i===TOUR_STEP?'on':''}"></span>`).join('');
  const last=TOUR_STEP===total-1;
  $('#tourHost').innerHTML=`<div class="tour-bg"><div class="tour-card">
    <button class="tour-skip" onclick="endTour()">تخطّي</button>
    ${body}
    <div class="tour-dots">${dots}</div>
    <div class="tour-actions">
      ${TOUR_STEP>0?`<button class="btn ghost" onclick="tourPrev()">السابق</button>`:''}
      <button class="btn" onclick="${last?'endTour()':'tourNext()'}">${last?'ابدأ الآن 🚀':'التالي'}</button>
    </div>
  </div></div>`;
}
function tourNext(){ TOUR_STEP++; renderTour(); }
function tourPrev(){ if(TOUR_STEP>0)TOUR_STEP--; renderTour(); }
function endTour(){ try{ localStorage.setItem('tour_done_'+ME.id,'1'); }catch(e){} $('#tourHost').innerHTML=''; }
function replayTour(){ TOUR_STEP=0; renderTour(); }

async function myStudentRow(){
  // 1) عبر login_id (الطالب يسجّل دخوله بحسابه) — الطريقة الأساسية
  let { data:d1 }=await sb.from('students').select('*').eq('login_id',ME.id).limit(1);
  if(d1&&d1[0]) return d1[0];
  // 2) لو ولي أمر، نُرجع الطفل الحالي أو الأول
  if(ME.role==='parent'){
    let { data:d3 }=await sb.from('students').select('*').eq('parent_id',ME.id);
    if(d3&&d3.length){
      if(SESSION.currentChild){ const found=d3.find(k=>k.id===SESSION.currentChild); if(found) return found; }
      return d3[0];
    }
  }
  // 3) احتياط: الطالب موجود لكن login_id غير مربوط — نربطه الآن تلقائياً عبر المطابقة بالاسم
  if(ME.role==='student'){
    let { data:d4 }=await sb.from('students').select('*').is('login_id',null).eq('full_name',ME.full_name).limit(1);
    if(d4&&d4[0]){
      await sb.from('students').update({ login_id:ME.id }).eq('id',d4[0].id);
      d4[0].login_id=ME.id; return d4[0];
    }
  }
  return null;
}

async function worshipTable(sid){
  const { data:marks }=await sb.from('worship_marks').select('*').eq('student_id',sid);
  const days=['السبت','الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة'];
  const names=[...new Set(marks.map(m=>m.worship))];
  const get=(w,d)=>{ const m=marks.find(x=>x.worship===w&&x.day_idx===d); return m?m.state:'none'; };
  const dc=s=>s==='done'?'y':s==='part'?'p':'n'; const di=s=>s==='done'?'✓':s==='part'?'◐':'·';
  let h=`<div class="ch"><h3>متابعة العبادات — هذا الأسبوع</h3></div><div style="overflow-x:auto"><table class="wtable"><thead><tr><th class="lbl">العبادة</th>${days.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>`;
  names.forEach(w=>{ h+=`<tr><td class="lbl">${w}</td>${days.map((_,d)=>{const st=get(w,d);return `<td><span class="dot-c ${dc(st)}">${di(st)}</span></td>`;}).join('')}</tr>`; });
  return h+'</tbody></table></div>';
}

// حفظ حقل الحفظ اليومي (upsert)
let HIFZ_SAVE_TIMER={};
async function saveHifzField(studentId, field, value){
  clearTimeout(HIFZ_SAVE_TIMER[field]);
  HIFZ_SAVE_TIMER[field]=setTimeout(async()=>{
    const today=new Date().toISOString().slice(0,10);
    const obj={student_id:studentId, date:today, [field]:value};
    const { error }=await sb.from('daily_hifz').upsert(obj,{onConflict:'student_id,date'});
    if(error){ console.error('hifz save:',error); toast('تعذّر الحفظ'); }
    else { toast('✓ تم الحفظ'); updateHifzProgress(studentId); }
  }, 600);
}
async function updateHifzProgress(studentId){
  const today=new Date().toISOString().slice(0,10);
  const { data }=await sb.from('daily_hifz').select('new_hifz_done,review_near_done,daily_read_done,review_far_done,listening_done').eq('student_id',studentId).eq('date',today).single().catch(()=>({data:null}));
  if(!data) return;
  const done=[data.new_hifz_done,data.review_near_done,data.daily_read_done,data.review_far_done,data.listening_done].filter(Boolean).length;
  const fill=$('.hp-fill'); if(fill) fill.style.width=Math.round(done*100/5)+'%';
  const topB=$('.hp-top b'); if(topB) topB.textContent=ar(done)+' من ٥ '+(done===5?'🏆 أكملت الجميع!':'');
  // تحديث بطاقات الحصون
  const names=['new_hifz_done','review_near_done','daily_read_done','review_far_done','listening_done'];
  document.querySelectorAll('.hifz-castle').forEach((card,i)=>{
    card.classList.toggle('done',!!(data[names[i]]));
  });
}

function studentStatusCard(s){
  const steps=[
    {k:'pending',icon:'🛤️',title:'اختر مسارك',sub:'لم تلتحق بمسار بعد',btn:'<button class="btn" onclick="navigate(\'paths\')">تصفّح المسارات</button>'},
    {k:'awaiting_subsidy',icon:'🤝',title:'بانتظار رد المشرف على التخفيض',sub:'أرسلنا طلب التخفيض للمشرف. سيراجع حالتك ويحدّد القيمة، وعندها يظهر لك زر الدفع.',btn:''},
    {k:'awaiting_payment',icon:'💳',title:'أكمل الدفع',sub:'ارفع إيصال الدفع لتُفعَّل',btn:`<button class="btn" onclick="enrollPayment(${s.id},null,'${s.quran_path||''}',${s.is_subsidized?true:false})">إكمال الدفع</button>`},
    {k:'awaiting_confirm',icon:'📨',title:'بانتظار تأكيد المشرف',sub:'استلمنا إيصالك وسيتم التأكيد قريباً',btn:''},
    {k:'active',icon:'✅',title:'الاشتراك مفعّل',sub:'يمكنك الآن اختيار معلمك',btn:''},
  ];
  const idx=steps.findIndex(x=>x.k===s.enrollment_status);
  if(idx<0||s.enrollment_status==='active') return '';
  const step=steps[idx];
  // في حالة انتظار التخفيض، لا نعرض مسار الدفع كاملاً بل رسالة الانتظار
  if(s.enrollment_status==='awaiting_subsidy'){
    return `<div class="status-journey"><div class="card" style="text-align:center;padding:32px"><div style="font-size:48px;margin-bottom:12px">🤝</div><h3 style="color:var(--navy-deep);margin-bottom:8px">${step.title}</h3><p style="color:var(--muted);font-size:14px;line-height:1.8">${step.sub}</p></div></div>`;
  }
  return `<div class="status-journey">
    <div class="sj-steps">${steps.map((st,i)=>`<div class="sj-step ${i<idx?'done':i===idx?'active':''}"><div class="sj-dot">${i<idx?'✓':(i+1)}</div><span>${st.title}</span></div>`).join('<div class="sj-line"></div>')}</div>
    <div class="sj-current"><div style="font-size:36px;margin-bottom:8px">${step.icon}</div><h3>${step.title}</h3><p>${step.sub}</p>${step.btn}</div>
  </div>`;
}

};
function renderListenItem(c){
  const kind=detectMediaKind(c.url);
  let player='';
  if(kind==='youtube'){
    const vid=ytId(c.url);
    player=`<div class="lt-player"><iframe width="100%" height="200" src="https://www.youtube.com/embed/${vid}" frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen style="border-radius:12px"></iframe></div>`;
  } else if(kind==='audio'){
    player=`<audio controls style="width:100%;margin-top:10px"><source src="${c.url}">متصفحك لا يدعم الصوت.</audio>`;
  } else if(kind==='video'){
    player=`<video controls style="width:100%;max-height:240px;border-radius:12px;margin-top:10px"><source src="${c.url}">متصفحك لا يدعم الفيديو.</video>`;
  } else {
    player=`<a href="${c.url}" target="_blank" class="btn-sm" style="margin-top:10px;display:inline-block;text-decoration:none">▶ فتح الورد</a>`;
  }
  return `<div class="listen-card">
    <div class="lt-head"><div class="lt-icon">🎧</div><div class="lt-info"><b>${c.title}</b><span>${c.level||'ورد سماع'}</span></div></div>
    ${player}
  </div>`;
}
function detectMediaKind(url){
  if(!url) return 'link';
  const u=url.toLowerCase();
  if(u.includes('youtube.com')||u.includes('youtu.be')) return 'youtube';
  if(u.match(/\.(mp3|wav|ogg|m4a|aac)(\?|$)/)) return 'audio';
  if(u.match(/\.(mp4|webm|mov)(\?|$)/)) return 'video';
  return 'link';
}
function ytId(url){
  const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]{11})/);
  return m?m[1]:'';
}

// بطاقة التجديد الشهري
function renewalBox(k){
  if(!k || k.enrollment_status!=='active' || !k.sub_end) return '';
  const end=new Date(k.sub_end); const now=new Date();
  const daysLeft=Math.ceil((end-now)/86400000);
  if(daysLeft>5){
    return `<div class="renew-box ok"><div class="rn-icon">✅</div><div class="rn-info"><b>اشتراك ${esc(k.full_name)} نشِط</b><span>متبقٍّ ${ar(daysLeft)} يوماً (ينتهي ${k.sub_end})</span></div></div>`;
  }
  const expired=daysLeft<=0;
  return `<div class="renew-box ${expired?'expired':'warn'}">
    <div class="rn-icon">${expired?'⏰':'🔔'}</div>
    <div class="rn-info"><b>${expired?'توقّف اشتراك '+esc(k.full_name):'اشتراك '+esc(k.full_name)+' أوشك على الانتهاء'}</b><span>${expired?'⚠️ توقّفت الحلقة. جدّد الآن لاستئناف الحصص.':'متبقٍّ '+ar(Math.max(0,daysLeft))+' أيام — جدّد لتجنّب التوقّف'}</span></div>
    <button class="btn" onclick="renewSubscription(${k.id},'${k.quran_path}',${k.is_subsidized})">🔄 تجديد الاشتراك</button>
  </div>`;
}
// فحص: هل اشتراك الطالب منتهٍ؟ (لتوقيف الحلقة)
function isSubExpired(s){
  if(!s||!s.sub_end||s.enrollment_status!=='active') return false;
  return new Date(s.sub_end) < new Date();
}

async function createPrivateGroup(studentId, pathId){
  const name=$('#pgName').value.trim(); const time=$('#pgTime').value.trim();

  $('#pgBtn').disabled=true; $('#pgBtn').textContent='جارٍ الإنشاء...';
  try{

      notes:$('#pgNotes').value.trim()||null, avg_mastery:0

async function chooseTeacherPage(studentId){
  // نجلب جنس الطالب لفلترة المعلمين
  let studentGender=null;
  if(studentId){ const { data:st }=await sb.from('students').select('gender, login_id, parent_id').eq('id',studentId).single(); studentGender=st?.gender; 
    // لو الطالب ليس له جنس، نأخذ جنس الحساب المرتبط
    if(!studentGender){ const uid=st?.login_id||ME.id; const { data:p }=await sb.from('profiles').select('gender').eq('id',uid).single(); studentGender=p?.gender; }
  }
  // 1) المعلمون المتاحون (مفلترون حسب الجنس)
  let q=sb.from('profiles').select('*').eq('role','teacher').eq('is_available',true);
  if(studentGender) q=q.eq('gender',studentGender);
  const { data:teachers }=await q;
  const tlist=teachers||[];
  if(!tlist.length) return '<div class="card" style="text-align:center;padding:36px"><div style="font-size:40px;margin-bottom:10px">⏳</div><h3 style="color:var(--navy-deep)">لا يوجد معلمون متاحون حالياً</h3><p style="color:var(--muted);font-size:14px">سيتم توفير معلمين قريباً، أو تواصل مع الإدارة.</p></div>';
  // 2) حساب حمل كل معلم (عدد طلابه النشطين)
  const { data:allStuds }=await sb.from('students').select('chosen_teacher_id').eq('enrollment_status','active');
  const load={}; tlist.forEach(t=>load[t.id]=0);
  (allStuds||[]).forEach(s=>{ if(s.chosen_teacher_id&&load[s.chosen_teacher_id]!==undefined) load[s.chosen_teacher_id]++; });
  // 3) التوزيع العادل: أقل حمل، ولا نعرض من يزيد عن الأقل بأكثر من 5
  const minLoad=Math.min(...tlist.map(t=>load[t.id]));
  const eligible=tlist.filter(t=>load[t.id]-minLoad<=5).sort((a,b)=>load[a.id]-load[b.id]);
  return `<div class="choose-grid">${eligible.map(t=>`<div class="teacher-card">
    <div class="tc-av">${t.initials||t.full_name.slice(0,2)}</div>
    <h3>${esc(t.full_name)}</h3>
    ${t.specialty?`<div class="tc-spec">${t.specialty}</div>`:''}
    <div class="tc-meta">${t.experience_years?`<span>📚 ${ar(t.experience_years)} سنوات خبرة</span>`:''}<span>👥 ${ar(load[t.id])} طالب</span></div>
    ${t.bio?`<p class="tc-bio">${t.bio}</p>`:'<p class="tc-bio" style="color:var(--muted)">معلّم في أكاديمية الهدى.</p>'}
    <button class="btn" onclick="pickTeacher('${t.id}',${studentId},'${escJs(t.full_name)}')">اختر هذا المعلم</button>
  </div>`).join('')}</div>
  `;
}

async function saveChild(){

  $('#ckBtn').disabled=true;
  const email=$('#ckEmail').value.trim()||null;
  const { data:ns, error }=await sb.from('students').insert({ full_name:name, initials:name.slice(0,2), age, gender, parent_id:ME.id, phone:$('#ckPhone').value.trim()||null, enrollment_status:'pending' }).select().single();

async function sendWeeklyReport(sid,sName,parentId,parentName,mastery,attendance){

  const msg=`📊 تقرير ${sName} — أسبوع ${week}\n\n✅ نسبة الإتقان: ${pct(mastery)}\n📅 الحضور: ${pct(attendance)}\n\nمن: ${ME.full_name} (معلم حلقة ${SESSION.activeGroup?'الحلقة':''})`;

  const { data:existing }=await sb.from('chats').select('*').contains('party_ids',[ME.id,parentId]);
  let chatId;
  if(existing&&existing.length) chatId=existing[0].id;
  else{
    const { data:nc,error }=await sb.from('chats').insert({ title:parentName, party_ids:[ME.id,parentId] }).select().single();

  if(me){ alert('تعذّر: '+me.message); return; }
  toast('✅ تم إرسال التقرير لـ'+parentName);
}

async function setAtt(sid,status,btn){
  segPick(btn,status==='present'?'done':status==='late'?'part':'no');
  // حدّث نسبة الحضور التقريبية + سجّل في جدول attendance
  const today=new Date().toISOString().slice(0,10);
  await sb.from('attendance').upsert({student_id:sid,day:today,status},{onConflict:'student_id,day'});
  // عدّل نسبة الحضور الإجمالية بشكل بسيط
  if(status==='absent'){ const {data:s}=await sb.from('students').select('attendance').eq('id',sid).single(); if(s)await sb.from('students').update({attendance:Math.max(0,(s.attendance||100)-2)}).eq('id',sid); }
  toast(status==='present'?'✓ حاضر':status==='late'?'متأخر':'غائب');
}
async function setHifz(sid,kind,btn){
  segPick(btn,kind);
  const val=kind==='done'?95:kind==='part'?75:50;
  await sb.from('students').update({mastery:val}).eq('id',sid);
  // حدّث خانة الدرجة في نفس الصف
  const row=btn.closest('tr'); const inp=row.querySelector('.grade-input'); if(inp)inp.value=ar(val);
  toast(kind==='done'?'✓ أتقن الحفظ':kind==='part'?'حفظ جزئي':'لم يُتقن');
}
async function saveGrade(sid,val){ const num=String(val).replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d)); const n=Math.min(100,Math.max(0,+num||0)); const { error }=await sb.from('students').update({mastery:n}).eq('id',sid); if(error){alert('تعذّر: '+error.message);return;} toast('✅ تم حفظ الدرجة'); }
function segPick(b,k){ const s=b.parentElement; s.querySelectorAll('button').forEach(x=>x.classList.remove('done','part','no')); b.classList.add(k); }
function openNote(sid,name){ $('#modalHost').innerHTML=`<div class="modal-bg show" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>ملاحظة على ${name}</h3><div class="field"><textarea id="noteTxt" rows="4" style="width:100%;padding:11px;border:1px solid var(--line);border-radius:11px;font-family:inherit;background:var(--cream)" placeholder="اكتب ملاحظتك..."></textarea></div><div class="modal-actions"><button class="btn ghost" onclick="closeModal()">إلغاء</button><button class="btn" onclick="saveNote(${sid})">حفظ وإرسال</button></div></div></div>`; }

async function confirmPay(payId, studentId, pathId){
  if(!confirm('تأكيد هذه الدفعة وتفعيل اشتراك الطالب؟'))return;
  const today=new Date().toISOString().slice(0,10);
  // هل الطالب نشط بالفعل؟ (تجديد) أم التحاق أول؟
  const { data:st }=await sb.from('students').select('enrollment_status,sub_end').eq('id',studentId).single();
  const isRenewal = st && st.enrollment_status==='active';
  // نقطة البداية: من نهاية الاشتراك الحالي إن لم ينتهِ، وإلا من اليوم
  let base=new Date();
  if(isRenewal && st.sub_end && new Date(st.sub_end)>base) base=new Date(st.sub_end);
  const nextEnd=new Date(base.getTime()+30*86400000).toISOString().slice(0,10);
  await sb.from('payments').update({ status:'paid', paid_at:today, confirmed_by:ME.id }).eq('id',payId);
  await sb.from('students').update({ enrollment_status:'active', sub_start:isRenewal?st.sub_end||today:today, sub_end:nextEnd }).eq('id',studentId);
  toast(isRenewal?'✅ تم تجديد الاشتراك':'✅ تم التأكيد وتفعيل الاشتراك');
  await navigate('confirm');
}

// ═══════════════ تصدير Excel احترافي ملوّن بهوية أكاديمية الهدى ═══════════════
const XL_EMERALD='0D6B4F', XL_EMERALD2='13987A', XL_GOLD='BF9A45', XL_GOLD_LT='F3EBD6', XL_CREAM='F7F4ED', XL_NAVY='1B3A2E', XL_WHITE='FFFFFF', XL_ROW='EEF5F1';
function xlBorder(){ return { top:{style:'thin',color:{rgb:'D8DDD9'}}, bottom:{style:'thin',color:{rgb:'D8DDD9'}}, left:{style:'thin',color:{rgb:'D8DDD9'}}, right:{style:'thin',color:{rgb:'D8DDD9'}} }; }
// إنشاء ورقة منسّقة: عنوان كبير + ترويسة ملوّنة + صفوف متناوبة
function buildStyledSheet(title, headers, rows){
  // الصف 0: عنوان الورقة (مدمج)، الصف 1: فاصل، الصف 2: الترويسة، ثم البيانات
  const aoa=[[title], [], headers, ...rows];
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  const ncol=headers.length;
  const lastCol=XLSX.utils.encode_col(ncol-1);
  // دمج صف العنوان
  ws['!merges']=[{ s:{r:0,c:0}, e:{r:0,c:ncol-1} }];
  // عرض الأعمدة
  ws['!cols']=headers.map((h,i)=>{ let max=String(h).length; rows.forEach(r=>{ const v=r[i]==null?'':String(r[i]); if(v.length>max)max=v.length; }); return { wch: Math.min(42, Math.max(12, max+4)) }; });
  // ارتفاع الصفوف
  ws['!rows']=[{hpt:34},{hpt:8},{hpt:26}];
  // RTL
  ws['!sheetViews']=[{ rightToLeft:true }];
  // تنسيق خلية العنوان
  const titleCell=ws[XLSX.utils.encode_cell({r:0,c:0})];
  if(titleCell){ titleCell.s={ font:{ name:'Arial', sz:16, bold:true, color:{rgb:XL_WHITE} }, fill:{ patternType:'solid', fgColor:{rgb:XL_EMERALD} }, alignment:{ horizontal:'center', vertical:'center' } }; }
  // باقي خلايا صف العنوان المدموج (لتلوين كامل العرض)
  for(let c=1;c<ncol;c++){ const ad=XLSX.utils.encode_cell({r:0,c}); if(!ws[ad])ws[ad]={t:'s',v:''}; ws[ad].s={ fill:{patternType:'solid',fgColor:{rgb:XL_EMERALD}} }; }
  // تنسيق الترويسة (صف 2)
  for(let c=0;c<ncol;c++){ const ad=XLSX.utils.encode_cell({r:2,c}); if(ws[ad]) ws[ad].s={ font:{name:'Arial',sz:12,bold:true,color:{rgb:XL_WHITE}}, fill:{patternType:'solid',fgColor:{rgb:XL_EMERALD2}}, alignment:{horizontal:'center',vertical:'center'}, border:xlBorder() }; }
  // تنسيق البيانات (صفوف متناوبة)
  for(let r=0;r<rows.length;r++){
    const excelRow=r+3;
    const bg = r%2===0 ? XL_CREAM : XL_WHITE;
    for(let c=0;c<ncol;c++){
      const ad=XLSX.utils.encode_cell({r:excelRow,c});
      if(!ws[ad]) ws[ad]={t:'s',v:''};
      ws[ad].s={ font:{name:'Arial',sz:11,color:{rgb:'2A2A2A'}}, fill:{patternType:'solid',fgColor:{rgb:bg}}, alignment:{horizontal: c===0?'center':'right', vertical:'center'}, border:xlBorder() };
    }
    // العمود الأول (التسلسل/الاسم) غامق
    const first=ws[XLSX.utils.encode_cell({r:excelRow,c:0})];
    if(first) first.s.font={ name:'Arial', sz:11, bold:true, color:{rgb:XL_EMERALD} };
  }
  return ws;
}
function exportExcelMulti(sheets, filename){
  if(typeof XLSX==='undefined'){ alert('جارٍ تحميل أداة التصدير، حاول بعد ثانية.'); return; }
  const wb=XLSX.utils.book_new();
  wb.Props={ Title:'أكاديمية الهدى — تقرير', Author:'أكاديمية الهدى', CreatedDate:new Date() };
  sheets.forEach(sh=>{
    const ws=buildStyledSheet(sh.title||sh.name, sh.headers, sh.rows);
    XLSX.utils.book_append_sheet(wb, ws, sh.name.slice(0,31));
  });
  const today=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, (filename||'أكاديمية_الهدى_تقرير')+'_'+today+'.xlsx');
  toast&&toast('✅ تم تصدير ملف Excel احترافي');
}

async function exportAcademyExcel(){
  toast&&toast('⏳ جارٍ تجهيز التقرير...');

    const [studs, profs, pays, groups]=await Promise.all([
      sb.from('students').select('*, g:groups!students_group_id_fkey(name)'),

    ]);
    const S=studs.data||[], P=profs.data||[], Y=pays.data||[], G=groups.data||[];
    const roleMap={admin:'مدير',executive:'مدير تنفيذي',supervisor:'مشرف',teacher:'معلم',parent:'ولي أمر',student:'طالب'};
    const enrMap={pending:'جديد',awaiting_subsidy:'انتظار تخفيض',awaiting_payment:'انتظار دفع',awaiting_confirm:'انتظار تأكيد',active:'نشط'};

    const staff=P.filter(p=>['admin','executive','supervisor','teacher'].includes(p.role));
    sheets.push({ name:'الطاقم', title:'👥 طاقم وإدارة أكاديمية الهدى', headers:['#','الاسم','الدور','البريد','التخصص','سنوات الخبرة','متاح؟'],

    sheets.push({ name:'المالية', title:'💰 السجل المالي لأكاديمية الهدى', headers:['#','الطالب','المبلغ (ج)','الطريقة','الحالة','مرجع','التاريخ','مخفّض؟'],
      rows:Y.map((x,i)=>[i+1, x.s?x.s.full_name:'—', x.amount||0, x.payment_method==='vodafone'?'فودافون كاش':x.payment_method||'—', x.status==='paid'?'مؤكّد':x.status==='rejected'?'مرفوض':'بانتظار', x.reference_number||'—', x.paid_at||x.created_at?.slice(0,10)||'—', x.is_subsidized?'نعم':'لا']) });
    sheets.push({ name:'الحلقات', title:'🕌 حلقات أكاديمية الهدى', headers:['#','الحلقة','المعلم','النوع','الموعد'],
      rows:G.map((g,i)=>[i+1, g.name||'', g.t?g.t.full_name:'—', g.is_private?'خاصة':'عامة', g.meet_time||'—']) });
    const totalPaid=paidY.reduce((a,x)=>a+(+(x.amount||0)),0);
    const activeCnt=S.filter(s=>s.enrollment_status==='active').length;
    sheets.push({ name:'ملخص الأكاديمية', title:'📊 ملخص سير أكاديمية الهدى', headers:['المؤشر','القيمة'],
      rows:[
        ['إجمالي الطلاب', S.length],['الطلاب النشطون', activeCnt],
        ['طلاب بانتظار الدفع', S.filter(s=>s.enrollment_status==='awaiting_payment').length],
        ['عدد المعلمين', P.filter(p=>p.role==='teacher').length],
        ['عدد المشرفين', P.filter(p=>p.role==='supervisor').length],
        ['عدد أولياء الأمور', P.filter(p=>p.role==='parent').length],
        ['عدد الحلقات', G.length],['إجمالي المحصّل (ج)', totalPaid],

        ['تاريخ التقرير', new Date().toLocaleDateString('ar-EG')]
      ] });
    exportExcelMulti(sheets, 'أكاديمية_الهدى_تقرير_شامل');
  }catch(err){ alert('تعذّر التصدير: '+err.message); }
}

async function saveStudent(editId){
  const name=$('#nName').value.trim(); if(!name){toast('أدخل الاسم');return;}
  $('#stSaveBtn').disabled=true; $('#stSaveBtn').textContent='جارٍ الحفظ...';
  const gid=$('#nGroup').value; 
  const rec={full_name:name, initials:name.slice(0,2), age:+$('#nAge').value||9, track:$('#nTrack').value, group_id:gid?+gid:null};

  if(editId){ ({ error }=await sb.from('students').update(rec).eq('id',editId)); }
  else { rec.attendance=100; rec.behavior=90; rec.points=0; rec.pages=0; ({ error }=await sb.from('students').insert(rec)); }
  if(error){ $('#stSaveBtn').disabled=false; $('#stSaveBtn').textContent='حفظ'; alert('تعذّر الحفظ: '+error.message); return; }
  closeModal(); await navigate('users'); toast(editId?'✅ تم تعديل الطالب':'✅ أُضيف الطالب');
}

function toggleStaffFields(){
  const r=$('#stRole').value;
  $('#stExecFields').style.display = r==='executive'?'block':'none';

async function saveStaff(){
  const role=$('#stRole').value, name=$('#stName').value.trim(), email=$('#stEmail').value.trim(), pass=$('#stPass').value;
  if(!name||!email||!pass){ toast('أكمل البيانات المطلوبة'); return; }
  if(pass.length<6){ toast('كلمة المرور ٦ أحرف على الأقل'); return; }
  $('#stBtn').disabled=true; $('#stBtn').textContent='جارٍ الإنشاء...';
  const meta={ role, full_name:name, initials:name.slice(0,2) };
  // نحفظ جلسة المدير الحالية لاستعادتها بعد signUp
  const { data:sess }=await sb.auth.getSession();
  const { data:signUpData, error }=await sb.auth.signUp({ email, password:pass, options:{ data:meta } });
  if(error){ $('#stBtn').disabled=false; $('#stBtn').textContent='إنشاء الحساب'; alert('تعذّر: '+(error.message.includes('already')?'هذا البريد مسجّل بالفعل':error.message)); return; }
  const newId=signUpData.user?.id;
  // نستعيد جلسة المدير أولاً (لأن signUp بدّل الجلسة للعضو الجديد)
  if(sess&&sess.session){ await sb.auth.setSession({ access_token:sess.session.access_token, refresh_token:sess.session.refresh_token }); }
  // الآن نحن المدير مجدداً — نحدّث دور العضو وحقوله
  if(newId){
    const upd={ role, full_name:name, reports_to:ME.id, gender:$('#stGender').value };
    if(role==='executive') upd.title=$('#stTitle')?.value.trim()||null;
    if(role==='supervisor') upd.department=$('#stDept')?.value.trim()||null;
    if(role==='teacher'){ upd.specialty=$('#stSpec')?.value.trim()||null; upd.is_available=true; }
    const { error:upErr }=await sb.from('profiles').update(upd).eq('id',newId);
    if(upErr){ console.error(upErr); }
  }
  closeModal(); await navigate('staff'); toast('✅ تم إنشاء حساب '+name+' كـ'+roleAr(role));
}

async function chatPage(){ setTop('الرسائل','تواصل مباشر');

  if(list.length && (!SESSION.activeChat||!list.find(c=>c.id===SESSION.activeChat))) SESSION.activeChat=list[0].id;

  let msgs=[];
  if(active){ const { data }=await sb.from('messages').select('*').eq('chat_id',active.id).order('created_at'); msgs=data||[]; }
  return pageHead('الرسائل','محادثاتك')+

      <div class="chat-body" id="chatBody">${msgs.map(m=>`<div class="bubble ${m.sender_id===ME.id?'me':'them'}">${esc(m.body)}<span class="tm">${new Date(m.created_at).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</span></div>`).join('')||'<p style="color:var(--muted);text-align:center;margin-top:30px">ابدأ المحادثة بأول رسالة 👋</p>'}</div>

}
function openChat(id){ SESSION.activeChat=id; navigate(SESSION.page); }
async function sendMsg(){ const inp=$('#chatInput'); const t=inp.value.trim(); if(!t)return;
  const { error }=await sb.from('messages').insert({chat_id:SESSION.activeChat,sender_id:ME.id,body:t});

// بدء محادثة جديدة: يختار المستخدم طرفاً حقيقياً حسب دوره
async function newChatModal(){
  // الصلاحيات: الطالب↔معلم حلقته+المشرف؛ ولي الأمر↔معلمو أبنائه+المشرف؛ المعلم↔أولياء أمور طلابه+المشرف+الإدارة؛ الإدارة↔الكل
  let people=[];
  let myGender=ME.gender;
  if(!myGender){ try{ const { data:gp }=await sb.from('profiles').select('gender').eq('id',ME.id).maybeSingle(); myGender=gp?.gender; }catch(e){} }
  async function addSupervisors(){
    const { data:sups }=await sb.from('profiles').select('id,full_name,gender').eq('role','supervisor');
    (sups||[]).filter(s=>!myGender||!s.gender||s.gender===myGender).forEach(s=>people.push({id:s.id,name:s.full_name+' (المشرف)'}));
  }
  if(ME.role==='teacher'){
    // المعلم في الرسائل العامة يكلّم الإشراف والإدارة فقط
    // (التواصل مع الطلاب وأولياء الأمور يكون من داخل الحلقة الخاصة)
    await addSupervisors();
  } else if(ME.role==='parent'){
    // معلمو أبنائه فقط + المشرف
    const { data:kids }=await sb.from('students').select('group_id, chosen_teacher_id, full_name, g:groups!students_group_id_fkey(teacher_id, teacher:profiles!groups_teacher_id_fkey(id,full_name))').eq('parent_id',ME.id);
    (kids||[]).forEach(k=>{ if(k.g&&k.g.teacher) people.push({id:k.g.teacher.id,name:k.g.teacher.full_name+' (معلم '+k.full_name+')'}); });
    // معلم مختار لم يُنشأ له حلقة بعد
    const teacherIds=(kids||[]).map(k=>k.chosen_teacher_id).filter(Boolean);
    if(teacherIds.length){ const { data:ts }=await sb.from('profiles').select('id,full_name').in('id',teacherIds); (ts||[]).forEach(t=>people.push({id:t.id,name:t.full_name+' (معلم)'})); }
    await addSupervisors();
  } else if(ME.role==='student'){

// حالة الحصة حسب الوقت
function privSessionStatus(s){
  if(s.status==='cancelled') return {t:'ملغاة',c:'r',live:false,upcoming:false};
  if(!s.session_date) return {t:'بانتظار التحديد',c:'gold',live:false,upcoming:true};
  const now=new Date();
  const dt=new Date(s.session_date+'T'+(s.session_time||'00:00'));
  const end=new Date(dt.getTime()+(s.duration_min||30)*60000);
  if(now>=dt && now<=end) return {t:'مباشرة الآن',c:'g',live:true,upcoming:false};
  if(now>end) return {t:'انتهت',c:'n',live:false,upcoming:false};
  return {t:'قادمة',c:'gold',live:false,upcoming:true};
}
function privSessionCard(s, isTeacher, rated){
  const st=privSessionStatus(s);
  const dateStr=s.session_date?new Date(s.session_date).toLocaleDateString('ar-EG',{weekday:'long',day:'numeric',month:'long'}):'—';
  return `<div class="priv-session ${st.live?'live':''}">
    <div class="ps-icon">${st.live?'🔴':st.t==='انتهت'?'✅':'🎥'}</div>
    <div class="ps-info">
      <b>${esc(s.title)}</b>
      <span>${dateStr} ${s.session_time?'• '+s.session_time:''} • ${ar(s.duration_min||30)} دقيقة</span>
      <div style="margin-top:5px"><span class="chip ${st.c}">${st.t}</span> ${rated?'<span class="chip g">قُيّمت ✓</span>':''}</div>
    </div>
    <div class="ps-actions">
      ${(st.live||st.upcoming)&&s.zoom_link?`<a href="${s.zoom_link}" target="_blank" class="btn-sm ${st.live?'':'gold'}" style="text-decoration:none;text-align:center">${st.live?'دخول ▶':'الرابط'}</a>`:''}
      ${isTeacher&&st.t==='انتهت'&&!rated?`<button class="btn-sm" onclick="rateSessionModal(${s.id},${s.student_id})">⭐ تقييم</button>`:''}
      ${isTeacher&&st.t==='انتهت'?`<button class="btn-sm gold" onclick="newAssignmentModal(${s.group_id},${s.student_id},${s.id})">📝 واجب</button>`:''}
      ${isTeacher?`<button class="btn-sm ghost" onclick="editPrivSession(${s.id})">تعديل</button>`:''}
    </div>
  </div>`;
}

function halqaTab(t){

async function sendHalqaMsg(){
  const inp=$('#halqaChatInput'); const t=inp.value.trim(); if(!t)return;
  const ctx=SESSION._halqaChat; if(!ctx)return;

    const { data:nc, error }=await sb.from('chats').insert({ title:'حلقة', party_ids:ctx.parties, halqa_id:ctx.groupId }).select().single();

  inp.value='';

}
