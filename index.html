async function saveAssignment(groupId, studentId, sessionId){
  const title=$('#agTitle').value.trim(), url=$('#agUrl').value.trim(), kind=$('#agKind').value;
  if(!title||!url){ toast('أكمل العنوان والرابط'); return; }
  $('#agBtn').disabled=true; $('#agBtn').textContent='جارٍ الرفع...';
  const rec={ group_id:groupId, student_id:studentId, teacher_id:ME.id, title, kind, url, notes:$('#agNotes').value.trim()||null, due_date:$('#agDue').value||null, status:'pending' };
  if(sessionId) rec.session_id=sessionId;
  const { error }=await sb.from('assignments').insert(rec);
  if(error){ $('#agBtn').disabled=false; $('#agBtn').textContent='رفع الواجب'; alert('تعذّر: '+error.message+'\n\nتأكّد من تشغيل سكربت الواجبات في Supabase.'); return; }
  // إشعار الطالب وولي الأمر
  const { data:stu }=await sb.from('students').select('login_id,parent_id,full_name').eq('id',studentId).single();
  if(stu?.login_id) await pushNotif(stu.login_id,'📝 واجب جديد','رفع معلمك واجب «'+title+'». ادخل حلقتك لأدائه.','homework',groupId);
  if(stu?.parent_id) await pushNotif(stu.parent_id,'📝 واجب جديد لـ'+stu.full_name,'واجب جديد: «'+title+'».','homework',groupId);
  closeModal(); SESSION._activeHalqa=groupId; await navigate('myhalqa');
  setTimeout(()=>halqaTab('homework'),150); toast('✅ تم رفع الواجب');
}

async function rateSessionModal(sessionId, studentId){
  let e={};
  try{ const { data:existing }=await sb.from('session_ratings').select('*').eq('session_id',sessionId).maybeSingle(); e=existing||{}; }catch(ex){ e={}; }
  RATE_DATA={attendance:e.attendance||null,memorization:e.memorization||null,tajweed:e.tajweed||null,review:e.review||null,interaction:e.interaction||null,behavior:e.behavior||null};
  const seg=(field,label,opts)=>`<div class="rate-row"><span class="rate-label">${label}</span><div class="rate-opts" data-field="${field}">${opts.map(o=>`<button class="rate-btn ${e[field]===o[0]?'on':''}" data-val="${o[0]}" onclick="pickRate(this,'${field}')">${o[1]}</button>`).join('')}</div></div>`;
  $('#modalHost').innerHTML=`<div class="modal-bg show" onclick="if(event.target===this)closeModal()"><div class="modal enroll-modal">
    <h3>⭐ تقييم الحصة</h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px">قيّم أداء الطالب في هذه الحصة بضغطات سريعة.</p>
    ${seg('attendance','الحضور',[['present','✓ حاضر'],['late','متأخر'],['absent','✗ غائب']])}
    ${seg('memorization','الحفظ',[['excellent','ممتاز'],['good','جيد'],['weak','ضعيف']])}
    ${seg('tajweed','التجويد',[['excellent','ممتاز'],['good','جيد'],['weak','ضعيف']])}
    ${seg('review','المراجعة',[['done','تمّت'],['partial','جزئية'],['none','لم تتم']])}
    ${seg('interaction','التفاعل',[['excellent','ممتاز'],['good','جيد'],['weak','ضعيف']])}
    ${seg('behavior','السلوك',[['excellent','ممتاز'],['good','جيد'],['weak','ضعيف']])}
    <div class="field" style="margin-top:12px"><label>ملاحظة للطالب وولي الأمر</label><textarea id="rateNotes" rows="2" placeholder="ملاحظتك حول أداء الطالب...">${e.notes||''}</textarea></div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">إلغاء</button><button class="btn" id="rateBtn" onclick="saveRating(${sessionId},${studentId})">💾 حفظ التقييم</button></div>
  </div></div>`;
}
let RATE_DATA={};
function pickRate(btn, field){
  btn.parentElement.querySelectorAll('.rate-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  RATE_DATA[field]=btn.dataset.val;
}
async function saveRating(sessionId, studentId){
  $('#rateBtn').disabled=true; $('#rateBtn').textContent='جارٍ الحفظ...';
  // حساب نقاط
  const sc={excellent:3,good:2,weak:1,done:3,partial:2,none:1,present:3,late:2,absent:0};
  let score=0,cnt=0; Object.values(RATE_DATA).forEach(v=>{ if(v&&sc[v]!=null){score+=sc[v];cnt++;} });
  const ratingScore=cnt?Math.round(score/(cnt*3)*100):0;
  const rec={ session_id:sessionId, student_id:studentId, teacher_id:ME.id, ...RATE_DATA, notes:$('#rateNotes').value.trim()||null, rating_score:ratingScore };
  const { error }=await sb.from('session_ratings').upsert(rec,{onConflict:'session_id'});
  if(error){ $('#rateBtn').disabled=false; $('#rateBtn').textContent='💾 حفظ التقييم'; alert('تعذّر: '+error.message); return; }
  // تحديث حالة الحصة + درجة الطالب
  await sb.from('sessions').update({ status:'done' }).eq('id',sessionId);
  if(RATE_DATA.memorization){ const mv=RATE_DATA.memorization==='excellent'?95:RATE_DATA.memorization==='good'?80:60; await sb.from('students').update({ mastery:mv }).eq('id',studentId); }
  // إشعار الطالب وولي الأمر
  const { data:stu }=await sb.from('students').select('login_id,parent_id,full_name').eq('id',studentId).single();
  if(stu?.login_id) await pushNotif(stu.login_id,'⭐ تقييم حصتك','قيّم معلمك حصتك الأخيرة. اطّلع على تقريرك في «حلقتي».','system',sessionId);
  if(stu?.parent_id) await pushNotif(stu.parent_id,'⭐ تقييم حصة '+stu.full_name,'أضاف المعلم تقييم الحصة. تابعه في «حلقة الأبناء».','system',sessionId);
  closeModal(); if(SESSION._activeHalqa){ await navigate('myhalqa'); } toast('✅ تم حفظ التقييم وإرساله');
}

PAGES.teacher_schedule=async function(){ setTop('جدول حصصي','نظرة أسبوعية على حصصك');

  // حصص هذا الأسبوع
  const now=new Date(); const weekStart=new Date(now); weekStart.setDate(now.getDate()-now.getDay());

/* ============================================================
    جدول الحصص المباشرة
   ============================================================ */
function fmtDateTime(iso){
  const d=new Date(iso);
  const day=d.toLocaleDateString('ar-EG',{weekday:'long',day:'numeric',month:'long'});
  const time=d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  return {day,time,raw:d};
}
function sessionStatus(s){
  const now=new Date(); const st=new Date(s.starts_at); const end=new Date(st.getTime()+s.duration_min*60000);
  if(s.status==='cancelled') return {t:'ملغاة',c:'r',live:false};
  if(now>=st && now<=end) return {t:'مباشرة الآن',c:'g',live:true};
  if(now>end) return {t:'انتهت',c:'n',live:false};
  return {t:'قادمة',c:'gold',live:false};
}
function sessionCard(s,canManage){
  const f=fmtDateTime(s.starts_at); const st=sessionStatus(s);
  return `<div class="up" style="align-items:flex-start">
    <div class="ui" style="${st.live?'background:rgba(13,107,79,0.15)':''}">${st.live?'🔴':'🎥'}</div>
    <div class="utxt" style="flex:1">
      <b>${esc(s.title)}</b>
      <span>${f.day} • ${f.time} • ${ar(s.duration_min)} دقيقة</span>
      <div style="margin-top:6px"><span class="chip ${st.c}">${st.t}</span></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${st.live||st.t==='قادمة' ? `<a href="${s.zoom_url||'#'}" target="_blank" class="btn-sm ${st.live?'':'gold'}" style="text-decoration:none;text-align:center">${st.live?'دخول الحصة ▶':'رابط الحصة'}</a>`:''}
      ${canManage?`<button class="btn-sm ghost" onclick="editSession(${s.id})">تعديل</button>`:''}
    </div>
  </div>`;
}

async function calcPlacement(){
  const name=$('#plName').value.trim()||'الطالب';
  let score=0; PLACEMENT_Q.forEach((_,i)=>{ score+=+$('#plQ'+i).value; });
  const max=PLACEMENT_Q.reduce((a,it)=>a+Math.max(...it.a.map(x=>x[1])),0);
  let level,prog,color;
  if(score>=max*0.7){ level='متقدّم'; prog='حفظ المفصّل أو ربع القرآن'; color='g'; }
  else if(score>=max*0.4){ level='متوسط'; prog='حفظ جزء عمّ وتبارك'; color='gold'; }
  else { level='مبتدئ'; prog='التأسيس والقراءة + جزء عمّ'; color='n'; }
  // حفظ النتيجة
  await sb.from('placement_tests').insert({ student_name:name, parent_id:ME.id, score, level, recommended:prog });
  $('#plResult').innerHTML=`<div style="background:linear-gradient(130deg,var(--emerald),var(--emerald-deep));border-radius:18px;padding:24px;color:#fff;text-align:center">

function downloadTemplate(){
  const csv='full_name,age,track,group_id\nمحمد أحمد,9,both,1\nعبدالرحمن سيد,8,quran,1\n';
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}); const u=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=u; a.download='students-template.csv'; a.click(); URL.revokeObjectURL(u);
}
let IMPORT_ROWS=[];
function parseImport(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    const text=r.result.replace(/^\ufeff/,'');
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    const headers=lines[0].split(',').map(h=>h.trim());
    IMPORT_ROWS=lines.slice(1).map(l=>{ const c=l.split(','); const o={}; headers.forEach((h,i)=>o[h]=(c[i]||'').trim()); return o; });
    renderImportPreview();
  };
  r.readAsText(file,'utf-8');
}
function renderImportPreview(){
  if(!IMPORT_ROWS.length){ $('#importPreview').innerHTML='<div class="card">الملف فارغ أو غير صالح.</div>'; return; }
  $('#importPreview').innerHTML=`<div class="card"><div class="ch"><h3>معاينة (${ar(IMPORT_ROWS.length)} طالباً)</h3><button class="btn gold" onclick="commitImport()">✅ اعتماد وإضافة الكل</button></div>
    <div style="overflow-x:auto"><table class="dtable"><thead><tr><th>الاسم</th><th>العمر</th><th>المسار</th><th>الحلقة</th></tr></thead><tbody>
    ${IMPORT_ROWS.map(r=>`<tr><td>${r.full_name||'—'}</td><td>${ar(r.age||'?')}</td><td>${trackAr(r.track||'both')}</td><td>${ar(r.group_id||'?')}</td></tr>`).join('')}
    </tbody></table></div></div>`;
}
async function commitImport(){
  if(!IMPORT_ROWS.length) return;
  const recs=IMPORT_ROWS.map(r=>({ full_name:r.full_name, initials:(r.full_name||'؟').slice(0,2), age:+r.age||9, track:r.track||'both', group_id:+r.group_id||null, attendance:100, behavior:90 }));
  const { error }=await sb.from('students').insert(recs);
  if(error){ toast('خطأ: '+error.message); return; }
  IMPORT_ROWS=[]; $('#importPreview').innerHTML='';
  toast('✅ تمت إضافة الطلاب بنجاح');
  navigate('import');
}

function qToggleDay(dayInt, checked){
  // Toggle between study/rest/off cyclically via clicks of the label, but checkbox onchange just toggles study on/off.
  // Simpler approach: clicking moves through Study → Rest → Off
  // We'll implement 3-state via container click rather than checkbox.
  // For now: checked = add to study; unchecked = add to rest by default if cleared from study.
  const lbl = document.querySelector(`#qfDays label[data-day="${dayInt}"]`);
  if(!lbl) return;
  if(checked){
    lbl.classList.remove('rest');
    lbl.classList.add('on');
  } else {
    // toggle to rest mode
    if(lbl.classList.contains('rest')){
      lbl.classList.remove('on','rest');
    } else {
      lbl.classList.add('rest','on');
    }
  }
}

async function qSaveSystem(id){
  const name = $('#qfName').value.trim();
  if(!name){ toast('اسم النظام مطلوب'); return; }
  const description = $('#qfDesc').value.trim();
  const track = $('#qfTrack').value;
  const plan_type = $('#qfPlanType').value;
  const path_key = $('#qfPathKey').value || null;
  const status = $('#qfStatus').value;
  const target_audience = $('#qfAudience').value.trim() || null;
  const weeksRaw = $('#qfWeeks').value;
  const expected_duration_weeks = weeksRaw ? parseInt(weeksRaw) : null;
  const default_start_date = $('#qfStartDate').value || null;

  const studyDays=[], restDays=[];
  document.querySelectorAll('#qfDays label').forEach(lbl=>{
    const d = parseInt(lbl.dataset.day);
    if(lbl.classList.contains('rest')) restDays.push(d);
    else if(lbl.classList.contains('on')) studyDays.push(d);
  });

  const payload = {
    name, description, track, plan_type, path_key, status, target_audience,
    expected_duration_weeks, default_start_date,
    study_days: studyDays, rest_days: restDays,
    updated_at: new Date().toISOString()
  };

  if(id){
    const { data: before } = await sb.from('quran_systems').select('*').eq('id',id).maybeSingle();
    const { error } = await sb.from('quran_systems').update(payload).eq('id',id);
    if(error){ toast('تعذّر الحفظ: '+error.message); return; }
    await sb.from('quran_system_audit').insert({ system_id:id, actor_id:ME.id, action:'system_updated', before_data:before, after_data:payload });
    toast('✅ تم حفظ التعديلات');
    QSTATE.tab='stations'; navigate(SESSION.page);
  } else {
    payload.created_by = ME.id;
    const { data: ns, error } = await sb.from('quran_systems').insert(payload).select().maybeSingle();
    if(error){ toast('تعذّر الإنشاء: '+error.message); return; }
    // seed default fortresses — نظام "رسوخ" يفعّل الخمسة، و"الطالب يختار" يفعّل فقط الثلاثة الأولى
    // (الحفظ الجديد، المراجعة القريبة، المراجعة البعيدة) ويعطّل التلاوة والسماع
    const fortRows = QURAN_DEFAULT_FORTRESSES.map((f,i)=>({
      system_id: ns.id, code:f.code, name:f.name, color:f.color, icon:f.icon,
      default_unit:f.default_unit, order_index:i+1,
      is_enabled: plan_type==='flexible' ? i<3 : true
    }));
    await sb.from('quran_fortresses').insert(fortRows);
    await sb.from('quran_system_audit').insert({ system_id:ns.id, actor_id:ME.id, action:'system_created', after_data:payload });
    toast('🎉 تم إنشاء النظام بنجاح');
    QSTATE.systemId = ns.id; QSTATE.tab='stations'; navigate(SESSION.page);
  }
}

    system_id: systemId,
    order_index: parseInt($('#qsOrder').value)||1,
    name,
    description: $('#qsDesc').value.trim() || null,
    entry_conditions: $('#qsEntry').value.trim() || null,
    exit_conditions: $('#qsExit').value.trim() || null,
    expected_duration_days: parseInt($('#qsDays').value)||null,
    min_completion_pct: parseFloat($('#qsCompl').value)||0,
    min_mastery_pct: parseFloat($('#qsMastery').value)||0,
    requires_exam: $('#qsExam').checked
  };

  if(stationId){
    const { error } = await sb.from('quran_stations').update(payload).eq('id',stationId);
    if(error){ toast('تعذّر الحفظ: '+error.message); return; }
    toast('✅ تم حفظ المحطة');
  } else {
    const { data: ns, error } = await sb.from('quran_stations').insert(payload).select().maybeSingle();
    if(error){ toast('تعذّر الإنشاء: '+error.message); return; }
    // seed station_fortress_config with defaults from each fortress
    const { data: forts } = await sb.from('quran_fortresses').select('*').eq('system_id',systemId);
    if(forts && forts.length){
      const cfg = forts.map(f=>{
        const dflt = QURAN_DEFAULT_FORTRESSES.find(x=>x.code===f.code);
        return { station_id: ns.id, fortress_id: f.id, daily_amount: dflt?dflt.daily:5, unit: f.default_unit, is_enabled:true };
      });
      await sb.from('quran_station_fortress_config').insert(cfg);
    }
    toast('🎉 تم إنشاء المحطة');
  }
  qCloseModal();
  navigate(SESSION.page);
}

}
async function qUpdateFortressColor(id, color){
  await sb.from('quran_fortresses').update({ color }).eq('id',id);
  navigate(SESSION.page);
}
async function qUpdateFortressUnit(id, unit){
  await sb.from('quran_fortresses').update({ default_unit: unit }).eq('id',id);
  toast('تم الحفظ');
}
async function qToggleFortress(id, newVal){
  await sb.from('quran_fortresses').update({ is_enabled: newVal }).eq('id',id);
  navigate(SESSION.page);
}
async function qUpdateCfg(stationId, fortressId, field, value){
  const { data: existing } = await sb.from('quran_station_fortress_config').select('*').eq('station_id',stationId).eq('fortress_id',fortressId).maybeSingle();
  let val = value;
  if(field==='daily_amount') val = parseFloat(value)||0;
  if(field==='is_enabled') val = (value===true||value==='true');
  if(existing){
    await sb.from('quran_station_fortress_config').update({ [field]: val }).eq('id',existing.id);
  } else {
    const obj = { station_id:stationId, fortress_id:fortressId, daily_amount:0, unit:'verse', is_enabled:true };
    obj[field] = val;
    await sb.from('quran_station_fortress_config').insert(obj);
  }
  if(field==='is_enabled') navigate(SESSION.page);
  else toast('تم الحفظ');
}

async function generatePlanSchedule(planId){
  // 1) Load plan + assessment + system + stations + fortress configs
  const { data: plan } = await sb.from('quran_student_plans').select('*').eq('id',planId).maybeSingle();
  if(!plan){ throw new Error('الخطة غير موجودة'); }
  const { data: assess } = await sb.from('quran_student_assessment').select('*').eq('plan_id',planId).maybeSingle();
  const { data: forts } = await sb.from('quran_fortresses').select('*').eq('system_id',plan.system_id).eq('is_enabled',true).order('order_index');
  const { data: stations } = await sb.from('quran_stations').select('*').eq('system_id',plan.system_id).order('order_index');
  if(!forts || !forts.length){ throw new Error('النظام لا يحوي حصوناً مفعّلة'); }

  // pick first station (or current_station_id)
  const station = stations.find(s=>s.id===plan.current_station_id) || stations[0];
  if(!station){ throw new Error('لا توجد محطات في النظام'); }
  const { data: cfgs } = await sb.from('quran_station_fortress_config').select('*').eq('station_id',station.id);
  const cfgMap = {}; (cfgs||[]).forEach(c=>{ cfgMap[c.fortress_id]=c; });

  // 2) Setup cursors from assessment
  let curSurah = (assess && assess.current_surah_no) || 78; // النبأ default
  let curAyah  = (assess && assess.current_ayah_no) || 0;
  let curRead  = (assess && assess.current_read_page) || 1;
  let curLisn  = (assess && assess.current_listen_page) || 1;
  const farPool = (assess && assess.far_review_pool) || [];
  let farIdx = 0;

  // 3) Determine date range
  const startDate = new Date(plan.start_date);
  const studyDays = plan.study_days||[1,2,3,4,5];
  const restDays  = plan.rest_days ||[6,7];
  const days = parseInt(station.expected_duration_days)||90;

  // 4) Generate wards array
  const wards = [];
  let dayIdx = 0;
  let dt = new Date(startDate);
  let studyDayCount = 0;
  const maxIter = days + 60; // safety
  for(let i=0; i<maxIter; i++){
    const dow = dt.getDay(); // 0=Sun
    const dowInt = dow+1;    // 1=Sunday ... 7=Saturday matching our convention
    const isStudy = studyDays.includes(dowInt);
    const isRest  = restDays.includes(dowInt);
    const dateStr = dt.toISOString().slice(0,10);

    if(isStudy){
      studyDayCount++;
      dayIdx++;
      // For each fortress, generate ward
      for(const f of forts){
        const cfg = cfgMap[f.id] || { daily_amount:5, unit:f.default_unit, is_enabled:true };
        if(!cfg.is_enabled) continue;
        const amount = parseFloat(cfg.daily_amount)||0;
        const unit = cfg.unit || f.default_unit;
        const w = { plan_id:planId, planned_date:dateStr, day_index:dayIdx, is_rest_day:false,
                    fortress_code:f.code, fortress_id:f.id, teacher_note:null };

        if(f.code==='new_hifz'){
          const s = surahByNo(curSurah);
          if(!s){ continue; }
          let from = curAyah+1;
          let to = Math.min(curAyah+amount, s.ayat);
          w.surah_no = s.no; w.surah_name = s.name;
          w.ayah_from = from; w.ayah_to = to;
          w.amount_label = `${s.name} • ${from} → ${to}`;
          curAyah = to;
          if(curAyah >= s.ayat){
            // move to next surah (next in mushaf order; for جزء عمّ flow this goes backwards but plan defines order)
            // Default: continue forward by surah_no - 1 (i.e. النبأ -> النازعات -> ...)
            const next = curSurah + 1;
            if(next<=114){ curSurah=next; curAyah=0; }
            else { curSurah=null; }
          }
        } else if(f.code==='review_near'){
          const s = surahByNo(curSurah);
          if(s && curAyah>0){
            w.surah_no = s.no; w.surah_name = s.name;
            w.ayah_from = 1; w.ayah_to = curAyah;
            w.amount_label = `${s.name} • ١ → ${curAyah}`;
          } else {
            w.surah_no = s?s.no:null; w.surah_name = s?s.name:'—';
            w.amount_label = 'لا مراجعة قريبة بعد';
            w.whole_surah = false;
          }
        } else if(f.code==='review_far'){
          const reviewMode = plan.far_review_mode || 'daily_rotation';
          if(farPool.length){
            let target;
            if(reviewMode==='weekly_focus'){
              // change surah every 5 study days
              const poolIdx = Math.floor(studyDayCount / 5) % farPool.length;
              target = farPool[poolIdx];
            } else {
              // daily_rotation: new surah every day
              target = farPool[farIdx % farPool.length];
              farIdx++;
            }
            const sn = typeof target==='object' ? target.surah_no : target;
            const s = surahByNo(sn);
            if(s){
              w.surah_no=s.no; w.surah_name=s.name;
              w.whole_surah=true;
              w.amount_label = `${s.name} (كاملة)`;
            }
          } else {
            w.amount_label = 'لا مراجعة بعيدة';
          }
        } else if(f.code==='reading'){
          let from = curRead;
          let to = Math.min(curRead + Math.max(0,amount-1), 604);
          w.page_from = from; w.page_to = to;
          w.amount_label = `صفحة ${from} → ${to}`;
          curRead = to + 1;
          if(curRead>604) curRead=1;
        } else if(f.code==='listening'){
          let from = curLisn;
          let to = Math.min(curLisn + Math.max(0,amount-1), 604);
          w.page_from = from; w.page_to = to;
          w.amount_label = `صفحة ${from} → ${to}`;
          curLisn = to + 1;
          if(curLisn>604) curLisn=1;
        }
        wards.push(w);
      }
      if(studyDayCount >= days) break;
    } else if(isRest){
      // create a rest day marker (one record without fortress detail)
      // we'll skip wards but add a marker via a single record using first fortress code
      // Simpler: skip rest days entirely; the calendar will infer them
    }
    dt.setDate(dt.getDate()+1);
    if(i>maxIter-2) break;
  }

  // 5) Insert wards in batches
  const batchSize = 500;
  for(let i=0; i<wards.length; i+=batchSize){
    const batch = wards.slice(i,i+batchSize);
    const { error } = await sb.from('quran_plan_wards').insert(batch);
    if(error) throw new Error('تعذّر إدراج الأوراد: '+error.message);
  }

  // 6) Update plan end_date_target
  const lastDate = wards.length ? wards[wards.length-1].planned_date : plan.start_date;
  await sb.from('quran_student_plans').update({ end_date_target:lastDate, current_station_id:station.id, updated_at:new Date().toISOString() }).eq('id',planId);

  return { count:wards.length, end:lastDate };
}

PAGES.teacher_qplans = async function(){
  setTop('خطط طلابي','إدارة خطط القرآن');
  // students from teacher's groups
  const { data: groups } = await sb.from('groups').select('id').eq('teacher_id',ME.id);
  const gids = (groups||[]).map(g=>g.id);
  let students = [];
  if(gids.length){
    const { data: sts } = await sb.from('students').select('id,full_name,login_id,quran_path').in('group_id',gids);
    students = sts||[];
  }

  if(!students.length){
    return pageHead('خطط طلابي','') + `<div class="qnoplan"><div class="nei">🎓</div><h3>لا طلاب بعد</h3><p>سيظهر طلابك هنا بعد توزيعهم على حلقاتك من قبل الإدارة.</p></div>`;
  }

  const sids = students.map(s=>s.id);
  const { data: plans } = await sb.from('quran_student_plans').select('*').in('student_id',sids);
  const planMap = {}; (plans||[]).forEach(p=>{ planMap[p.student_id]=p; });

  // counts for wards
  const planIds = (plans||[]).map(p=>p.id);
  let progressMap = {};
  if(planIds.length){
    const { data: wards } = await sb.from('quran_plan_wards').select('id,plan_id,planned_date').in('plan_id',planIds);
    const today = new Date().toISOString().slice(0,10);
    (wards||[]).forEach(w=>{
      if(!progressMap[w.plan_id]) progressMap[w.plan_id]={total:0,past:0};
      progressMap[w.plan_id].total++;
      if(w.planned_date<=today) progressMap[w.plan_id].past++;
    });
  }

  const rows = students.map(s=>{
    const p = planMap[s.id];
    if(!p){
      return `<div class="qstu-row qstu-noplan" onclick="qOpenWizard('${esc(s.id)}')">
        <div class="qstu-ava">+</div>
        <div class="qstu-info"><b>${esc(s.full_name)}</b><small>لا توجد خطة بعد — اضغط لإنشائها</small></div>
        <div class="qstu-stat"><b>—</b>الخطة</div>
      </div>`;
    }
    const prog = progressMap[p.id] || {total:0,past:0};
    const pct = prog.total ? Math.round(prog.past/prog.total*100) : 0;
    const statusLbl = p.status==='active'?'نشطة':p.status==='paused'?'متوقفة':p.status==='completed'?'مكتملة':'ملغاة';
    return `<div class="qstu-row" onclick="qOpenStudentPlan('${esc(p.id)}')">
      <div class="qstu-ava">${esc(s.full_name.charAt(0))}</div>
      <div class="qstu-info"><b>${esc(s.full_name)}</b><small>${statusLbl} · بداية: ${esc(p.start_date)}</small></div>
      <div class="qstu-stat"><b>${ar(prog.total)}</b>يوم</div>
      <div class="qstu-stat"><b>${ar(pct)}٪</b>التقدم</div>
    </div>`;
  }).join('');

  return pageHead('خطط طلابي','إنشاء ومتابعة خطط القرآن لطلابك') + rows;
};

/* qOpenStudentPlan تعريفه الفعلي أدناه (نسخة Phase 3 المحسّنة) */

async function renderWizardInline(){
  const host = $('#pageHost');
  host.innerHTML = '<div class="card" style="text-align:center">جارٍ التحميل...</div>';
  host.innerHTML = await renderWizard();
}

async function renderWizard(){
  const studentId = QPLAN_STATE.studentId;
  const { data: stu } = await sb.from('students').select('id,full_name,login_id,quran_path').eq('id',studentId).maybeSingle();
  if(!stu){ return '<div class="card">الطالب غير موجود</div>'; }

  // get linked program -> system
  let linkedSystem = null;
  if(stu.quran_path){
    const { data: prog } = await sb.from('programs').select('id,name,quran_system_id').eq('id',stu.quran_path).maybeSingle();
    if(prog && prog.quran_system_id){
      const { data: sys } = await sb.from('quran_systems').select('*').eq('id',prog.quran_system_id).maybeSingle();
      linkedSystem = sys;
    }
  }
  const { data: allSys } = await sb.from('quran_systems').select('*').eq('status','active').order('created_at',{ascending:false});

  const step = QPLAN_STATE.step;
  const stepLabels = [
    {n:1,t:'النظام والمسار'},
    {n:2,t:'السور المحفوظة'},
    {n:3,t:'الموقع الحالي'},
    {n:4,t:'المراجعة البعيدة'},
    {n:5,t:'المعاينة والحفظ'}
  ];
  const stepsHtml = stepLabels.map(s=>`<div class="qwstep ${step===s.n?'on':step>s.n?'done':''}"><b>${ar(s.n)}</b>${s.t}</div>`).join('');

  let body = '';
  if(step===1){ body = renderStep1(stu, linkedSystem, allSys||[]); }
  else if(step===2){ body = renderStep2(); }
  else if(step===3){ body = renderStep3(); }
  else if(step===4){ body = renderStep4(); }
  else if(step===5){ body = await renderStep5(stu); }

  return `<button class="qback" onclick="navigate('qplans')">← الرجوع لقائمة الطلاب</button>` +
    pageHead('إنشاء خطة لـ '+esc(stu.full_name), 'ويزرد التقييم وإنشاء الخطة') +
    `<div class="qwsteps">${stepsHtml}</div>` +
    `<div class="card" style="padding:22px">${body}</div>`;
}

  const today = new Date().toISOString().slice(0,10);
  if(!d.start_date) d.start_date = today;

  const sysOpts = allSys.map(s=>`<option value="${esc(s.id)}" ${d.system_id===s.id?'selected':''}>${esc(s.name)} (${s.track==='general'?'عام':'حصون'})</option>`).join('');
  const linkedNote = linkedSystem ? `<div style="background:rgba(13,107,79,0.08);border-inline-start:3px solid var(--emerald);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--emerald-deep)">🔗 برنامج الطالب «${esc(stu.quran_path?'':'') }» مرتبط بنظام: <b>${esc(linkedSystem.name)}</b></div>` : '';

  return `${linkedNote}
  <div class="qform">
    <div>
      <label>اختر النظام التعليمي</label>
      <select id="qwSystem">${sysOpts || '<option value="">لا توجد أنظمة نشطة — أنشئ نظاماً من لوحة الإدارة</option>'}</select>
    </div>
    <div class="qrow">
      <div>
        <label>تاريخ البداية</label>
        <input type="date" id="qwStart" value="${esc(d.start_date)}" />
      </div>
      <div>
        <label>السماح بالتقدم المبكر</label>
        <select id="qwEarly">
          <option value="true" ${d.allow_early_progress!==false?'selected':''}>نعم — يستطيع الطالب التقدم</option>
          <option value="false" ${d.allow_early_progress===false?'selected':''}>لا — يلتزم بترتيب الأيام</option>
        </select>
      </div>
    </div>
    <div>
      <label>ملاحظات (اختياري)</label>
      <textarea id="qwNotes" placeholder="ملاحظات خاصة عن الطالب أو الخطة">${esc(d.notes||'')}</textarea>
    </div>
    <div class="qsticky">
      <button class="btn" onclick="qWizNext(1)">التالي ←</button>
    </div>
  </div>`;
}

function renderStep2(){
  const d = QPLAN_STATE.data;
  const memList = d.prior_memorized||[];
  const memMap = {}; memList.forEach(m=>{ memMap[m.surah_no]=m.mastery; });

  const grid = QURAN_SURAHS.map(s=>{
    const on = (s.no in memMap);

      <small>${ar(s.ayat)}آ</small>
    </div>`;
  }).join('');

  return `<p style="color:var(--muted);font-size:13.5px;line-height:1.9;margin-bottom:14px">اختر السور التي حفظها الطالب سابقاً بالكامل. ستُستخدم في حصن «المراجعة البعيدة».</p>
  <div class="qsurahgrid" id="qSurahGrid">${grid}</div>
  <div style="margin-top:12px;font-size:13px;color:var(--emerald-deep);font-weight:700">المختار: <span id="qMemCount">${ar(memList.length)}</span> سورة</div>
  <div class="qsticky">

function qToggleMem(no){
  const d = QPLAN_STATE.data;
  if(!d.prior_memorized) d.prior_memorized=[];
  const idx = d.prior_memorized.findIndex(m=>m.surah_no===no);
  if(idx>=0) d.prior_memorized.splice(idx,1);
  else d.prior_memorized.push({surah_no:no, mastery:3});
  // refresh just the grid
  const cells = document.querySelectorAll('#qSurahGrid .qsuracell');
  cells.forEach((c,i)=>{
    const surah = QURAN_SURAHS[i];
    if(d.prior_memorized.find(m=>m.surah_no===surah.no)) c.classList.add('on');
    else c.classList.remove('on');
  });
  $('#qMemCount').textContent = ar(d.prior_memorized.length);
}

function renderStep4(){
  const d = QPLAN_STATE.data;
  const pool = d.far_review_pool || [];
  const memorized = d.prior_memorized||[];
  if(!memorized.length){
    return `<div style="background:var(--cream);border-radius:14px;padding:30px;text-align:center;color:var(--muted)">

    <b style="font-family:Amiri">${m.l}</b><br><small style="opacity:0.85">${m.d}</small>
  </label>`).join('');

  const poolHtml = memorized.map(m=>{
    const s = surahByNo(m.surah_no);
    const inPool = pool.find(p=>(typeof p==='object'?p.surah_no:p)===m.surah_no);
    return `<div class="qsuracell ${inPool?'on':''}" onclick="qTogglePool(${m.surah_no})">
      <span class="qsn">${esc(s?s.name:'')}</span>
      <small>${ar(s?s.ayat:0)}آ</small>

  }).join('');

  return `<p style="color:var(--muted);font-size:13.5px;line-height:1.9;margin-bottom:14px">اختر نمط المراجعة البعيدة، ثم حدّد السور التي تدخل دورة المراجعة.</p>
  <label style="display:block;margin-bottom:8px;font-weight:700;color:var(--navy-deep)">نمط المراجعة</label>
  <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap">${modeBtns}</div>
  <label style="display:block;margin-bottom:8px;font-weight:700;color:var(--navy-deep)">سور المراجعة البعيدة (من السور المحفوظة)</label>
  <div class="qsurahgrid" id="qPoolGrid">${poolHtml}</div>
  <div style="margin-top:12px;font-size:13px;color:var(--emerald-deep);font-weight:700">مختار: <span id="qPoolCount">${ar(pool.length)}</span></div>
  <div class="qsticky">
    <button class="btn ghost" onclick="qWizPrev(4)">→ السابق</button>
    <button class="btn" onclick="qWizNext(4)">التالي ←</button>
  </div>`;
}

function qSetMode(m){ QPLAN_STATE.data.far_review_mode=m; renderWizardInline(); }
function qTogglePool(no){
  const d = QPLAN_STATE.data;
  if(!d.far_review_pool) d.far_review_pool=[];
  const idx = d.far_review_pool.findIndex(p=>(typeof p==='object'?p.surah_no:p)===no);
  if(idx>=0) d.far_review_pool.splice(idx,1);
  else d.far_review_pool.push({surah_no:no});
  // refresh
  document.querySelectorAll('#qPoolGrid .qsuracell').forEach(c=>{
    const txt = c.querySelector('.qsn').textContent;
    const s = QURAN_SURAHS.find(x=>x.name===txt);
    if(s && d.far_review_pool.find(p=>(typeof p==='object'?p.surah_no:p)===s.no)) c.classList.add('on');
    else c.classList.remove('on');
  });
  $('#qPoolCount').textContent = ar(d.far_review_pool.length);
}

function qWizNext(currentStep){
  // capture inputs for current step
  const d = QPLAN_STATE.data;
  if(currentStep===1){
    d.system_id = $('#qwSystem').value;
    if(!d.system_id){ toast('اختر نظاماً'); return; }
    d.start_date = $('#qwStart').value;
    d.allow_early_progress = $('#qwEarly').value==='true';
    d.notes = $('#qwNotes').value.trim();
  } else if(currentStep===3){
    d.current_surah_no = parseInt($('#qwCurSurah').value);
    d.current_ayah_no = parseInt($('#qwCurAyah').value)||0;
    d.current_read_page = parseInt($('#qwReadPage').value)||1;
    d.current_listen_page = parseInt($('#qwListenPage').value)||1;
  }
  QPLAN_STATE.step = currentStep+1;
  renderWizardInline();
}
function qWizPrev(currentStep){ QPLAN_STATE.step = Math.max(1,currentStep-1); renderWizardInline(); }

async function qSaveAndGenerate(studentId){
  const btn = $('#qwSaveBtn'); if(btn) btn.disabled=true;
  const d = QPLAN_STATE.data;
  try{
    const { data: stu } = await sb.from('students').select('login_id').eq('id',studentId).maybeSingle();
    // 1) Create plan
    const planPayload = {
      student_id: studentId,
      login_id: stu?stu.login_id:null,
      system_id: d.system_id,
      teacher_id: ME.id,
      start_date: d.start_date,
      status: 'active',
      far_review_mode: d.far_review_mode||'daily_rotation',
      allow_early_progress: d.allow_early_progress!==false,
      notes: d.notes||null,
      created_by: ME.id
    };
    const { data: plan, error: e1 } = await sb.from('quran_student_plans').insert(planPayload).select().maybeSingle();
    if(e1) throw new Error(e1.message);

    // 2) Save assessment
    const assessPayload = {
      plan_id: plan.id,
      current_surah_no: d.current_surah_no,
      current_ayah_no: d.current_ayah_no||0,
      current_read_page: d.current_read_page||1,
      current_listen_page: d.current_listen_page||1,
      prior_memorized: d.prior_memorized||[],
      far_review_pool: d.far_review_pool||[]
    };
    const { error: e2 } = await sb.from('quran_student_assessment').insert(assessPayload);
    if(e2) throw new Error(e2.message);

    // 3) Generate schedule
    const res = await generatePlanSchedule(plan.id);
    toast('🎉 تم إنشاء الخطة و'+ar(res.count)+' ورد');
    QPLAN_STATE = { view:'list' };
    navigate('qplans');
  } catch(e){
    if(btn) btn.disabled=false;
    toast('تعذّر الإنشاء: '+e.message);
  }
}

async function renderPlanDetailForTeacher(planId){
  const { data: plan } = await sb.from('quran_student_plans').select('*').eq('id',planId).maybeSingle();
  if(!plan) return '<div class="card">لم تُعثر على الخطة</div>';
  const { data: stu } = await sb.from('students').select('full_name').eq('id',plan.student_id).maybeSingle();
  const { data: sys } = await sb.from('quran_systems').select('name').eq('id',plan.system_id).maybeSingle();
  const { data: wards } = await sb.from('quran_plan_wards').select('*').eq('plan_id',planId).order('planned_date').order('fortress_code');
  const { data: forts } = await sb.from('quran_fortresses').select('*').eq('system_id',plan.system_id);
  const fortMap = {}; (forts||[]).forEach(f=>{ fortMap[f.code]=f; });

  // Group by date
  const byDate = {};
  (wards||[]).forEach(w=>{ if(!byDate[w.planned_date]) byDate[w.planned_date]=[]; byDate[w.planned_date].push(w); });
  const dates = Object.keys(byDate).sort();
  const today = new Date().toISOString().slice(0,10);

  // Progress lookup
  const wardIds = (wards||[]).map(w=>w.id);
  let progMap = {};
  if(wardIds.length){
    const { data: progs } = await sb.from('quran_ward_progress').select('*').in('ward_id',wardIds);
    (progs||[]).forEach(p=>{ progMap[p.ward_id]=p; });
  }

  const daysHtml = dates.map(d=>{
    const cards = byDate[d];
    const klass = d===today?'today':d<today?'past':'';
    const dotEls = cards.map(c=>{
      const p = progMap[c.id];
      const cls = p && p.status==='done' ? (p.is_late?'late':p.is_early?'early':'done') : '';
      return `<span class="qpd ${cls}" title="${esc(c.fortress_code)}"></span>`;
    }).join('');
    const dt = new Date(d);
    const dn = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'][dt.getDay()];
    const items = cards.map(c=>{
      const f = fortMap[c.fortress_code]||{color:'#0d6b4f',icon:'🛡️',name:c.fortress_code};
      const p = progMap[c.id];
      const statusTxt = p?(p.status==='done'?'✓ مكتمل':p.status==='need_help'?'🆘 يحتاج مساعدة':p.status==='skipped'?'تم تخطّيه':'قيد التنفيذ'):'لم يبدأ';
      return `<div class="qplan-mini">
        <div class="qpmic" style="background:${esc(f.color)}">${esc(f.icon||'🛡️')}</div>
        <div style="flex:1;min-width:0"><b>${esc(f.name)}</b><small>${esc(c.amount_label||'—')}</small></div>
        <div style="font-size:11.5px;color:${p&&p.status==='done'?'var(--emerald)':'var(--muted)'};font-weight:700">${esc(statusTxt)}</div>
      </div>`;
    }).join('');
    return `<div class="qplan-day" id="qpd-${esc(d)}">
      <div class="qplan-day-h ${klass}" onclick="document.getElementById('qpd-${esc(d)}').classList.toggle('open')">
        <div>
          <b>${esc(dn)} ${esc(d)}</b>
          ${d===today?'<small style="color:var(--gold);font-weight:700;margin-inline-start:8px">• اليوم</small>':''}
        </div>
        <div class="qpchk">${dotEls}</div>
      </div>
      <div class="qplan-day-body">${items}</div>
    </div>`;
  }).join('');

  // Stats
  const totalCards = (wards||[]).length;
  const doneCards = Object.values(progMap).filter(p=>p.status==='done').length;
  const overallPct = totalCards ? Math.round(doneCards/totalCards*100) : 0;

  return `<button class="qback" onclick="navigate('qplans')">← الرجوع للقائمة</button>` +
    pageHead('خطة '+esc(stu?stu.full_name:''), esc(sys?sys.name:'')) +
    `<div class="card" style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:14px">
      <div><b style="font-family:Amiri;color:var(--emerald-deep);font-size:22px">${ar(dates.length)}</b><div style="color:var(--muted);font-size:12.5px">عدد الأيام</div></div>
      <div><b style="font-family:Amiri;color:var(--emerald-deep);font-size:22px">${ar(totalCards)}</b><div style="color:var(--muted);font-size:12.5px">إجمالي الأوراد</div></div>
      <div><b style="font-family:Amiri;color:var(--emerald);font-size:22px">${ar(doneCards)}</b><div style="color:var(--muted);font-size:12.5px">المنجَز</div></div>
      <div><b style="font-family:Amiri;color:var(--gold);font-size:22px">${ar(overallPct)}٪</b><div style="color:var(--muted);font-size:12.5px">التقدم العام</div></div>
    </div></div>` +
    daysHtml;
}

PAGES.student_qtoday = async function(){
  setTop('ورد اليوم','حصون خطتك اليومية');
  const s = await myStudentRow();
  if(!s) return `<div class="qnoplan"><div class="nei">🌱</div><h3>لا توجد بيانات طالب</h3></div>`;
  const { data: plan } = await sb.from('quran_student_plans').select('*').eq('login_id',ME.id).eq('status','active').maybeSingle();
  if(!plan) return `<div class="qnoplan"><div class="nei">🕋</div><h3>لا توجد خطة بعد</h3><p>سيقوم معلمك بإنشاء خطتك قريباً.</p></div>`;
  const today = qTodayStr();
  const { data: todayWards } = await sb.from('quran_plan_wards').select('*').eq('plan_id',plan.id).eq('planned_date',today).order('fortress_code');
  const { data: overdueWards } = await sb.from('quran_plan_wards').select('*').eq('plan_id',plan.id).lt('planned_date',today);
  const { data: forts } = await sb.from('quran_fortresses').select('*').eq('system_id',plan.system_id);
  const fortMap = {}; (forts||[]).forEach(f=>{ fortMap[f.code]=f; });
  const allWards = [...(overdueWards||[]).slice(-10), ...(todayWards||[])];
  const wardIds = allWards.map(w=>w.id);
  let progMap = {};
  if(wardIds.length){
    const { data: progs } = await sb.from('quran_ward_progress').select('*').in('ward_id',wardIds);
    (progs||[]).forEach(p=>{ progMap[p.ward_id]=p; });
  }
  const total = (todayWards||[]).length;
  const done = (todayWards||[]).filter(w=>{ const p=progMap[w.id]; return p&&p.status==='done'; }).length;
  const pct = total ? Math.round(done/total*100) : 0;
  const lateCount = (overdueWards||[]).filter(w=>{ const p=progMap[w.id]; return !p||p.status!=='done'; }).length;
  const todayLabel = new Date().toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  let html = `<div class="qtoday-hero">
    <h2>📖 ورد اليوم</h2>
    <p>${esc(todayLabel)}</p>
    <div class="qtprog"><i style="width:${pct}%"></i></div>
    <div class="qtstats"><span>أنجزت ${ar(done)} من ${ar(total)} حصن</span><span>${ar(pct)}٪</span></div>
  </div>`;

  if(lateCount){
    html += `<div style="background:rgba(168,77,77,0.08);border-inline-start:3px solid var(--rose);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13.5px;color:#7a2e2e">⏰ لديك <b>${ar(lateCount)}</b> ورد متأخر يظهر أدناه</div>`;
  }

  if(!allWards.length){
    html += `<div class="qnoplan"><div class="nei">🌿</div><h3>يوم راحة</h3><p>لا ورد اليوم — استثمر وقتك في الدعاء والتفكر.</p></div>`;
  } else {
    html += allWards.map(w=>{
      const f = fortMap[w.fortress_code]||{};
      const color = f.color||qFortColor(w.fortress_code);
      const icon = f.icon||qFortIcon(w.fortress_code);
      const fname = f.name||w.fortress_code;
      const p = progMap[w.id];
      const isDone = p&&p.status==='done';
      const isLate = w.planned_date < today;
      const klass = isDone?'done':isLate?'late':'';
      const masteryVal = p&&p.student_mastery ? parseInt(p.student_mastery) : 0;
      const masteryHtml = `<div class="qrate-bar" style="margin-top:6px">
        <small style="color:var(--muted);font-size:12px;margin-inline-end:4px">إتقاني:</small>
        ${[1,2,3,4,5].map(n=>`<span class="${n<=masteryVal?'on':''}" onclick="qRateMastery('${esc(w.id)}',${n})">⭐</span>`).join('')}
      </div>`;
      const noteHtml = `<div style="margin-top:8px"><input type="text" placeholder="ملاحظة (اختياري)" value="${esc(p&&p.student_note||'')}"
        onblur="qSaveStudentNote('${esc(w.id)}',this.value)"
        style="width:100%;padding:8px 10px;border:1.5px solid var(--line);border-radius:9px;background:var(--cream);font-family:'Tajawal';font-size:13px" /></div>`;
      const teacherNote = w.teacher_note ? `<div class="qcwnote">📝 ${esc(w.teacher_note)}</div>` : '';
      const approvedBadge = p&&p.teacher_approved_at ? `<span style="font-size:11px;color:var(--emerald);font-weight:700;background:rgba(13,107,79,0.1);padding:3px 8px;border-radius:8px">✅ معتمد</span>` : '';
      const bodyText = w.surah_name
        ? `<div class="qcwsurah">${esc(w.surah_name)}</div><div class="qcwrange">${w.whole_surah?'كاملة':w.ayah_from?'من '+ar(w.ayah_from||0)+' إلى '+ar(w.ayah_to||0):''}<br><small style="color:var(--muted);font-size:12px">${esc(w.amount_label||'')}</small></div>`
        : `<div class="qcwrange">${esc(w.amount_label||'—')}</div>`;
      const actions = isDone
        ? `<div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">${masteryHtml}${approvedBadge}</div>${noteHtml}`
        : `<div class="qcwacts"><button class="qa-done" onclick="qMarkWard('${esc(w.id)}','done')">✓ أتممت</button><button class="qa-help" onclick="qMarkWard('${esc(w.id)}','need_help')">🆘 مساعدة</button><button class="qa-skip" onclick="qMarkWard('${esc(w.id)}','skipped')">✕ لم أتم</button></div>${noteHtml}`;
      return `<div class="qcardward ${klass}" style="--accent:${color}">
        <div class="qcwh">
          <div class="qcwic" style="background:${color}">${icon}</div>
          <div class="qcwt"><b>${esc(fname)}</b><small>${isLate?'⏰ متأخر من '+esc(w.planned_date):'اليوم'}</small></div>
          <div class="qcwstat">${qStatusLabel(p?p.status:'not_started')}</div>
        </div>
        <div class="qcwbody">${bodyText}</div>
        ${teacherNote}${actions}
      </div>`;
    }).join('');
    // Early progress button
    html += `<div style="text-align:center;margin-top:16px">
      <button class="btn ghost" onclick="navigate('qmyplan')">🚀 التقدم المبكر — افتح أياماً مستقبلية</button>
    </div>`;
  }
  return pageHead('ورد اليوم','') + html;
};

async function qRateMastery(wardId, val){
  const { data: ex } = await sb.from('quran_ward_progress').select('id').eq('ward_id',wardId).maybeSingle();
  if(ex){ await sb.from('quran_ward_progress').update({ student_mastery:val }).eq('id',ex.id); }
  else { await sb.from('quran_ward_progress').insert({ ward_id:wardId, student_login_id:ME.id, student_mastery:val, status:'done', planned_for_date:qTodayStr(), actual_date:qTodayStr() }); }
  // refresh stars only
  const sel = document.querySelector(`[onclick^="qRateMastery('${wardId}"]`)?.closest('.qcardward');
  if(sel){ sel.querySelectorAll('.qrate-bar span').forEach((s,i)=>{ if(i+1<=val) s.classList.add('on'); else s.classList.remove('on'); }); }
  toast('✅ تم حفظ التقييم');
}
async function qSaveStudentNote(wardId, note){
  const { data: ex } = await sb.from('quran_ward_progress').select('id').eq('ward_id',wardId).maybeSingle();
  if(ex) await sb.from('quran_ward_progress').update({ student_note:note }).eq('id',ex.id);
  else await sb.from('quran_ward_progress').insert({ ward_id:wardId, student_login_id:ME.id, student_note:note, status:'not_started', planned_for_date:qTodayStr(), actual_date:null });
}

  (wards||[]).forEach(w=>{ if(!byDate[w.planned_date]) byDate[w.planned_date]=[]; byDate[w.planned_date].push(w); });
  const dates = Object.keys(byDate).sort();

  const hint = esc(sys?sys.name:'')+' · '+(plan.status==='active'?'نشطة':plan.status==='paused'?'متوقفة':'—');

  const actBtns = `<div class="qexport-btns">
    <button onclick="qExportPlanPDF('${esc(planId)}')">🖨️ طباعة PDF</button>
    <button onclick="qExportPlanExcel('${esc(planId)}')">📊 تصدير Excel</button>
    ${role==='teacher'?`<button onclick="qShowEditPanel('${esc(planId)}')">⚙️ تعديل الخطة</button>`:''}
  </div>`;
  const editPanel = role==='teacher' ? `<div class="qedit-panel" id="qEditPanel_${esc(planId)}">
    <h4>⚙️ تعديل الخطة</h4>
    <div class="qform" style="margin-bottom:14px">
      <div class="qrow">
        <div>
          <label>حالة الخطة</label>
          <select id="qEPStatus_${esc(planId)}">
            <option value="active" ${plan.status==='active'?'selected':''}>✅ نشطة</option>
            <option value="paused" ${plan.status==='paused'?'selected':''}>⏸️ متوقفة مؤقتاً</option>
            <option value="completed" ${plan.status==='completed'?'selected':''}>🏁 مكتملة</option>
          </select>
        </div>
        <div>
          <label>ملاحظة للتعديل</label>
          <input type="text" id="qEPNote_${esc(planId)}" placeholder="سبب التعديل" />
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-sm" onclick="qUpdatePlanStatus('${esc(planId)}')">💾 حفظ الحالة</button>
        <button class="btn-sm ghost" onclick="qRescheduleRemaining('${esc(planId)}')">🔄 إعادة جدولة المتبقي</button>
        ${role==='teacher'?`<button class="btn-sm gold" onclick="qCheckTransition('${esc(planId)}')">🎓 فحص الانتقال للمحطة التالية</button>`:''}
      </div>
    </div>
  </div>` : '';

  const daysHtml = dates.map(dt=>{
    const cards = byDate[dt];
    const dayObj = new Date(dt);
    const dn = DAYS[dayObj.getDay()];
    const isToday = dt===today;
    const isPast = dt<today;
    const isFuture = dt>today;
    const klass = isToday?'today':isPast?'past':'';
    const dots = cards.map(c=>{
      const p=progMap[c.id];
      const cls=p&&p.status==='done'?(p.is_late?'late':p.is_early?'early':'done'):'';
      return `<span class="qpd ${cls}"></span>`;
    }).join('');
    const dayLabel = isToday?'<span style="color:var(--gold);font-size:11px;font-weight:700;margin-inline-start:8px">• اليوم</span>':isFuture?`<span style="color:var(--muted);font-size:11px;margin-inline-start:8px">${role==='student'&&plan.allow_early_progress?'• اضغط للتقدم المبكر':''}</span>`:'';
    const body = cards.map(c=>{
      const f = fortMap[c.fortress_code]||{};
      const color = f.color||qFortColor(c.fortress_code);
      const icon = f.icon||qFortIcon(c.fortress_code);
      const p = progMap[c.id];
      const isDone = p&&p.status==='done';
      const statusBg = isDone?'rgba(13,107,79,0.1)':'var(--cream)';
      const btn = (!isDone && (isToday||isFuture)) ? `<button onclick="qMarkWardFromPlan('${esc(c.id)}','${esc(dt)}')" style="border:none;background:${color};color:#fff;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:700">✓ أتممت</button>` : '';
      const teacherActs = (role==='teacher'&&!isDone) ? `<button onclick="qTeacherApprove('${esc(c.id)}')" style="border:none;background:var(--emerald);color:#fff;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;font-weight:700">✅ اعتماد</button>
        <button onclick="qTeacherNote('${esc(c.id)}')" style="border:none;background:var(--cream-2);color:var(--navy-deep);border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer">📝</button>` : '';
      const masteryBadge = p&&p.teacher_mastery ? `<span style="font-size:11px;color:var(--gold)">${'⭐'.repeat(parseInt(p.teacher_mastery)||0)}</span>` : '';
      return `<div class="qplan-mini" style="background:${statusBg}">
        <div class="qpmic" style="background:${color}">${icon}</div>
        <div style="flex:1;min-width:0"><b>${esc(f.name||c.fortress_code)}</b><small>${esc(c.amount_label||'—')}</small>${masteryBadge}</div>
        ${btn}${teacherActs}
      </div>`;
    }).join('');
    return `<div class="qplan-day" id="qpd_${esc(dt)}">
      <div class="qplan-day-h ${klass}" onclick="document.getElementById('qpd_${esc(dt)}').classList.toggle('open')">
        <div><b>${esc(dn)} ${esc(dt)}</b>${dayLabel}</div>
        <div class="qpchk">${dots}</div>
      </div>
      <div class="qplan-day-body">${body}</div>
    </div>`;
  }).join('');

  // Auto-open today
  setTimeout(()=>{ const el=document.getElementById('qpd_'+today); if(el) el.classList.add('open'); },100);

  return backBtn + pageHead(title, hint) + statsRow + actBtns + editPanel + daysHtml;
}

/* ─── تسجيل الورد من الخطة الكاملة (مع دعم التقدم المبكر) ─── */
async function qMarkWardFromPlan(wardId, plannedDate){
  const today = qTodayStr();
  const isEarly = today < plannedDate;
  const isLate  = today > plannedDate;
  const s = await myStudentRow();
  const payload = { ward_id:wardId, student_login_id:ME.id, status:'done', planned_for_date:plannedDate,
    actual_date:today, is_early:isEarly, is_late:isLate,
    days_offset: Math.round((new Date(plannedDate)-new Date(today))/86400000),
    updated_at: new Date().toISOString() };
  const { data: ex } = await sb.from('quran_ward_progress').select('id').eq('ward_id',wardId).maybeSingle();
  if(ex) await sb.from('quran_ward_progress').update(payload).eq('id',ex.id);
  else await sb.from('quran_ward_progress').insert(payload);
  toast(isEarly?'🚀 تم الإنجاز مبكراً - بارك الله فيك!':'✓ تم الإنجاز');
  navigate(SESSION.page);
}

async function qTeacherNote(wardId){

function qShowEditPanel(planId){ const el=document.getElementById('qEditPanel_'+planId); if(el) el.classList.toggle('open'); }
async function qUpdatePlanStatus(planId){
  const status = document.getElementById('qEPStatus_'+planId).value;
  const note   = document.getElementById('qEPNote_'+planId).value.trim();
  const { data: before } = await sb.from('quran_student_plans').select('status').eq('id',planId).maybeSingle();
  const { error } = await sb.from('quran_student_plans').update({ status, updated_at:new Date().toISOString() }).eq('id',planId);
  if(error){ toast('تعذّر: '+error.message); return; }
  // audit
  await sb.from('quran_system_audit').insert({ system_id:null, actor_id:ME.id, action:'plan_status_changed', before_data:{status:before?.status}, after_data:{status, note}, created_at:new Date().toISOString() }).catch(()=>{});
  toast('✅ تم تحديث الحالة');
  navigate(SESSION.page);

async function qRescheduleRemaining(planId){
  if(!confirm('سيتم إعادة توزيع الأوراد المتبقية بدءاً من اليوم. هل توافق؟')) return;
  const today = qTodayStr();
  // Mark old future wards for deletion and re-generate
  const { data: futureWards } = await sb.from('quran_plan_wards').select('id').eq('plan_id',planId).gt('planned_date',today);
  if(futureWards && futureWards.length){
    const ids = futureWards.map(w=>w.id);
    await sb.from('quran_ward_progress').delete().in('ward_id',ids);
    await sb.from('quran_plan_wards').delete().in('id',ids);
  }
  // Update plan start_date to today to regenerate
  const { data: plan } = await sb.from('quran_student_plans').select('*').eq('id',planId).maybeSingle();
  const newPlan = { ...plan, start_date:today };
  await sb.from('quran_student_plans').update({ start_date:today, updated_at:new Date().toISOString() }).eq('id',planId);
  try {
    const res = await generatePlanSchedule(planId);
    toast('🔄 تمت إعادة الجدولة — '+ar(res.count)+' ورد جديد');
  } catch(e){ toast('تعذّر: '+e.message); }
  navigate(SESSION.page);
}

/* ─── فحص الانتقال للمحطة التالية ─── */
async function qCheckTransition(planId){
  const { data: plan } = await sb.from('quran_student_plans').select('*').eq('id',planId).maybeSingle();
  const { data: wards } = await sb.from('quran_plan_wards').select('id').eq('plan_id',planId);
  const wardIds = (wards||[]).map(w=>w.id);
  let doneCount = 0;
  if(wardIds.length){
    const { data: progs } = await sb.from('quran_ward_progress').select('id').in('ward_id',wardIds).eq('status','done');
    doneCount = (progs||[]).length;
  }
  const total = (wards||[]).length;
  const pct = total ? Math.round(doneCount/total*100) : 0;
  const { data: station } = await sb.from('quran_stations').select('*').eq('id',plan.current_station_id).maybeSingle();
  const { data: stations } = await sb.from('quran_stations').select('*').eq('system_id',plan.system_id).order('order_index');
  const curIdx = (stations||[]).findIndex(s=>s.id===plan.current_station_id);
  const nextStation = curIdx>=0 && curIdx<(stations||[]).length-1 ? stations[curIdx+1] : null;

  const minPct = station?.min_completion_pct||80;
  const canTransit = pct >= minPct;
  const requiresExam = station?.requires_exam;

  $('#qmodalHost').innerHTML = `<div class="qmodal" onclick="if(event.target===this)qCloseModal()">
    <div class="qmbox">
      <h2>🎓 فحص الانتقال للمحطة التالية</h2>
      <div class="qpv" style="margin-top:14px">
        <div class="qpvrow"><span>المحطة الحالية</span><b>${esc(station?.name||'—')}</b></div>
        <div class="qpvrow"><span>نسبة الإنجاز</span><b style="color:${pct>=minPct?'var(--emerald)':'var(--rose)'}">${ar(pct)}٪ (المطلوب ${ar(minPct)}٪)</b></div>
        <div class="qpvrow"><span>اختبار إلزامي</span><b>${requiresExam?'نعم ⚠️':'لا'}</b></div>
        <div class="qpvrow"><span>المحطة التالية</span><b>${esc(nextStation?.name||'لا توجد محطة تالية')}</b></div>
      </div>
      ${canTransit && !requiresExam
        ? `<div style="text-align:center;margin-top:14px"><button class="btn" onclick="qDoTransition('${esc(planId)}','${esc(nextStation?.id||'')}')">🚀 انتقل للمحطة التالية</button></div>`
        : requiresExam
          ? `<div style="background:rgba(191,154,69,0.15);border-radius:12px;padding:14px;text-align:center;margin-top:14px;color:#7a5d1d">⚠️ هذه المحطة تتطلب اختباراً قبل الانتقال. أرسل اختباراً للطالب وبعد النجاح ينتقل تلقائياً.</div>`
          : `<div style="background:rgba(168,77,77,0.1);border-radius:12px;padding:14px;text-align:center;margin-top:14px;color:var(--rose)">⚠️ نسبة الإنجاز ${ar(pct)}٪ أقل من الحد المطلوب ${ar(minPct)}٪</div>`}
      <div style="text-align:end;margin-top:14px"><button class="btn ghost" onclick="qCloseModal()">إغلاق</button></div>
    </div>
  </div>`;
}
async function qDoTransition(planId, nextStationId){
  if(!nextStationId){ toast('لا توجد محطة تالية'); return; }
  // Delete future wards, update station, regenerate
  const today = qTodayStr();
  const { data: futureWards } = await sb.from('quran_plan_wards').select('id').eq('plan_id',planId).gte('planned_date',today);
  if(futureWards?.length){
    const ids = futureWards.map(w=>w.id);
    await sb.from('quran_ward_progress').delete().in('ward_id',ids);
    await sb.from('quran_plan_wards').delete().in('id',ids);
  }
  await sb.from('quran_student_plans').update({ current_station_id:nextStationId, start_date:today, updated_at:new Date().toISOString() }).eq('id',planId);
  try {
    const res = await generatePlanSchedule(planId);
    toast('🎉 انتقلت للمحطة التالية — '+ar(res.count)+' ورد جديد');
    qCloseModal();
    navigate(SESSION.page);
  } catch(e){ toast('تعذّر: '+e.message); }
}

/* ─── صفحة المعلم: المتابعة اليومية المحسّنة ─── */
PAGES.teacher_qmonitor = async function(){
  setTop('متابعة يومية','إنجازات اليوم');
  const { data: groups } = await sb.from('groups').select('id').eq('teacher_id',ME.id);
  const gids = (groups||[]).map(g=>g.id);
  if(!gids.length) return '<div class="qnoplan"><div class="nei">👥</div><h3>لا حلقات</h3></div>';
  const { data: students } = await sb.from('students').select('id,full_name').in('group_id',gids);
  if(!students?.length) return '<div class="qnoplan"><div class="nei">🎓</div><h3>لا طلاب</h3></div>';
  const sids = students.map(s=>s.id);
  const { data: plans } = await sb.from('quran_student_plans').select('*').in('student_id',sids).eq('status','active');
  const planMap = {}; (plans||[]).forEach(p=>{ planMap[p.student_id]=p; });
  const today = qTodayStr();
  const planIds = (plans||[]).map(p=>p.id);
  let todayMap = {}, lateMap = {};
  if(planIds.length){
    const { data: todayW } = await sb.from('quran_plan_wards').select('id,plan_id').in('plan_id',planIds).eq('planned_date',today);
    const { data: overdueW } = await sb.from('quran_plan_wards').select('id,plan_id').in('plan_id',planIds).lt('planned_date',today);
    const tCount = {}; (todayW||[]).forEach(w=>{ tCount[w.plan_id]=(tCount[w.plan_id]||0)+1; });
    const lCount = {}; (overdueW||[]).forEach(w=>{ lCount[w.plan_id]=(lCount[w.plan_id]||0)+1; });
    const allW = [...(todayW||[]),...(overdueW||[])];
    const allIds = allW.map(w=>w.id);
    let doneMap = {};
    if(allIds.length){
      const { data: progs } = await sb.from('quran_ward_progress').select('ward_id,status,is_late').in('ward_id',allIds);
      (progs||[]).forEach(p=>{
        if(p.status==='done'){
          const w = allW.find(x=>x.id===p.ward_id);
          if(w) doneMap[w.plan_id]=(doneMap[w.plan_id]||0)+1;
        }
      });
    }
    (plans||[]).forEach(p=>{
      todayMap[p.student_id] = { total:tCount[p.id]||0, done:doneMap[p.id]||0 };
      lateMap[p.student_id]  = lCount[p.id]||0;
    });
  }
  const dateLabel = new Date().toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const rows = students.map(s=>{
    const p = planMap[s.id];
    if(!p) return `<div class="qstu-row qstu-noplan"><div class="qstu-ava">!</div><div class="qstu-info"><b>${esc(s.full_name)}</b><small>لا خطة نشطة</small></div><div class="qstu-stat"><b>—</b></div></div>`;
    const t = todayMap[s.id]||{total:0,done:0};
    const lc = lateMap[s.id]||0;
    const pct = t.total ? Math.round(t.done/t.total*100) : 0;
    const lateTag = lc ? `<span style="background:rgba(168,77,77,0.12);color:var(--rose);font-size:11px;padding:2px 7px;border-radius:8px;font-weight:700">${ar(lc)} متأخر</span>` : '';
    return `<div class="qstu-row" onclick="qOpenStudentPlan('${esc(p.id)}')">
      <div class="qstu-ava">${esc(s.full_name.charAt(0))}</div>
      <div class="qstu-info"><b>${esc(s.full_name)}</b><small>أنجز ${ar(t.done)} من ${ar(t.total)} ورد اليوم ${lateTag}</small></div>
      <div class="qstu-stat"><b style="color:${pct>=80?'var(--emerald)':pct>=40?'var(--gold)':'var(--rose)'}">${ar(pct)}٪</b></div>
    </div>`;
  }).join('');
  return pageHead('متابعة يومية', esc(dateLabel)) + rows;
};

async function qRenderReport(planId){
  const { data: plan } = await sb.from('quran_student_plans').select('*').eq('id',planId).maybeSingle();
  const { data: sys } = await sb.from('quran_systems').select('name').eq('id',plan.system_id).maybeSingle();
  const { data: wards } = await sb.from('quran_plan_wards').select('*').eq('plan_id',planId);
  const wardIds = (wards||[]).map(w=>w.id);
  let progs = [];
  if(wardIds.length){ const { data: p } = await sb.from('quran_ward_progress').select('*').in('ward_id',wardIds); progs = p||[]; }
  const progMap = {}; progs.forEach(p=>{ progMap[p.ward_id]=p; });
  const byFort = {};
  (wards||[]).forEach(w=>{
    if(!byFort[w.fortress_code]) byFort[w.fortress_code]={total:0,done:0};
    byFort[w.fortress_code].total++;
    const p = progMap[w.id];
    if(p&&p.status==='done') byFort[w.fortress_code].done++;
  });
  const today = qTodayStr();
  const totalW = (wards||[]).length;
  const doneW  = progs.filter(p=>p.status==='done').length;
  const lateW  = (wards||[]).filter(w=>w.planned_date<today&&(!progMap[w.id]||progMap[w.id].status!=='done')).length;
  const earlyW = progs.filter(p=>p.is_early&&p.status==='done').length;
  const masterySamples = progs.filter(p=>p.student_mastery).map(p=>p.student_mastery);
  const avgMastery = masterySamples.length ? (masterySamples.reduce((a,b)=>a+parseFloat(b),0)/masterySamples.length).toFixed(1) : '—';
  const overallPct = totalW ? Math.round(doneW/totalW*100) : 0;
  const FORTNAMES = { new_hifz:'الحفظ الجديد', review_near:'المراجعة القريبة', review_far:'المراجعة البعيدة', reading:'ورد القراءة', listening:'ورد السماع' };

  const statsHtml = `<div class="qreport-grid">
    <div class="qrstat"><span class="qrsv">${ar(totalW)}</span><div class="qrsl">إجمالي الأوراد</div></div>
    <div class="qrstat"><span class="qrsv" style="color:var(--emerald)">${ar(doneW)}</span><div class="qrsl">منجَز</div></div>
    <div class="qrstat gold"><span class="qrsv">${ar(overallPct)}٪</span><div class="qrsl">التقدم الكلي</div></div>
    <div class="qrstat rose"><span class="qrsv">${ar(lateW)}</span><div class="qrsl">متأخرات</div></div>
    <div class="qrstat" style="border-color:var(--gold)"><span class="qrsv" style="color:var(--gold)">${ar(earlyW)}</span><div class="qrsl">مبكر 🚀</div></div>
    <div class="qrstat"><span class="qrsv">${avgMastery==='—'?'—':ar(avgMastery)}</span><div class="qrsl">متوسط الإتقان/٥</div></div>
  </div>`;

  const fortBars = `<div class="card" style="margin-bottom:14px"><div class="ch"><h3>📊 نسبة الإنجاز لكل حصن</h3></div>
    <div class="qbar-chart">${Object.entries(byFort).map(([code,v])=>{
      const pct = v.total ? Math.round(v.done/v.total*100) : 0;
      return `<div class="qbar-item">
        <span class="qbi-l">${esc(FORTNAMES[code]||code)}</span>
        <div class="qbi-b"><i style="width:${pct}%;background:${qFortColor(code)}"></i></div>
        <span class="qbi-t">${ar(pct)}٪</span>
      </div>`;
    }).join('')}</div></div>`;

  // Weekly commitment (last 4 weeks)
  const weekData = [];
  for(let i=3;i>=0;i--){
    const wStart = new Date(); wStart.setDate(wStart.getDate()-((i+1)*7));
    const wEnd   = new Date(); wEnd.setDate(wEnd.getDate()-(i*7));
    const ws = wStart.toISOString().slice(0,10); const we = wEnd.toISOString().slice(0,10);
    const weekWards = (wards||[]).filter(w=>w.planned_date>=ws&&w.planned_date<we);
    const wDone = weekWards.filter(w=>progMap[w.id]&&progMap[w.id].status==='done').length;
    const wPct = weekWards.length ? Math.round(wDone/weekWards.length*100) : 0;
    weekData.push({ label:`أسبوع -${ar(i+1)}`, pct:wPct });
  }
  const weekChart = `<div class="card" style="margin-bottom:14px"><div class="ch"><h3>📅 الالتزام الأسبوعي (آخر ٤ أسابيع)</h3></div>
    <div class="qbar-chart">${weekData.map(w=>`<div class="qbar-item">
      <span class="qbi-l">${esc(w.label)}</span>
      <div class="qbi-b"><i style="width:${w.pct}%"></i></div>
      <span class="qbi-t">${ar(w.pct)}٪</span>
    </div>`).join('')}</div></div>`;

  const exportBtns = `<div class="qexport-btns" style="margin-top:14px">
    <button onclick="qExportPlanPDF('${esc(planId)}')">🖨️ طباعة التقرير</button>
    <button onclick="qExportPlanExcel('${esc(planId)}')">📊 تصدير Excel</button>
  </div>`;

  return pageHead('التقرير القرآني', esc(sys?sys.name:'')+' · '+esc(plan.start_date)+' → '+esc(plan.end_date_target||'—')) + statsHtml + fortBars + weekChart + exportBtns;
}

async function qExportPlanExcel(planId){
  const { data: plan } = await sb.from('quran_student_plans').select('*').eq('id',planId).maybeSingle();
  const { data: stu } = await sb.from('students').select('full_name').eq('id',plan.student_id).maybeSingle();
  const { data: wards } = await sb.from('quran_plan_wards').select('*').eq('plan_id',planId).order('planned_date').order('fortress_code');
  const wardIds = (wards||[]).map(w=>w.id);
  let progMap = {};
  if(wardIds.length){
    const { data: progs } = await sb.from('quran_ward_progress').select('*').in('ward_id',wardIds);
    (progs||[]).forEach(p=>{ progMap[p.ward_id]=p; });
  }
  const FNAMES={new_hifz:'الحفظ الجديد',review_near:'المراجعة القريبة',review_far:'المراجعة البعيدة',reading:'ورد القراءة',listening:'ورد السماع'};
  const rows = (wards||[]).map(w=>{
    const p = progMap[w.id];
    return {
      'التاريخ المخطط': w.planned_date,
      'الحصن': FNAMES[w.fortress_code]||w.fortress_code,
      'الورد': w.amount_label||'',
      'الحالة': p ? (p.status==='done'?'مكتمل':'متأخر') : 'لم يبدأ',
      'تاريخ الإنجاز': p?.actual_date||'',
      'مبكر': p?.is_early?'نعم':'',
      'متأخر': p?.is_late?'نعم':'',
      'إتقان الطالب': p?.student_mastery||'',
      'إتقان المعلم': p?.teacher_mastery||'',
      'ملاحظة المعلم': p?.teacher_note||'',
      'ملاحظة الطالب': p?.student_note||''
    };
  });
  if(!window.XLSX){ toast('مكتبة Excel غير متاحة'); return; }
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, 'الخطة');
  XLSX.writeFile(wb, `خطة_${stu?.full_name||'الطالب'}_${plan.start_date}.xlsx`);
  toast('✅ تم التصدير');
}

async function qHandleImport(input){
  const file = input.files[0]; if(!file) return;
  if(!window.XLSX){ toast('مكتبة XLSX غير متاحة'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data, {type:'array'});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet);
    if(!rows.length){ toast('الملف فارغ'); return; }
    let html = `<h4 style="font-family:Amiri;color:var(--navy-deep);margin-bottom:12px">معاينة البيانات (${ar(rows.length)} سطر)</h4>`;
    html += `<div style="overflow-x:auto"><table class="dtable"><thead><tr>${Object.keys(rows[0]).map(k=>`<th>${esc(k)}</th>`).join('')}</tr></thead><tbody>`;
    html += rows.slice(0,10).map(r=>`<tr>${Object.values(r).map(v=>`<td>${esc(String(v))}</td>`).join('')}</tr>`).join('');
    html += `</tbody></table></div>`;
    html += `<p style="color:var(--muted);font-size:13px;margin-top:10px">عرض أول ١٠ صفوف. استيراد كامل يتطلب تطابق أسماء الطلاب مع قاعدة البيانات.</p>`;
    html += `<button class="btn" style="margin-top:14px" onclick="qDoImport(${JSON.stringify(rows).replace(/</g,'&lt;')})">🚀 استيراد ${ar(rows.length)} سجل</button>`;
    $('#qImportPreview').innerHTML = html;
  };
  reader.readAsArrayBuffer(file);
}

async function qCheckAndFireNotifications(planId){
  const { data: plan } = await sb.from('quran_student_plans').select('*').eq('id',planId).maybeSingle();
  if(!plan) return;
  const today = qTodayStr();
  // Check if student has late wards
  const { data: lateW } = await sb.from('quran_plan_wards').select('id').eq('plan_id',planId).lt('planned_date',today);
  if(lateW?.length){
    await qFireNotif(plan.login_id,'late_wards',{ count:lateW.length });
    if(plan.teacher_id) await qFireNotif(plan.teacher_id,'student_late',{ plan_id:planId, count:lateW.length });
  }
  // Check station near completion
  const { data: allW } = await sb.from('quran_plan_wards').select('id').eq('plan_id',planId);
  const { data: doneW } = await sb.from('quran_ward_progress').select('id').in('ward_id',(allW||[]).map(w=>w.id)).eq('status','done');
  const pct = (allW||[]).length ? Math.round((doneW||[]).length/(allW||[]).length*100) : 0;
  if(pct>=90) await qFireNotif(plan.login_id,'near_station_end',{ pct });
  if(pct>=100) await qFireNotif(plan.login_id,'station_complete',{ pct });
}
async function qFireNotif(userId, kind, payload){
  if(!userId) return;
  await sb.from('quran_notifications').insert({ user_id:userId, kind, payload:JSON.stringify(payload), created_at:new Date().toISOString() }).catch(()=>{});
}

const CHATBOT_FAQ = [
  { kw:['سعر','اسعار','تكلفه','فلوس','اشتراك شهري','رسوم'],

    a:'عندنا ٦ مسارات لحفظ القرآن: جزء عمّ وتبارك، الزهراوان، المفصّل، ربع القرآن، نصف القرآن، والقرآن كاملاً. كل مسار له خطة إتقان ومدة متوقعة. تقدر تشوفهم من «مسارات الحفظ».' },
  { kw:['حصون','حصن','ورد','اوراد'],
    a:'منهج الإتقان قائم على أوراد يومية: الحفظ الجديد، المراجعة القريبة، المراجعة البعيدة، وفي مسار «رسوخ» بيتضاف ورد التلاوة وورد السماع (٥ حصون بدل ٣).' },

  { kw:['تسجيل','انشاء حساب','ازاي اسجل','عايز اشترك','التحق'],
    a:'تقدر تنشئ حساباً من زر «ابدأ الآن» في الصفحة الرئيسية، تختار مسارك، ترفع إيصال الدفع، وبعد تأكيد الإشراف هتقدر تختار معلمك وتبدأ حلقتك.' },

    a:'النظام بيراعي الفصل بين الجنسين تلقائياً: الطالب يتوجّه لمعلمين ومشرفين من نفس جنسه، ونفس الأمر للطالبة.' },
  { kw:['تجديد','انتهى اشتراكي','الاشتراك خلص'],
    a:'تقدر تجدد اشتراكك من «الرسوم والتجديد» في لوحتك، ارفع إيصال الدفع الجديد وهيتأكد من الإشراف خلال وقت قصير.' },
  { kw:['تواصل','دعم','مشرف','اكلمك ازاي','رقم واتساب'],
    a:'تقدر تكلّم فريق الإشراف مباشرة من «الرسائل» في لوحتك، أو زر «تواصل واتساب» تحت.' },
];
function cbNorm(t){
  return String(t||'').toLowerCase()
    .replace(/[أإآا]/g,'ا').replace(/ى/g,'ي').replace(/ة/g,'ه').replace(/[ؤئ]/g,'ي')
    .replace(/[ً-ْـ]/g,'').replace(/\s+/g,' ').trim();
}
function cbMatch(q){
  const nq=cbNorm(q);
  let best=null, bestScore=0;
  CHATBOT_FAQ.forEach(item=>{
    let score=0;
    item.kw.forEach(k=>{ if(nq.includes(cbNorm(k))) score++; });
    if(score>bestScore){ bestScore=score; best=item; }
  });
  return bestScore>0 ? best : null;
}
let CB_STATE = { open:false, escalated:false };
function cbInit(){
  const host=document.getElementById('chatbotHost');
  if(!host || host.dataset.ready) return;
  host.dataset.ready='1';
  host.innerHTML = `
    <button class="cb-fab" id="cbFab" onclick="cbToggle()" aria-label="المساعد الذكي"><img src="assets/logo.jpg" alt="المساعد الذكي"><span class="cb-dot">💬</span></button>
    <div class="cb-panel" id="cbPanel">
      <div class="cb-head">
        <div><b>🤖 المساعد الذكي</b><span>هنا لأي سؤال عن المنصة</span></div>
        <button onclick="cbToggle()">×</button>
      </div>
      <div class="cb-body" id="cbBody"></div>
      <div class="cb-input">
        <input id="cbInput" placeholder="اكتب سؤالك هنا..." onkeydown="if(event.key==='Enter')cbSend()">
        <button onclick="cbSend()">➤</button>
      </div>
    </div>`;
  cbAppendBot('السلام عليكم! 👋 أنا مساعد أكاديمية الهدى، اسألني عن المسارات، الحصون، الأسعار، أو أي حاجة عن المنصة.');
  cbShowChips();
}
function cbToggle(){
  const p=document.getElementById('cbPanel'); if(!p) return;
  CB_STATE.open=!CB_STATE.open; p.classList.toggle('open',CB_STATE.open);
  if(CB_STATE.open){ const i=document.getElementById('cbInput'); if(i) setTimeout(()=>i.focus(),150); }
}
function cbAppendBot(text){
  const b=document.getElementById('cbBody'); if(!b) return;
  b.insertAdjacentHTML('beforeend', `<div class="cb-msg bot">${(typeof esc==='function'?esc(text):text).replace(/\n/g,'<br>')}</div>`);
  b.scrollTop=b.scrollHeight;
}
function cbAppendUser(text){
  const b=document.getElementById('cbBody'); if(!b) return;
  b.insertAdjacentHTML('beforeend', `<div class="cb-msg user">${(typeof esc==='function'?esc(text):text)}</div>`);
  b.scrollTop=b.scrollHeight;
}
function cbShowChips(){
  const b=document.getElementById('cbBody'); if(!b) return;
  const sample=CHATBOT_FAQ.slice(0,4).map(f=>f.kw[0]);
  const chips=sample.map(k=>`<span class="cb-chip" onclick="cbAsk('${k.replace(/'/g,'')}')">${k}</span>`).join('');
  b.insertAdjacentHTML('beforeend', `<div class="cb-chips">${chips}</div>`);
  b.scrollTop=b.scrollHeight;
}
function cbAsk(q){ const i=document.getElementById('cbInput'); if(i){ i.value=q; } cbSend(); }
function cbSend(){
  const i=document.getElementById('cbInput'); const q=(i?.value||'').trim();
  if(!q) return;
  cbAppendUser(q); if(i) i.value='';
  const hit=cbMatch(q);
  if(hit){
    setTimeout(()=>cbAppendBot(hit.a),300);
  } else {
    setTimeout(()=>{
      cbAppendBot('معنديش إجابة جاهزة لسؤالك ده 🤔 حابب أحوّلك لفريق الإشراف يردّ عليك؟');
      const b=document.getElementById('cbBody');
      CB_LAST_QUESTION=q;
      if(b) b.insertAdjacentHTML('beforeend', `<div class="cb-chips"><span class="cb-esc" onclick="cbEscalate()">🙋 حوّلني للإشراف</span></div>`);
      if(b) b.scrollTop=b.scrollHeight;
    },300);
  }
}
let CB_LAST_QUESTION='';
async function cbEscalate(){
  const question=CB_LAST_QUESTION;
  // مستخدم مسجّل دخوله: افتح/أنشئ محادثة حقيقية مع مشرف
  if(typeof ME!=='undefined' && ME && ME.id && typeof sb!=='undefined'){
    try{
      let myGender=ME.gender;
      if(!myGender){ try{ const { data:gp }=await sb.from('profiles').select('gender').eq('id',ME.id).maybeSingle(); myGender=gp?.gender; }catch(e){} }
      const { data:sups }=await sb.from('profiles').select('id,full_name,gender').eq('role','supervisor');
      const sup=(sups||[]).find(s=>!myGender||!s.gender||s.gender===myGender) || (sups||[])[0];
      if(!sup){ toast&&toast('لا يوجد مشرف متاح الآن، جرّب واتساب'); return; }
      const { data:existing }=await sb.from('chats').select('*').contains('party_ids',[ME.id]);
      let chat=(existing||[]).find(c=>(c.party_ids||[]).includes(sup.id));
      if(!chat){
        const { data:nc, error }=await sb.from('chats').insert({ title:sup.full_name+' (المشرف)', party_ids:[ME.id,sup.id] }).select().single();
        if(error){ toast&&toast('تعذّر التحويل: '+error.message); return; }
        chat=nc;
      }
      await sb.from('messages').insert({ chat_id:chat.id, sender_id:ME.id, body:'🤖 سؤال من المساعد الذكي: '+question });
      SESSION.activeChat=chat.id;
      cbAppendBot('تمام ✅ حوّلت سؤالك للمشرف '+sup.full_name+'، هتلاقي الرد في «الرسائل».');
      cbToggle();
      navigate('chat');
    }catch(e){ toast&&toast('تعذّر التحويل، جرّب واتساب'); }
  } else {
    // زائر غير مسجّل: افتح واتساب برسالة جاهزة
    const num = (typeof WHATSAPP!=='undefined'?WHATSAPP:'201227958232');
    window.open('https://wa.me/'+num+'?text='+encodeURIComponent('السلام عليكم، عندي سؤال: '+question), '_blank');
  }
}
document.addEventListener('DOMContentLoaded', cbInit);
