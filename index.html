<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أكاديمية الهدى — منصة القرآن وبناء الإنسان</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>:root{
  --emerald:#0d6b4f;--emerald-deep:#093c2e;--emerald-light:#13987a;
  --gold:#bf9a45;--gold-light:#e0c073;--gold-soft:#f6ecd2;
  --navy:#0e2a3f;--navy-deep:#07151f;
  --cream:#fcf9f1;--cream-2:#f6efe0;--ink:#1c2a24;--muted:#5a685f;--white:#fff;
  --line:rgba(9,40,30,0.08);--shadow:rgba(9,40,30,0.10);--rose:#a84d4d;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Tajawal',sans-serif;background:var(--cream);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,.amiri{font-family:'Amiri',serif;font-weight:700}
.quran{font-family:'Amiri',serif}
::selection{background:var(--gold-light);color:var(--navy-deep)}
input,button,textarea,select{font-family:'Tajawal',sans-serif}
.hidden{display:none!important}

/* ====== شاشة الدخول ====== */
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow:hidden;background:radial-gradient(ellipse at 80% 10%,rgba(19,152,122,0.12),transparent 50%),radial-gradient(ellipse at 10% 90%,rgba(191,154,69,0.14),transparent 48%),linear-gradient(160deg,#0a3326,#072a20)}
.gate-orn{position:absolute;inset:0;pointer-events:none;opacity:.5}
.gate-orn svg{position:absolute}
.gate-orn .g1{top:-120px;right:-100px;width:440px;color:rgba(191,154,69,0.08)}
.gate-orn .g2{bottom:-150px;left:-110px;width:480px;color:rgba(255,255,255,0.04)}
.gate-card{position:relative;z-index:2;max-width:940px;width:100%;text-align:center}
.gate .logo{width:84px;height:84px;border-radius:24px;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:grid;place-items:center;color:var(--navy-deep);font-family:'Amiri';font-size:46px;margin:0 auto 22px;box-shadow:0 16px 40px rgba(191,154,69,0.4);position:relative;overflow:hidden}
.gate .logo::after{content:"";position:absolute;inset:5px;border:2px solid rgba(7,21,31,0.25);border-radius:18px}
.gate h1{color:#fff;font-size:clamp(34px,5vw,52px);margin-bottom:8px}
.gate .ayah{font-family:'Amiri';color:var(--gold-light);font-size:clamp(17px,2.4vw,23px);margin-bottom:6px}
.gate .sub{color:rgba(255,255,255,0.7);font-size:16px;margin-bottom:14px}
.gate .demo-tag{display:inline-block;background:rgba(255,255,255,0.1);border:1px solid rgba(224,192,115,0.4);color:var(--gold-light);font-size:13px;font-weight:700;padding:7px 18px;border-radius:30px;margin-bottom:36px}
.roles-pick{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:26px}
.rpick{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:26px 14px;cursor:pointer;transition:.25s;backdrop-filter:blur(6px)}
.rpick:hover{background:rgba(255,255,255,0.12);border-color:var(--gold);transform:translateY(-6px)}
.rpick .ri{width:58px;height:58px;border-radius:16px;margin:0 auto 13px;display:grid;place-items:center;font-size:27px;background:linear-gradient(140deg,rgba(191,154,69,0.25),rgba(255,255,255,0.06))}
.rpick h3{color:#fff;font-size:18px;margin-bottom:4px}
.rpick p{color:rgba(255,255,255,0.6);font-size:12px;line-height:1.5}
.gate-login{max-width:340px;margin:0 auto 18px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:20px;display:none}
.gate-login.show{display:block}
.gate-login h4{color:#fff;font-size:16px;margin-bottom:14px}
.gate-login input{width:100%;padding:12px 14px;border-radius:11px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:14px;margin-bottom:10px;text-align:center}
.gate-login input::placeholder{color:rgba(255,255,255,0.5)}
.gate-login button{width:100%;padding:12px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy-deep);font-weight:700;font-size:14px;cursor:pointer}
.gate-login .hint{color:rgba(255,255,255,0.45);font-size:11.5px;margin-top:10px}
.gate-foot{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:6px}
.gate-foot a{color:rgba(255,255,255,0.75);text-decoration:none;font-size:13.5px;font-weight:600;border:1px solid rgba(255,255,255,0.2);padding:9px 20px;border-radius:30px;transition:.2s;cursor:pointer}
.gate-foot a:hover{border-color:var(--gold);color:var(--gold-light)}
.gate-note{color:rgba(255,255,255,0.4);font-size:12px;margin-top:22px}

/* ====== هيكل اللوحات ====== */
.app{display:flex;min-height:100vh}
.side{width:258px;color:#fff;display:flex;flex-direction:column;position:fixed;inset-inline-start:0;top:0;bottom:0;z-index:50;transition:.3s}
.side.s-emerald{background:linear-gradient(170deg,var(--emerald-deep),#072a20)}
.side.s-navy{background:linear-gradient(170deg,var(--navy),#061018)}
.side.s-gold{background:linear-gradient(170deg,#5c4a1f,#3a2f13)}
.side .brand{display:flex;align-items:center;gap:12px;padding:22px 22px 18px;border-bottom:1px solid rgba(255,255,255,0.08)}
.side .brand .mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:grid;place-items:center;color:var(--navy-deep);font-family:'Amiri';font-size:22px}
.side .brand .name{font-family:'Amiri';font-size:21px;line-height:1.1}
.side .brand .name small{display:block;font-size:10.5px;color:rgba(255,255,255,0.55);font-family:'Tajawal'}
.side .menu{padding:14px 12px;flex:1;overflow-y:auto}
.side .ml{font-size:11px;color:rgba(255,255,255,0.4);font-weight:700;letter-spacing:1px;padding:14px 12px 8px}
.side a{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14.5px;font-weight:500;margin-bottom:3px;transition:.2s;cursor:pointer}
.side a .i{font-size:18px;width:22px;text-align:center}
.side a:hover{background:rgba(255,255,255,0.07);color:#fff}
.side a.active{background:linear-gradient(135deg,rgba(191,154,69,0.25),rgba(191,154,69,0.08));color:#fff;box-shadow:inset 3px 0 0 var(--gold)}
.side .foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.08)}
.side .foot .switch{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:12px;padding:11px;font-weight:700;font-size:13.5px;cursor:pointer;transition:.2s}
.side .foot .switch:hover{background:rgba(191,154,69,0.25);border-color:var(--gold)}
.side .foot .cp{text-align:center;font-size:11px;color:rgba(255,255,255,0.35);margin-top:10px}

.main{flex:1;margin-inline-start:258px;min-width:0}
.topbar{background:rgba(252,249,241,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 30px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar .mtoggle{display:none;background:none;border:none;font-size:24px;cursor:pointer;color:var(--emerald-deep)}
.topbar .hello h2{font-size:20px;color:var(--navy-deep)}
.topbar .hello p{font-size:13px;color:var(--muted)}
.topbar .tools{display:flex;align-items:center;gap:12px}
.bell{width:42px;height:42px;border-radius:12px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;font-size:18px;cursor:pointer;position:relative}
.bell.has::after{content:"";position:absolute;top:11px;left:12px;width:8px;height:8px;background:var(--gold);border-radius:50%;border:2px solid #fff}
.uava{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;color:#fff;font-family:'Amiri';font-weight:700}
.content{padding:26px 30px 70px;max-width:1280px}
.page{display:none}
.page.active{display:block;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* عناصر عامة */
.page-head{margin-bottom:22px}
.page-head h1{font-size:26px;color:var(--navy-deep);margin-bottom:4px}
.page-head p{color:var(--muted);font-size:14.5px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:24px}
.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;position:relative;transition:.25s}
.stat:hover{transform:translateY(-4px);box-shadow:0 16px 36px var(--shadow)}
.stat .si{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:22px;margin-bottom:14px}
.stat .si.e{background:rgba(13,107,79,0.12)}.stat .si.g{background:rgba(191,154,69,0.14)}
.stat .si.n{background:rgba(20,56,90,0.1)}.stat .si.r{background:rgba(168,77,77,0.12)}
.stat .v{font-family:'Amiri';font-size:30px;color:var(--navy-deep);line-height:1}
.stat .k{font-size:13px;color:var(--muted);margin-top:4px}
.stat .trend{position:absolute;top:18px;left:18px;font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px}
.trend.up{color:var(--emerald);background:rgba(13,107,79,0.1)}
.trend.warn{color:#a07d22;background:rgba(191,154,69,0.16)}
.grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;margin-bottom:20px}
.grid2.even{grid-template-columns:1fr 1fr}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:20px}
.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:22px}
.card .ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px;flex-wrap:wrap}
.card .ch h3{font-size:17px;color:var(--navy-deep)}
.card .ch .more{font-size:13px;color:var(--emerald);font-weight:700;text-decoration:none;cursor:pointer;background:none;border:none}
.tagline-sm{font-size:12.5px;color:var(--muted);background:var(--cream-2);padding:4px 12px;border-radius:20px;font-weight:600}
.pill{font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px}
.pill.done{background:rgba(13,107,79,0.12);color:var(--emerald)}
.pill.part{background:rgba(191,154,69,0.16);color:#a07d22}
.pill.todo{background:rgba(20,56,90,0.08);color:#5a685f}
.btn{border:none;font-weight:700;font-size:13.5px;padding:11px 22px;border-radius:30px;cursor:pointer;background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;transition:.2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(13,107,79,0.3)}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy-deep)}
.btn.ghost{background:#fff;color:var(--emerald-deep);border:1.5px solid var(--line)}
.btn-sm{border:none;font-weight:700;font-size:12.5px;padding:7px 16px;border-radius:20px;cursor:pointer;background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff}
.btn-sm.gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy-deep)}
.btn-sm.ghost{background:var(--cream);color:var(--emerald-deep);border:1px solid var(--line)}

/* جداول */
.dtable{width:100%;border-collapse:collapse;font-size:13.5px}
.dtable th{font-family:'Amiri';font-weight:700;color:var(--navy-deep);padding:12px 10px;text-align:start;border-bottom:2px solid var(--line);white-space:nowrap}
.dtable td{padding:11px 10px;border-bottom:1px solid var(--line);color:#3f4f48}
.dtable tr:hover td{background:var(--cream)}
.miniava{width:32px;height:32px;border-radius:50%;background:linear-gradient(140deg,var(--emerald),var(--emerald-light));display:inline-grid;place-items:center;color:#fff;font-size:12px;font-family:'Amiri';margin-inline-end:8px;vertical-align:middle}
.chip{font-size:11.5px;font-weight:700;padding:4px 11px;border-radius:20px;white-space:nowrap}
.chip.g{background:rgba(13,107,79,0.12);color:var(--emerald)}
.chip.gold{background:rgba(191,154,69,0.16);color:#a07d22}
.chip.r{background:rgba(168,77,77,0.12);color:var(--rose)}
.chip.n{background:rgba(20,56,90,0.08);color:#5a685f}
.grade-input{width:54px;text-align:center;border:1px solid var(--line);border-radius:9px;padding:7px;font-family:'Amiri';font-size:15px;color:var(--emerald-deep);background:var(--cream)}
.seg{display:inline-flex;gap:4px;background:var(--cream);border-radius:10px;padding:3px}
.seg button{border:none;background:none;padding:6px 12px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;color:var(--muted)}
.seg button.done{background:var(--emerald);color:#fff}
.seg button.part{background:var(--gold);color:var(--navy-deep)}
.seg button.no{background:var(--rose);color:#fff}
.prog-mini{height:8px;background:rgba(0,0,0,0.06);border-radius:8px;overflow:hidden;width:90px;display:inline-block;vertical-align:middle}
.prog-mini i{display:block;height:100%;background:linear-gradient(90deg,var(--emerald),var(--emerald-light))}

/* progress bars */
.rbars{display:flex;flex-direction:column;gap:16px}
.rbar .l{display:flex;justify-content:space-between;font-size:14px;margin-bottom:7px;color:#3f4f48}
.rbar .l b{color:var(--navy-deep)}
.rtrack{height:11px;background:rgba(0,0,0,0.06);border-radius:10px;overflow:hidden}
.rfill{height:100%;border-radius:10px}
.rfill.e{background:linear-gradient(90deg,var(--emerald),var(--emerald-light))}
.rfill.g{background:linear-gradient(90deg,var(--gold),var(--gold-light))}
.rfill.r{background:linear-gradient(90deg,#a84d4d,#c97a7a)}
.report-foot{margin-top:20px;padding-top:18px;border-top:1px dashed var(--line);display:flex;gap:12px}
.rmini{flex:1;text-align:center;background:var(--cream);border-radius:14px;padding:14px 6px}
.rmini .v{font-family:'Amiri';font-size:24px;color:var(--emerald)}
.rmini .k{font-size:11.5px;color:var(--muted)}

/* lists */
.up-list{display:flex;flex-direction:column;gap:12px}
.up{display:flex;align-items:center;gap:13px;padding:13px;border:1px solid var(--line);border-radius:13px}
.up .ui{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:19px;background:var(--cream-2);flex:none}
.up .utxt{flex:1}
.up .utxt b{display:block;font-size:14.5px;color:var(--navy-deep);font-family:'Amiri'}
.up .utxt span{font-size:12.5px;color:var(--muted)}
.up .uwhen{font-size:12px;font-weight:700;color:var(--emerald);background:rgba(13,107,79,0.1);padding:5px 12px;border-radius:20px;white-space:nowrap}

/* student dash extras */
.hero-band{border-radius:24px;padding:28px 32px;color:#fff;position:relative;overflow:hidden;margin-bottom:24px}
.hero-band.e{background:linear-gradient(130deg,var(--emerald),var(--emerald-deep) 70%)}
.hero-band::before{content:"";position:absolute;top:-60px;left:-40px;width:220px;height:220px;border-radius:50%;background:rgba(191,154,69,0.16)}
.tracktabs{display:flex;gap:6px;background:#fff;border:1px solid var(--line);padding:5px;border-radius:30px}
.tracktabs button{border:none;background:none;padding:8px 18px;border-radius:24px;font-weight:700;font-size:13.5px;color:var(--muted);cursor:pointer;transition:.2s}
.tracktabs button.on{background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff}
.section-label{display:flex;align-items:center;gap:10px;margin:6px 0 16px}
.section-label .sl-t{font-family:'Amiri';color:var(--navy-deep);font-size:16px;display:flex;align-items:center;gap:8px}
.section-label .sl-line{flex:1;height:1px;background:var(--line)}
.hrow{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--line);border-radius:14px;transition:.2s;margin-bottom:10px}
.hrow:hover{border-color:var(--gold);background:var(--cream)}
.hrow .hn{flex:none;width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;display:grid;place-items:center;font-family:'Amiri';font-size:17px}
.hrow .htxt{flex:1}.hrow .htxt b{display:block;font-family:'Amiri';color:var(--navy-deep);font-size:15.5px}
.hrow .htxt span{font-size:12.5px;color:var(--muted)}
.tasks{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.task{display:flex;align-items:center;gap:11px;padding:11px 13px;border:1px solid var(--line);border-radius:12px;font-size:14px;cursor:pointer;transition:.2s}
.task:hover{background:var(--cream)}
.task .cb{width:22px;height:22px;border-radius:7px;border:2px solid rgba(13,107,79,0.3);flex:none;display:grid;place-items:center;font-size:12px;color:#fff;transition:.2s}
.task.ok .cb{background:var(--emerald);border-color:var(--emerald)}
.task.ok .tt{color:var(--muted);text-decoration:line-through}
.task .pts{margin-inline-start:auto;font-size:11.5px;font-weight:700;color:var(--gold)}
.lbrow{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:13px;background:var(--cream);margin-bottom:10px}
.lbrow.me{background:linear-gradient(120deg,rgba(13,107,79,0.1),rgba(191,154,69,0.1));border:1px solid rgba(191,154,69,0.3)}
.lbrow .rank{font-family:'Amiri';width:26px;text-align:center;color:var(--muted);font-size:15px}
.lbrow .rank.gold{color:var(--gold);font-size:18px}
.lbrow .lav{width:34px;height:34px;border-radius:50%;background:linear-gradient(140deg,var(--emerald),var(--emerald-light));display:grid;place-items:center;color:#fff;font-size:13px;font-family:'Amiri'}
.lbrow .ln{flex:1;font-weight:600;font-size:14px;color:var(--navy-deep)}
.lbrow .lp{font-family:'Amiri';color:var(--emerald);font-size:15px}
.wtable{width:100%;border-collapse:collapse;font-size:13px}
.wtable th{font-family:'Amiri';font-weight:700;color:var(--navy-deep);padding:10px 6px;font-size:13px;border-bottom:2px solid var(--line)}
.wtable td{padding:9px 6px;text-align:center;border-bottom:1px solid var(--line)}
.wtable td.lbl{text-align:start;font-weight:600;color:#3f4f48;white-space:nowrap}
.dot-c{width:24px;height:24px;border-radius:7px;display:inline-grid;place-items:center;font-size:11px;cursor:pointer}
.dot-c.y{background:rgba(13,107,79,0.15);color:var(--emerald)}
.dot-c.n{background:rgba(0,0,0,0.05);color:#bbb}
.dot-c.p{background:rgba(191,154,69,0.18);color:#a07d22}
.ring{position:relative;width:150px;height:150px;margin:0 auto 14px}
.ring svg{transform:rotate(-90deg)}
.ring .rc{font-family:'Amiri';position:absolute;inset:0;display:grid;place-items:center;font-size:32px;color:var(--emerald-deep)}

/* parent extras */
.kidswitch{display:flex;gap:6px;background:#fff;border:1px solid var(--line);padding:5px;border-radius:30px}
.kidswitch button{border:none;background:none;padding:8px 16px;border-radius:24px;font-weight:700;font-size:13.5px;color:var(--muted);cursor:pointer;transition:.2s;display:flex;align-items:center;gap:7px}
.kidswitch button.on{background:linear-gradient(135deg,var(--navy),var(--navy-deep));color:#fff}
.kidswitch .mini{width:22px;height:22px;border-radius:50%;background:var(--gold-light);display:grid;place-items:center;font-size:11px;color:var(--navy-deep);font-family:'Amiri'}
.kid-hero{background:linear-gradient(130deg,var(--emerald),var(--emerald-deep) 75%);border-radius:24px;padding:26px 30px;color:#fff;position:relative;overflow:hidden;margin-bottom:22px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.kid-hero::before{content:"";position:absolute;top:-70px;left:-40px;width:240px;height:240px;border-radius:50%;background:rgba(191,154,69,0.15)}
.kid-av{width:74px;height:74px;border-radius:22px;background:linear-gradient(140deg,var(--gold),var(--gold-light));display:grid;place-items:center;font-size:28px;color:var(--navy-deep);position:relative;z-index:2;flex:none}
.kid-info{position:relative;z-index:2;flex:1;min-width:200px}
.kid-info h1{font-size:24px;margin-bottom:3px;color:#fff}
.kid-info .meta{color:rgba(255,255,255,0.82);font-size:13.5px}
.kbadge{font-size:12px;font-weight:700;padding:5px 13px;border-radius:20px;background:rgba(255,255,255,0.14);border:1px solid rgba(224,192,115,0.4);color:var(--gold-light);display:inline-block;margin-top:10px;margin-inline-end:6px}
.alert{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid rgba(168,77,77,0.25);border-inline-start:4px solid var(--rose);border-radius:14px;padding:14px 18px;margin-bottom:22px}
.alert.info{border-color:rgba(191,154,69,0.3);border-inline-start-color:var(--gold)}
.alert .ai{font-size:22px}.alert .atxt{flex:1;font-size:14px;color:#3f4f48}.alert .atxt b{color:var(--navy-deep)}
.alert .ax{font-size:13px;color:var(--emerald);font-weight:700;cursor:pointer;white-space:nowrap;background:none;border:none}
.note{background:linear-gradient(160deg,var(--cream),var(--cream-2));border-radius:16px;padding:18px;border:1px solid rgba(191,154,69,0.2);margin-bottom:14px}
.note .nh{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.note .nav-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(140deg,var(--emerald),var(--emerald-deep));display:grid;place-items:center;color:#fff;font-family:'Amiri';font-size:15px}
.note .nh b{font-size:14.5px;color:var(--navy-deep);font-family:'Amiri'}
.note .nh small{display:block;font-size:11.5px;color:var(--muted)}
.note p{font-size:14px;color:#3f4f48;line-height:1.8}.note .date{font-size:11.5px;color:var(--muted);margin-top:8px}
.att{display:flex;gap:7px;flex-wrap:wrap}
.aday{flex:1;min-width:44px;text-align:center;padding:12px 4px;border-radius:12px;border:1px solid var(--line)}
.aday .d{font-size:11px;color:var(--muted);margin-bottom:6px}
.aday .m{width:26px;height:26px;border-radius:8px;margin:0 auto;display:grid;place-items:center;font-size:13px}
.aday .m.p{background:rgba(13,107,79,0.14);color:var(--emerald)}
.aday .m.a{background:rgba(168,77,77,0.14);color:var(--rose)}
.aday .m.f{background:rgba(0,0,0,0.04);color:var(--muted)}

/* groups */
.group-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;transition:.25s;cursor:pointer}
.group-card:hover{transform:translateY(-4px);box-shadow:0 16px 36px var(--shadow);border-color:var(--gold)}
.group-card .gc-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
.group-card .gc-h b{font-family:'Amiri';font-size:16px;color:var(--navy-deep)}
.avstack{display:flex}
.avstack span{width:30px;height:30px;border-radius:50%;background:linear-gradient(140deg,var(--emerald),var(--emerald-light));display:grid;place-items:center;color:#fff;font-size:11px;font-family:'Amiri';margin-inline-start:-8px;border:2px solid #fff}
.mini-stat{display:flex;gap:16px;margin-top:10px}
.mini-stat div{font-size:12px;color:var(--muted)}
.mini-stat b{font-family:'Amiri';color:var(--emerald);font-size:15px;display:block}

/* chat */
.chat-wrap{display:grid;grid-template-columns:300px 1fr;gap:0;border:1px solid var(--line);border-radius:20px;overflow:hidden;background:#fff;height:600px}
.chat-list{border-inline-end:1px solid var(--line);overflow-y:auto}
.chat-item{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;border-bottom:1px solid var(--line);transition:.2s}
.chat-item:hover,.chat-item.on{background:var(--cream)}
.chat-item .cav{width:42px;height:42px;border-radius:50%;background:linear-gradient(140deg,var(--emerald),var(--emerald-deep));display:grid;place-items:center;color:#fff;font-family:'Amiri';flex:none}
.chat-item .cmeta{flex:1;min-width:0}
.chat-item .cmeta b{font-size:14px;color:var(--navy-deep);display:block}
.chat-item .cmeta span{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.chat-main{display:flex;flex-direction:column}
.chat-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.chat-head .cav{width:40px;height:40px;border-radius:50%;background:linear-gradient(140deg,var(--emerald),var(--emerald-deep));display:grid;place-items:center;color:#fff;font-family:'Amiri'}
.chat-head b{font-size:15px;color:var(--navy-deep)}.chat-head small{display:block;font-size:12px;color:var(--muted)}
.chat-body{flex:1;overflow-y:auto;padding:20px;background:var(--cream);display:flex;flex-direction:column;gap:12px}
.bubble{max-width:70%;padding:11px 16px;border-radius:16px;font-size:14px;line-height:1.7}
.bubble.them{background:#fff;border:1px solid var(--line);align-self:flex-start;border-top-right-radius:4px}
.bubble.me{background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;align-self:flex-end;border-top-left-radius:4px}
.bubble .tm{display:block;font-size:10.5px;opacity:.6;margin-top:4px}
.chat-input{padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:10px}
.chat-input input{flex:1;border:1px solid var(--line);border-radius:30px;padding:12px 18px;font-size:14px;background:var(--cream)}
.chat-input button{border:none;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;font-size:18px;cursor:pointer}

/* forms / modal */
.modal-bg{position:fixed;inset:0;background:rgba(7,21,31,0.55);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:22px;padding:28px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:20px;color:var(--navy-deep);margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;color:#3f4f48;margin-bottom:6px}
.field input,.field select{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:11px;font-size:14px;background:var(--cream)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* chart bars */
.bars{display:flex;align-items:flex-end;gap:12px;height:200px;padding-top:10px}
.bars .bar{flex:1;text-align:center}
.bars .bar .col{border-radius:10px 10px 0 0;background:linear-gradient(to top,var(--emerald),var(--emerald-light))}
.bars .bar .col.gold{background:linear-gradient(to top,var(--gold),var(--gold-light))}
.bars .bar .lb{font-size:12px;color:var(--muted);margin-top:8px}

.toast{position:fixed;bottom:24px;inset-inline-start:50%;transform:translateX(50%) translateY(100px);background:var(--navy-deep);color:#fff;padding:14px 26px;border-radius:30px;font-weight:600;font-size:14px;z-index:200;transition:.4s;box-shadow:0 12px 30px rgba(0,0,0,0.3);opacity:0}
.toast.show{transform:translateX(50%) translateY(0);opacity:1}

@media(max-width:1080px){.stats{grid-template-columns:1fr 1fr}.grid2,.grid2.even{grid-template-columns:1fr}.grid3{grid-template-columns:1fr}.roles-pick{grid-template-columns:repeat(2,1fr)}.chat-wrap{grid-template-columns:1fr}.chat-list{display:none}}
@media(max-width:860px){.side{transform:translateX(100%)}.side.open{transform:translateX(0)}.main{margin-inline-start:0}.topbar .mtoggle{display:block}.content{padding:20px 16px 60px}.tasks{grid-template-columns:1fr}}
@media(max-width:540px){.roles-pick{grid-template-columns:1fr}}

/* ============ Landing + Auth + Setup ============ */
.paths-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
.path-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:26px 22px;cursor:pointer;transition:.25s;text-align:center}
.path-card:hover{transform:translateY(-5px);border-color:var(--emerald);box-shadow:0 16px 36px var(--shadow)}
.pc-icon{font-size:42px;margin-bottom:12px}
.path-card h3{font-family:'Amiri';font-size:22px;color:var(--navy-deep);margin-bottom:6px}
.path-card>p{font-size:13px;color:var(--muted);margin-bottom:14px;min-height:36px}
.pc-prices{display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.pc-more{font-size:13px;color:var(--emerald);font-weight:700}
.chip.gold{background:rgba(191,154,69,0.15);color:#8a6d2f}
.req{color:#e53935;font-weight:700;margin-inline-start:2px}
/* كروت الواجبات */
.hw-list{display:flex;flex-direction:column;gap:12px}
.hw-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;border-right:4px solid var(--gold)}
.hw-card.done{border-right-color:var(--emerald);background:rgba(19,152,122,0.03)}
.hw-card.missed{border-right-color:#c0504d}
.hw-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.hw-icon{font-size:28px;flex-shrink:0}
.hw-info{flex:1}
.hw-info b{display:block;color:var(--navy-deep);font-size:15px}
.hw-info span{font-size:12.5px;color:var(--muted)}
.hw-notes{font-size:13px;color:#3f4f48;background:var(--cream);padding:8px 12px;border-radius:8px;margin:8px 0}
.hw-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.hw-player{margin-top:10px}
/* كروت الحصون الخمسة */
.husoon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.hisn-card{background:#fff;border:2px solid var(--line);border-radius:16px;padding:18px;text-align:center;transition:.2s}
.hisn-card.done{border-color:var(--emerald);background:rgba(19,152,122,0.04)}
.hisn-icon{font-size:34px;margin-bottom:8px}
.hisn-num{font-size:12px;color:var(--gold-deep,#9a7a35);font-weight:700;margin-bottom:4px}
.hisn-card b{display:block;color:var(--navy-deep);font-size:15.5px;margin-bottom:6px}
.hisn-card span{display:block;font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:12px;min-height:40px}
.hisn-check{display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;color:var(--emerald);cursor:pointer;font-weight:600}
.hisn-check input{width:18px;height:18px;accent-color:var(--emerald);cursor:pointer}
/* خرائط المسارات */
.roadmap-hero{display:flex;align-items:center;gap:16px;background:linear-gradient(140deg,var(--emerald),var(--emerald-deep));border-radius:20px;padding:22px 24px;color:#fff;margin-bottom:18px}
.roadmap-hero .rh-icon{font-size:44px}
.roadmap-hero h2{font-family:Amiri;font-size:24px;margin-bottom:4px}
.roadmap-hero p{font-size:14px;opacity:0.9}
.roadmap-hero b{color:var(--gold-light)}
.roadmap-prior{background:rgba(191,154,69,0.1);border:1px solid rgba(191,154,69,0.3);border-radius:14px;padding:16px;margin-bottom:18px}
.roadmap-prior b{color:var(--gold-deep,#9a7a35);display:block;margin-bottom:6px;font-size:14px}
.roadmap-prior p{font-size:13.5px;color:#3f4f48;line-height:1.8}
.roadmap-rates{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.rr-card{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px}
.rr-icon{font-size:26px}
.rr-card b{display:block;color:var(--navy-deep);font-size:14px}
.rr-card span{font-size:12.5px;color:var(--muted)}
.roadmap-husoon{display:flex;flex-direction:column;gap:10px}
.rh-item{display:flex;gap:12px;align-items:flex-start}
.rh-num{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;display:grid;place-items:center;font-family:Amiri;font-weight:700;flex-shrink:0}
.rh-item b{display:block;color:var(--navy-deep);font-size:14.5px}
.rh-item span{font-size:13px;color:var(--muted);line-height:1.7}
.roadmap-milestones{display:flex;flex-direction:column;gap:0}
.rm-step{display:flex;gap:14px;padding-bottom:18px;position:relative}
.rm-step:not(:last-child)::before{content:'';position:absolute;right:15px;top:32px;bottom:0;width:2px;background:var(--line)}
.rm-dot{width:32px;height:32px;border-radius:50%;background:var(--gold);color:#fff;display:grid;place-items:center;font-weight:700;flex-shrink:0;z-index:1}
.rm-content b{display:block;color:var(--navy-deep);font-size:14.5px}
.rm-content span{font-size:13px;color:var(--muted)}
.roadmap-note{background:var(--cream);border-radius:14px;padding:16px;font-size:13.5px;color:#3f4f48;line-height:1.8;margin-top:18px;text-align:center}
/* بطاقات الأداء (تسلسل القيادة) */
.perf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.perf-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 4px 14px var(--shadow)}
.pc-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.pc-head b{display:block;color:var(--navy-deep);font-size:15px}
.pc-head span{font-size:12px;color:var(--muted)}
.pc-stats{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.pcs{flex:1;text-align:center;background:var(--cream);border-radius:10px;padding:10px 6px;min-width:60px}
.pcs b{display:block;font-size:18px;color:var(--navy-deep);font-family:Amiri}
.pcs span{font-size:11px;color:var(--muted)}
.pc-foot{font-size:12.5px;color:var(--muted);padding:8px 12px;background:var(--cream);border-radius:8px;margin-bottom:12px}
.pc-foot.warn{background:rgba(192,80,77,0.08);color:#c0504d}
.pc-actions{display:flex;gap:8px}
/* جدول الحصون الخمسة في التقارير */
.husoon-track th,.husoon-track td{text-align:center;font-size:12px;padding:8px 6px}
.hk-yes{color:var(--emerald);font-weight:700;font-size:15px}
.hk-no{color:var(--line);font-size:15px}
/* تبويبات الحلقة */
.halqa-tabs{display:flex;gap:8px;margin-bottom:18px;background:#fff;padding:6px;border-radius:14px;border:1px solid var(--line)}
.ht-tab{flex:1;padding:11px;border:none;background:transparent;border-radius:10px;font-family:Tajawal;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;transition:.2s}
.ht-tab.on{background:var(--emerald);color:#fff}
/* حصص الحلقة */
.priv-sessions-list{display:flex;flex-direction:column;gap:10px}
.priv-session{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;background:var(--cream);border:1px solid var(--line)}
.priv-session.live{background:rgba(19,152,122,0.08);border-color:var(--emerald)}
.ps-icon{font-size:26px;flex-shrink:0}
.ps-info{flex:1}
.ps-info b{display:block;color:var(--navy-deep);font-size:15px}
.ps-info span{font-size:12.5px;color:var(--muted)}
.ps-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
/* محادثة الحلقة */
.halqa-chat{display:flex;flex-direction:column;height:460px}
.halqa-chat-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;background:var(--cream)}
/* التقييم */
.rate-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.rate-label{font-size:14px;font-weight:600;color:var(--navy-deep);min-width:60px}
.rate-opts{display:flex;gap:6px;flex-wrap:wrap}
.rate-btn{padding:7px 12px;border:1px solid var(--line);background:#fff;border-radius:9px;font-family:Tajawal;font-size:12.5px;cursor:pointer;transition:.15s}
.rate-btn.on{background:var(--emerald);color:#fff;border-color:var(--emerald)}
/* تقارير الحلقة */
.rating-item{padding:14px;border-radius:12px;background:var(--cream);margin-bottom:10px}
.ri-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ri-head b{color:var(--navy-deep)}
.ri-head span{font-size:12px;color:var(--muted)}
.ri-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.ri-note{font-size:13px;color:#3f4f48;font-style:italic;margin-top:6px}
/* جدول الحصص الأسبوعي */
.week-schedule{display:flex;gap:8px;align-items:flex-end;height:130px;padding:10px 0}
.ws-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.ws-bar-wrap{flex:1;display:flex;align-items:flex-end;width:100%}
.ws-bar{width:100%;min-height:4px;border-radius:8px 8px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:4px;transition:.3s}
.ws-bar span{color:#fff;font-size:12px;font-weight:700}
.ws-label{font-size:11px;color:var(--muted)}
.ws-detail-day{padding:10px 0;border-bottom:1px solid var(--line)}
.ws-detail-day b{color:var(--navy-deep);font-size:13.5px;display:block;margin-bottom:6px}
.ws-detail-item{display:flex;align-items:center;gap:8px;font-size:13px;color:#3f4f48;padding:6px 10px;background:var(--cream);border-radius:8px;margin-bottom:4px}
.ws-detail-item span{font-weight:700;color:var(--emerald-deep);min-width:50px}
/* بطاقة حلقة خاصة */
.group-card.priv{border:2px solid var(--emerald);background:rgba(19,152,122,0.03)}
/* الحفظ اليومي */
.hifz-progress-card{background:linear-gradient(140deg,var(--emerald),var(--emerald-deep));border-radius:20px;padding:22px 24px;color:#fff;margin-bottom:18px}
.hp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.hp-top span{font-size:14px;opacity:0.85}
.hp-top b{font-size:16px}
.hp-bar{height:12px;background:rgba(255,255,255,0.2);border-radius:8px;overflow:hidden;margin-bottom:6px}
.hp-fill{height:100%;background:var(--gold);border-radius:8px;transition:.4s}
.hp-labels{display:flex;justify-content:space-between;font-size:11px;opacity:0.75}
.week-bars{display:flex;gap:10px;align-items:flex-end;height:80px;padding:10px 0}
.wd-day{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.wd-bar{width:100%;min-height:4px;border-radius:4px;transition:.3s}
.wd-day span{font-size:11px;color:var(--muted)}
.hifz-castle{background:#fff;border:2px solid var(--line);border-radius:18px;margin-bottom:14px;overflow:hidden;transition:.2s}
.hifz-castle.done{border-color:var(--emerald);background:rgba(19,152,122,0.03)}
.hc-head{display:flex;align-items:center;gap:14px;padding:16px 18px;cursor:pointer}
.hc-num{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;display:grid;place-items:center;font-family:'Amiri';font-size:18px;font-weight:700;flex-shrink:0}
.hifz-castle.done .hc-num{background:linear-gradient(135deg,#0d6b4f,var(--emerald))}
.hc-title b{display:block;color:var(--navy-deep);font-size:15.5px}
.hc-title span{font-size:12.5px;color:var(--muted)}
.hc-toggle{margin-inline-start:auto;display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13.5px;color:var(--emerald-deep);font-weight:600}
.hc-toggle input{width:18px;height:18px;accent-color:var(--emerald);cursor:pointer}
.hc-body{padding:0 18px 16px;border-top:1px solid var(--line)}
.hc-method{background:var(--cream);border-radius:12px;padding:12px 14px;font-size:13.5px;color:#3f4f48;line-height:1.8;margin:12px 0}
.hc-inputs{display:flex;flex-direction:column;gap:8px;font-size:13.5px;color:var(--navy-deep)}
.hc-inputs label{font-weight:600}
.hc-inputs input{border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-family:'Tajawal';background:var(--cream)}
.hifz-formula{background:linear-gradient(140deg,var(--navy-deep),#0a1f30);color:var(--gold-light);border-radius:14px;padding:16px 18px;text-align:center;font-size:14px;line-height:1.8;margin-top:16px}
/* بطاقة الحفظ السريعة في الداش */
.hifz-quick-card{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px 18px;margin-bottom:16px;cursor:pointer;box-shadow:0 4px 14px var(--shadow);transition:.2s}
.hifz-quick-card:hover{border-color:var(--emerald);transform:translateY(-2px)}
.hq-left{display:flex;align-items:center;gap:10px;flex:1}
.hq-icon{font-size:26px}
.hq-left b{display:block;color:var(--navy-deep)}
.hq-left span{font-size:12.5px;color:var(--muted)}
.hq-bar{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden;max-width:120px}
/* حالة الطالب (رحلة الالتحاق) */
.status-journey{background:#fff;border:1px solid var(--line);border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 4px 14px var(--shadow)}
.sj-steps{display:flex;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:4px}
.sj-step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:60px}
.sj-dot{width:32px;height:32px;border-radius:50%;background:var(--line);color:var(--muted);display:grid;place-items:center;font-size:13px;font-weight:700}
.sj-step.done .sj-dot{background:var(--emerald);color:#fff}
.sj-step.active .sj-dot{background:var(--gold);color:#fff;box-shadow:0 0 0 4px rgba(191,154,69,0.2)}
.sj-step span{font-size:11px;color:var(--muted);text-align:center}
.sj-step.active span{color:var(--navy-deep);font-weight:700}
.sj-line{flex:1;height:2px;background:var(--line);margin-bottom:18px}
.sj-current{text-align:center;padding:10px 0}
.sj-current h3{color:var(--navy-deep);margin-bottom:6px}
.sj-current p{color:var(--muted);font-size:14px;margin-bottom:14px;line-height:1.7}
/* الإشعارات */
.notif-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.notif-item.read{opacity:0.6}
.ni-icon{font-size:24px;flex-shrink:0;width:40px;text-align:center}
.ni-body b{display:block;color:var(--navy-deep);font-size:14.5px;margin-bottom:2px}
.ni-body span{font-size:13px;color:var(--muted)}
.ni-body small{display:block;font-size:11px;color:var(--muted);margin-top:3px}
/* حلقات المشرف */
.sup-groups-list{display:flex;flex-direction:column;gap:14px}
.group-card-sup{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 4px 14px var(--shadow)}
.gcs-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.gcs-head b{font-size:17px;color:var(--navy-deep);display:block}
.gc-teacher{font-size:13px;color:var(--muted);margin-top:2px}
.gcs-btns{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.gcs-stats{display:flex;gap:12px;flex-wrap:wrap;font-size:13px;color:var(--muted);align-items:center}
.text-warn{color:#c0504d;font-weight:600}
/* تقارير الحلقات */
.group-reports-grid{display:flex;flex-direction:column;gap:18px}
.group-report-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 4px 14px var(--shadow)}
.grc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.grc-head h3{font-size:17px;color:var(--navy-deep);margin-bottom:2px}
.grc-head span{font-size:13px;color:var(--muted)}
.grc-stats{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.gs{text-align:center;background:var(--cream);border-radius:10px;padding:10px 14px;min-width:70px}
.gs b{display:block;font-size:18px;color:var(--navy-deep)}
.gs span{font-size:11.5px;color:var(--muted)}
.gs.warn b{color:#c0504d}
.grc-warn{background:rgba(192,80,77,0.08);border:1px solid rgba(192,80,77,0.25);border-radius:10px;padding:10px 14px;font-size:13px;color:#c0504d;margin-bottom:10px}
.grc-table{overflow-x:auto}
/* الرصد السريع */
.quick-record-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.qr-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:0 3px 10px var(--shadow)}
.qr-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.qr-head b{color:var(--navy-deep);font-size:15px}
.qr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;flex-wrap:wrap}
.qr-row span{font-size:13px;color:var(--muted);min-width:45px}
.seg.sm button{padding:6px 8px;font-size:12px}
/* التقرير الأسبوعي */
.wr-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px;border-radius:12px;background:var(--cream);margin-bottom:8px;flex-wrap:wrap}
.wr-info{display:flex;align-items:center;gap:10px}
.wr-info b{display:block;color:var(--navy-deep)}
.wr-info span{font-size:12px;color:var(--muted)}
.wr-stats{display:flex;gap:6px;flex-wrap:wrap}
/* ورد السماع */
.listen-list{display:flex;flex-direction:column;gap:16px}
.listen-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 4px 14px var(--shadow)}
.lt-head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.lt-icon{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;display:grid;place-items:center;font-size:22px;flex-shrink:0}
.lt-info b{display:block;color:var(--navy-deep);font-size:16px}
.lt-info span{font-size:12.5px;color:var(--muted)}
.lt-player{margin-top:10px}
.lt-player iframe{border-radius:12px}
/* تسلسل القيادة (org chart) */
.org-chart{display:flex;flex-direction:column;align-items:center;gap:0;padding:10px 0}
.org-level{display:flex;gap:16px;justify-content:center;flex-wrap:nowrap}
.org-level.wrap{flex-wrap:wrap}
.org-connector{width:2px;height:24px;background:var(--line)}
.org-node{background:#fff;border:2px solid var(--line);border-radius:16px;padding:14px 20px;text-align:center;min-width:140px;box-shadow:0 4px 14px var(--shadow)}
.org-node.admin{border-color:var(--gold);background:linear-gradient(140deg,#fff,rgba(191,154,69,0.06))}
.org-node.exec{border-color:var(--navy-deep)}
.org-node.sup{border-color:var(--emerald)}
.org-node.teach{border-color:var(--line);min-width:120px;padding:10px 14px}
.on-role{font-size:11.5px;color:var(--muted);font-weight:600}
.on-name{font-size:15px;color:var(--navy-deep);font-weight:700;font-family:'Amiri';margin:2px 0}
.on-title{font-size:11.5px;color:var(--emerald-deep)}
.on-badge{font-size:10px;background:var(--gold);color:#fff;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:4px}
/* قائمة الطاقم */
.staff-list{display:flex;flex-direction:column;gap:10px}
.staff-item{display:flex;align-items:center;gap:14px;background:var(--cream);border-radius:14px;padding:12px 16px}
.si-av{width:48px;height:48px;border-radius:13px;display:grid;place-items:center;color:#fff;font-weight:700;font-family:'Amiri';font-size:18px;flex-shrink:0}
.si-av.executive{background:linear-gradient(135deg,var(--navy-deep),#0a1f30)}
.si-av.supervisor{background:linear-gradient(135deg,var(--emerald),var(--emerald-deep))}
.si-av.teacher{background:linear-gradient(135deg,var(--gold),#8a6d2f)}
.si-info{flex:1}
.si-info b{display:block;color:var(--navy-deep);font-size:15px}
.si-info span{font-size:12.5px;color:var(--muted)}
.si-info small{font-size:11.5px;color:var(--muted);opacity:0.7}
.si-actions{flex-shrink:0}
/* تأكيد المدفوعات */
.confirm-grid,.subsidy-grid,.newstud-grid,.choose-grid,.children-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.confirm-card,.subsidy-req,.newstud-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 4px 14px var(--shadow)}
.cc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.cc-head b{color:var(--navy-deep);font-size:16px;display:block}
.cc-path{font-size:12.5px;color:var(--muted)}
.cc-amount{font-size:14px;color:var(--emerald-deep);font-weight:700;margin-bottom:6px}
.cc-ref{font-size:12px;color:var(--muted);margin-bottom:10px}
.cc-receipt img{width:100%;max-height:200px;object-fit:cover;border-radius:12px;cursor:pointer;border:1px solid var(--line)}
.cc-actions{display:flex;gap:8px;margin-top:14px}
.cc-actions .btn{flex:1;font-size:13.5px;padding:10px}
/* طلبات التخفيض */
.sr-head{margin-bottom:12px}
.sr-head b{color:var(--navy-deep);font-size:16px;display:block}
.sr-body{display:flex;flex-direction:column;gap:7px;margin-bottom:6px}
.sr-row{font-size:13.5px;color:#3f4f48;background:var(--cream);padding:8px 12px;border-radius:9px}
.sr-row span{font-weight:700;color:var(--navy-deep)}
/* إتاحة المعلم */
.avail-row{display:flex;justify-content:space-between;align-items:center;gap:16px}
.switch-toggle{position:relative;display:inline-block;width:56px;height:30px;flex-shrink:0}
.switch-toggle input{opacity:0;width:0;height:0}
.st-slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:30px;transition:.3s}
.st-slider:before{content:'';position:absolute;height:24px;width:24px;right:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.switch-toggle input:checked + .st-slider{background:var(--emerald)}
.switch-toggle input:checked + .st-slider:before{transform:translateX(-26px)}
.avail-status{margin-top:14px;padding:10px;border-radius:10px;text-align:center;font-size:14px;font-weight:600}
.avail-status.on{background:rgba(19,152,122,0.1);color:var(--emerald-deep)}
.avail-status.off{background:rgba(0,0,0,0.05);color:var(--muted)}
/* طلاب جدد */
.ns-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.ns-av{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;display:grid;place-items:center;font-weight:700;font-family:'Amiri';font-size:18px}
.ns-head b{color:var(--navy-deep);display:block}
.ns-head span{font-size:12.5px;color:var(--muted)}
.ns-survey{display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
.ns-q{font-size:13px;color:#3f4f48;background:var(--cream);padding:8px 11px;border-radius:9px}
.ns-q span{font-weight:700;color:var(--emerald-deep)}
/* اختيار المعلم */
.teacher-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;text-align:center;box-shadow:0 4px 14px var(--shadow);transition:.2s}
.teacher-card:hover{transform:translateY(-4px);border-color:var(--emerald)}
.tc-av{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;display:grid;place-items:center;font-weight:700;font-family:'Amiri';font-size:24px;margin:0 auto 12px}
.teacher-card h3{color:var(--navy-deep);font-size:18px;margin-bottom:6px}
.tc-spec{font-size:13px;color:var(--emerald-deep);font-weight:600;margin-bottom:8px}
.tc-meta{display:flex;gap:10px;justify-content:center;font-size:12px;color:var(--muted);margin-bottom:10px;flex-wrap:wrap}
.tc-bio{font-size:13px;color:#3f4f48;line-height:1.7;margin-bottom:14px;min-height:40px}
/* الأبناء */
.child-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;text-align:center;box-shadow:0 4px 14px var(--shadow)}
.ck-av{width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,var(--gold),#8a6d2f);color:#fff;display:grid;place-items:center;font-weight:700;font-family:'Amiri';font-size:22px;margin:0 auto 10px}
.child-card h3{color:var(--navy-deep);font-size:17px;margin-bottom:4px}
.ck-meta{font-size:12.5px;color:var(--muted)}
.ck-status{margin:12px 0;padding:6px;border-radius:8px;font-size:13px;font-weight:600;background:rgba(0,0,0,0.05);color:var(--muted)}
.ck-status.on{background:rgba(19,152,122,0.1);color:var(--emerald-deep)}
.ck-actions{display:flex;gap:8px;justify-content:center}
/* التجديد الشهري */
.renew-box{display:flex;align-items:center;gap:14px;border-radius:16px;padding:16px 18px;margin-bottom:18px}
.renew-box.ok{background:rgba(19,152,122,0.08);border:1px solid rgba(19,152,122,0.25)}
.renew-box.warn{background:rgba(191,154,69,0.1);border:1px solid var(--gold)}
.renew-box.expired{background:rgba(192,80,77,0.08);border:1px solid #c0504d}
.rn-icon{font-size:30px;flex-shrink:0}
.rn-info{flex:1}
.rn-info b{display:block;color:var(--navy-deep);font-size:15px}
.rn-info span{font-size:13px;color:var(--muted)}
.renew-box .btn{flex-shrink:0}
/* صندوق السعر في نهاية صفحة المسار */
.pm-price-box{background:linear-gradient(140deg,var(--cream),var(--cream-2));border:2px dashed var(--gold);border-radius:18px;padding:20px;margin:22px 0;text-align:center}
.ppb-label{font-size:14px;color:var(--emerald-deep);font-weight:700;margin-bottom:14px}
.ppb-cards{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.ppb-card{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:12px 20px;box-shadow:0 4px 14px rgba(0,0,0,0.06)}
.ppb-flag{font-size:28px}
.ppb-info{text-align:right}
.ppb-info small{display:block;font-size:12px;color:var(--muted)}
.ppb-info b{font-size:22px;font-family:'Amiri';color:var(--emerald-deep)}
.ppb-card.intl .ppb-info b{color:#8a6d2f}
/* أزرار الالتحاق */
.pm-join{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.join-btn{border:none;border-radius:14px;padding:16px;font-family:'Tajawal';font-weight:700;font-size:15px;cursor:pointer;transition:.2s}
.join-btn.primary{background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;box-shadow:0 8px 22px rgba(19,152,122,0.35)}
.join-btn.primary:hover{transform:translateY(-2px)}
.join-btn.subsidy{background:#fff;color:var(--emerald-deep);border:1.5px solid var(--gold)}
.join-btn.subsidy:hover{background:var(--cream)}
/* نافذة الالتحاق */
.enroll-modal{max-width:540px;max-height:88vh;overflow-y:auto}
.enroll-steps{display:flex;gap:8px;margin-bottom:20px}
.es{flex:1;text-align:center;font-size:12px;color:var(--muted);padding:8px 4px;border-radius:10px;background:var(--cream);font-weight:600}
.es.on{background:var(--emerald);color:#fff}
.es.done{background:rgba(19,152,122,0.15);color:var(--emerald-deep)}
.child-pick{display:flex;flex-direction:column;gap:10px}
.cp-item{display:flex;align-items:center;gap:12px;background:var(--cream);border-radius:14px;padding:12px 14px;cursor:pointer;transition:.2s;border:1.5px solid transparent}
.cp-item:hover{border-color:var(--emerald);background:#fff}
.cp-av{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;display:grid;place-items:center;font-weight:700;font-family:'Amiri';font-size:17px}
.cp-info{flex:1}.cp-info b{display:block;color:var(--navy-deep)}.cp-info span{font-size:12.5px;color:var(--muted)}
.cp-go{font-size:20px;color:var(--emerald)}
.enroll-form .field{margin-bottom:14px}
.enroll-form textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 14px;font-family:'Tajawal';font-size:14px;resize:vertical;background:var(--cream)}
.enroll-form textarea:focus{outline:none;border-color:var(--emerald);background:#fff}
.subsidy-box{background:rgba(191,154,69,0.08);border:1px solid rgba(191,154,69,0.3);border-radius:14px;padding:16px;margin-top:6px}
.sb-title{font-weight:700;color:#8a6d2f;font-size:14px;margin-bottom:14px}
/* رفع الإيصال */
.receipt-box{background:var(--cream);border-radius:14px;padding:16px}
.rb-title{font-weight:700;color:var(--navy-deep);font-size:14px;margin-bottom:12px}
.receipt-upload{display:block;border:2px dashed var(--emerald);border-radius:14px;padding:24px;text-align:center;cursor:pointer;background:#fff;transition:.2s}
.receipt-upload:hover{background:rgba(19,152,122,0.04)}
.receipt-upload span{display:block;margin-top:8px;color:var(--muted);font-size:13px}
/* شارة يتوفّر قريباً */
.ltrack.soon{position:relative;opacity:0.75}
.soon-badge{position:absolute;top:14px;left:14px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy-deep);font-size:11px;font-weight:800;padding:5px 12px;border-radius:20px;font-family:'Tajawal';box-shadow:0 4px 12px rgba(191,154,69,0.4)}
/* شبكة مسارات الحفظ الستة */
.lpaths-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;max-width:1100px;margin:0 auto}
.lpath-card{background:rgba(255,255,255,0.06);border:1px solid rgba(224,192,115,0.25);border-radius:22px;padding:28px 24px;cursor:pointer;transition:.25s;text-align:center;backdrop-filter:blur(6px)}
.lpath-card:hover{transform:translateY(-6px);border-color:var(--gold);background:rgba(255,255,255,0.1);box-shadow:0 18px 40px rgba(0,0,0,0.3)}
.lp-icon{font-size:46px;margin-bottom:14px}
.lpath-card h3{font-family:'Amiri';font-size:24px;color:#fff;margin-bottom:8px}
.lpath-card>p{font-size:13.5px;color:rgba(255,255,255,0.7);margin-bottom:16px;min-height:38px}
.lp-prices{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.lp-pr{background:rgba(19,152,122,0.2);color:#7fe0c4;font-size:13px;font-weight:700;padding:6px 12px;border-radius:20px;font-family:'Amiri'}
.lp-pr.intl{background:rgba(191,154,69,0.2);color:var(--gold-light)}
.lp-more{font-size:13px;color:var(--gold-light);font-weight:700}
/* نافذة تفاصيل المسار */
.path-modal{max-width:640px;max-height:88vh;overflow-y:auto;position:relative}
.modal-x{position:absolute;top:14px;left:16px;background:rgba(0,0,0,0.06);border:none;width:36px;height:36px;border-radius:50%;font-size:22px;cursor:pointer;color:#555;z-index:2}
.pm-head{display:flex;gap:16px;align-items:center;margin-bottom:18px;padding-bottom:18px;border-bottom:2px solid var(--line)}
.pm-icon{font-size:48px;flex-shrink:0}
.pm-head h2{font-family:'Amiri';font-size:28px;color:var(--navy-deep)}
.pm-head p{color:var(--muted);font-size:14px}
.pm-detail{background:var(--cream);border-radius:14px;padding:16px 18px;font-size:15px;line-height:1.9;color:#3f4f48;margin-bottom:20px}
.pm-cta{display:flex;gap:10px;margin-top:20px;position:sticky;bottom:0;background:#fff;padding-top:14px}
.pm-cta .btn{flex:1}
/* وثيقة نظام الحفظ */
.hifz-doc{font-size:14px}
.hd-price{display:flex;gap:12px;margin-bottom:20px}
.hp-card{flex:1;border-radius:16px;padding:16px;text-align:center;color:#fff}
.hp-card.local{background:linear-gradient(140deg,var(--emerald),var(--emerald-deep))}
.hp-card.intl{background:linear-gradient(140deg,var(--gold),#8a6d2f)}
.hp-card span{display:block;font-size:13px;opacity:0.9}
.hp-card b{display:block;font-size:26px;font-family:'Amiri';margin:4px 0}
.hp-card small{font-size:12px;opacity:0.85}
.hd-title{font-family:'Amiri';font-size:23px;color:var(--navy-deep);text-align:center;margin-bottom:8px}
.hd-intro{text-align:center;color:var(--muted);font-size:14px;line-height:1.8;margin-bottom:22px}
.hd-sec{background:var(--cream);border-radius:14px;padding:16px 18px;margin-bottom:14px}
.hd-h{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hd-n{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));color:#fff;display:grid;place-items:center;font-family:'Amiri';font-weight:700;font-size:17px;flex-shrink:0}
.hd-h b{font-size:17px;color:var(--navy-deep)}
.hd-target{color:var(--emerald-deep);font-weight:700;font-size:13.5px;margin-bottom:10px}
.hd-steps{display:flex;flex-direction:column;gap:6px}
.hs{background:#fff;border-radius:10px;padding:9px 12px;font-size:13.5px;color:#3f4f48;border-right:3px solid var(--emerald)}
.hd-list{display:flex;flex-direction:column;gap:6px}
.hl{background:#fff;border-radius:10px;padding:9px 12px;font-size:13.5px;color:#3f4f48}
.hl-gold{background:rgba(191,154,69,0.12);border-right:3px solid var(--gold);font-weight:600}
.hd-note{font-size:12.5px;color:var(--muted);margin-top:10px;line-height:1.7}
.hd-benefit{font-size:13.5px;color:#3f4f48;line-height:1.8}
.hd-aya{font-family:'Amiri';font-size:17px;color:var(--emerald-deep);text-align:center;margin-top:12px;line-height:2;background:rgba(19,152,122,0.07);padding:12px;border-radius:10px}
.hd-summary{background:linear-gradient(140deg,var(--navy-deep),#0a1f30);border-radius:16px;padding:20px;color:#fff;margin-top:18px}

.hd-table{width:100%;border-collapse:collapse}
.hd-table td{padding:9px 12px;font-size:13.5px;border-bottom:1px solid rgba(255,255,255,0.1)}

.hd-table td:last-child{text-align:left;color:rgba(255,255,255,0.85)}
.hd-golden{margin-top:16px;background:rgba(191,154,69,0.2);border:1px solid var(--gold);border-radius:12px;padding:14px;font-size:14px;text-align:center;color:var(--gold-light);font-weight:600;line-height:1.8}
.pay-guide{display:flex;flex-direction:column;gap:10px}
.pg-item{display:flex;gap:14px;align-items:flex-start;background:var(--cream);padding:12px 14px;border-radius:12px}
.pg-icon{font-size:24px;flex-shrink:0;margin-top:2px}
.pg-info{display:flex;flex-direction:column;gap:2px}

.pm-opt:hover .pm-card{border-color:var(--emerald-deep)}
.wa-float{position:fixed;bottom:24px;left:24px;z-index:200;display:flex;align-items:center;gap:10px;background:#25D366;color:#fff;padding:12px 20px 12px 14px;border-radius:40px;box-shadow:0 8px 24px rgba(37,211,102,0.45);transition:.25s;text-decoration:none;font-family:'Tajawal';font-weight:700;font-size:14px}

.wa-float .wa-ic{width:30px;height:30px;flex-shrink:0}
.wa-float .wa-txt{white-space:nowrap}
@media(max-width:600px){.wa-float .wa-txt{display:none}.wa-float{padding:14px;border-radius:50%}}

/* setup */
.setup-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px 20px;background:radial-gradient(ellipse at 80% 10%,rgba(19,152,122,0.12),transparent 50%),linear-gradient(160deg,#0a3326,#072a20)}
.setup-card{max-width:480px;width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(224,192,115,0.4);border-radius:26px;padding:38px 32px;color:#fff;backdrop-filter:blur(8px)}
.setup-card .badge{display:inline-block;background:rgba(191,154,69,0.2);color:var(--gold-light);font-size:12px;font-weight:700;padding:6px 16px;border-radius:30px;margin-bottom:16px}
.setup-card h2{font-size:26px;margin-bottom:8px}
.setup-card p{color:rgba(255,255,255,0.7);font-size:14px;margin-bottom:24px;line-height:1.8}

.setup-card input{background:#fff;border:1px solid rgba(255,255,255,0.3);color:#1c2a24;font-weight:600}
